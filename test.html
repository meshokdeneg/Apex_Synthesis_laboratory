<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL | Тест: Преданность ASL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url('https://static.planetminecraft.com/files/image/minecraft/texture-pack/2021/362/14416263-quartzpack_l.jpg') repeat;
            background-size: 64px 64px;
            font-family: 'Segoe UI', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .test-container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 2px #FF8C00, 0 0 0 6px #1a2a2f;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1a2a2f, #0f1a1f);
            padding: 30px 35px;
            text-align: center;
            border-bottom: 4px solid #FF8C00;
            position: relative;
        }

        .header::before {
            content: "⚛️";
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 60px;
            opacity: 0.1;
        }

        .header::after {
            content: "🧊";
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 60px;
            opacity: 0.1;
        }

        .header h1 {
            color: #FF8C00;
            font-size: 36px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
        }

        .header p {
            color: #aaa;
            margin-top: 8px;
            font-size: 16px;
        }

        .content {
            padding: 40px;
        }

        .progress-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .progress {
            background: linear-gradient(135deg, #2c3e2f, #1a2a1a);
            padding: 10px 25px;
            border-radius: 40px;
            color: #FF8C00;
            font-weight: bold;
            font-size: 16px;
            border: 1px solid #FF8C00;
        }

        .question-counter {
            background: #f0f0f0;
            padding: 10px 25px;
            border-radius: 40px;
            color: #1a2a2f;
            font-weight: bold;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            border-left: 6px solid #FF8C00;
            transition: all 0.2s ease;
        }

        @keyframes redFlash {
            0% { background-color: rgba(255, 255, 255, 0.95); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
            20% { background-color: #ffe6e6; box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.5); }
            100% { background-color: rgba(255, 255, 255, 0.95); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        .question-card.flash-red {
            animation: redFlash 0.6s ease-out;
        }

        .question-text {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #1a2a2f;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: rgba(249, 249, 249, 0.9);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .option:hover {
            background: #fff5e6;
            border-color: #FF8C00;
            transform: translateX(5px);
        }

        .option input {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #FF8C00;
        }

        .option label {
            flex: 1;
            cursor: pointer;
            font-size: 17px;
            color: #333;
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: #ffe6e6;
            border-radius: 8px;
            display: none;
            border-left: 3px solid #e74c3c;
            font-weight: 500;
        }

        .btn-group {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin: 25px 0 0;
            position: relative;
            min-height: 120px;
            flex-wrap: wrap;
            background: rgba(0,0,0,0.02);
            border-radius: 20px;
        }

        .normal-btn {
            background: linear-gradient(135deg, #27ae60, #219a52);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 120px;
            box-shadow: 0 4px 10px rgba(39,174,96,0.3);
        }

        .normal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(39,174,96,0.4);
        }

        .escape-btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            width: 80px;
            height: 36px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(231,76,60,0.3);
            position: absolute;
            transition: left 0.03s linear, top 0.03s linear;
            white-space: nowrap;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .next-btn {
            background: linear-gradient(135deg, #4A90E2, #357abd);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(74,144,226,0.3);
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(74,144,226,0.4);
        }

        .result {
            text-align: center;
            padding: 30px;
            background: rgba(248, 249, 250, 0.95);
            border-radius: 20px;
            margin-top: 20px;
            display: none;
        }

        .result h3 {
            color: #FF8C00;
            margin-bottom: 15px;
            font-size: 28px;
        }

        .result p {
            font-size: 18px;
            margin: 15px 0;
        }

        .result-buttons {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .footer {
            background: #1a2a2f;
            padding: 12px;
            text-align: center;
            font-size: 12px;
            color: #888;
        }

        .footer a {
            color: #FF8C00;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="test-container">
    <div class="header">
        <h1>⚛️ ТЕСТ: ПРЕДАННОСТЬ ASL</h1>
        <p>25 вопросов. С каждым разом сложнее. Вы готовы?</p>
    </div>

    <div class="content">
        <div class="progress-section">
            <div class="progress">🔬 ЛАБОРАТОРНЫЙ ТЕСТ</div>
            <div class="question-counter" id="progress">Вопрос 1 из 25</div>
        </div>

        <div id="questionContainer"></div>
        <div id="resultContainer" class="result"></div>
    </div>

    <div class="footer">
        <a href="index.html">← На главную</a>
    </div>
</div>

<script>
    // ========== 25 ВОПРОСОВ ==========
    const questions = [
        { text: "Что для вас ASL?", options: ["Обычная лаборатория", "Будущее!", "Игровой проект", "Ничего"], correct: 1 },
        { text: "Кто такой ГЛюК?", options: ["Главный Лаборант", "Главный Компьютер", "Главный Кубик", "Главный Инженер"], correct: 1 },
        { text: "Кто такой meshokdeneg?", options: ["Сингулярный админ", "Старший инженер", "Главный тестировщик", "Операционный узел"], correct: 0 },
        { text: "Какой принцип мы используем в тестах?", options: ["Принцип Куба", "Принцип Чайника", "Принцип Синтеза", "Принцип Глюка"], correct: 1 },
        { text: "На какую корпорацию мы любим делать отсылки?", options: ["Black Mesa", "Aperture Science", "Umbrella Corporation", "Weyland-Yutani"], correct: 1 },
        { text: "Какой отдел отвечает за создание тестов?", options: ["CHRONOS", "AETHERA", "PRIMORDIA", "The Time of Science (TToS)"], correct: 3 },
        { text: "Когда вышла первая карта ASL?", options: ["18 ноября 2024", "1 января 2025", "15 марта 2024", "20 декабря 2025"], correct: 0 },
        { text: "Что такое 'Принцип Чайника' на практике?", options: ["Кипятить воду", "Использовать чайник как молоток", "Применять предметы не по инструкции", "Чайник всегда горячий"], correct: 2 },
        { text: "Что произошло во время 'Синтеза'?", options: ["Создали чайник", "Коллапс и пересборка реальности", "Запустили сервер", "Изобрели куб"], correct: 1 },
        { text: "Кто такой Strika_Jarvis?", options: ["Сингулярный админ", "Правая рука Meshokdeneg", "Операционный узел", "Главный инженер"], correct: 1 },
        { text: "Что означает аббревиатура TToS?", options: ["Time to Science", "The Time of Science", "Test of Science", "Technology of Science"], correct: 1 },
        { text: "Какой цвет у нервной системы Глюка?", options: ["#FF0000", "#00FF9D", "#4A90E2", "#FF8C00"], correct: 1 },
        { text: "Сколько концепт-секторов у ASL?", options: ["2", "3", "4", "5"], correct: 1 },
        { text: "Как называется сектор, отвечающий за время?", options: ["CHRONOS", "AETHERA", "PRIMORDIA", "TToS"], correct: 0 },
        { text: "Как называется сектор, отвечающий за энергию?", options: ["CHRONOS", "AETHERA", "PRIMORDIA", "TToS"], correct: 1 },
        { text: "Как называется сектор, отвечающий за первичную материю?", options: ["CHRONOS", "AETHERA", "PRIMORDIA", "TToS"], correct: 2 },
        { text: "Что такое 'Синтез' в контексте ASL?", options: ["Создание чая", "Событие пересборки реальности", "Название карты", "Имя робота"], correct: 1 },
        { text: "Какой формат у карты 'Роботы-напарники'?", options: ["Одиночный", "Кооператив (2 игрока)", "Мультиплеер", "Синглплеер"], correct: 1 },
        { text: "Какой формат у карты 'Панельки'?", options: ["Экшн", "Социальный симулятор", "Головоломка", "Платформер"], correct: 1 },
        { text: "Что означает 'Принцип Чайника' в тестировании?", options: ["Всегда пить чай", "Использовать объекты нестандартно", "Ломать систему", "Искать баги"], correct: 1 },
        { text: "Кто является автором ASL?", options: ["Strika_Jarvis", "Глюк", "Meshokdeneg", "Aperture Science"], correct: 2 },
        { text: "Какой стиль оформления у сайта ASL?", options: ["Киберпанк", "Лабораторный/индустриальный", "Фэнтези", "Минимализм"], correct: 1 },
        { text: "Что такое 'Протокол Синтеза'?", options: ["Чайная церемония", "Описание события создания ASL", "Название карты", "Код доступа"], correct: 1 },
        { text: "Какой элемент чаще всего встречается в логотипе ASL?", options: ["Круг", "Куб", "Треугольник", "Спираль"], correct: 1 },
        { text: "Нравится ли вам ASL?", options: ["ДА!", "НЕТ"], correct: 0, isSpecial: true }
    ];

    let currentQuestion = 0;
    let answers = new Array(questions.length).fill(null);
    let escapeActive = false;
    let escapeBtn = null;
    let btnGroup = null;

    const questionContainer = document.getElementById('questionContainer');
    const resultContainer = document.getElementById('resultContainer');
    const progressSpan = document.getElementById('progress');

    function getRandomPosition(maxX, maxY, minDistanceFromYes = 100) {
        const yesBtn = document.querySelector('.normal-btn');
        let posX, posY;
        let attempts = 0;
        
        do {
            posX = Math.random() * maxX;
            posY = Math.random() * maxY;
            attempts++;
            if (attempts > 50) break;
        } while (yesBtn && Math.hypot(posX - (parseFloat(yesBtn.style.left) || 0), posY - (parseFloat(yesBtn.style.top) || 0)) < minDistanceFromYes);
        
        return { x: Math.max(0, Math.min(posX, maxX)), y: Math.max(0, Math.min(posY, maxY)) };
    }

    function teleportToSafeSpot() {
        if (!escapeActive || !escapeBtn || !btnGroup) return;
        
        const containerRect = btnGroup.getBoundingClientRect();
        const btnRect = escapeBtn.getBoundingClientRect();
        const maxX = containerRect.width - btnRect.width - 10;
        const maxY = containerRect.height - btnRect.height - 10;
        
        if (maxX <= 0 || maxY <= 0) return;
        
        const { x, y } = getRandomPosition(maxX, maxY);
        escapeBtn.style.left = x + 'px';
        escapeBtn.style.top = y + 'px';
    }

    function setupEscapeButton() {
        btnGroup = document.querySelector('.btn-group');
        if (!btnGroup) return;

        const yesBtn = btnGroup.querySelector('.normal-btn');
        escapeBtn = btnGroup.querySelector('.escape-btn');
        
        if (!escapeBtn || !yesBtn) return;

        escapeActive = true;
        
        const containerRect = btnGroup.getBoundingClientRect();
        const btnRect = escapeBtn.getBoundingClientRect();
        const maxX = containerRect.width - btnRect.width - 10;
        const maxY = containerRect.height - btnRect.height - 10;
        
        if (maxX > 0 && maxY > 0) {
            escapeBtn.style.left = (maxX - 20) + 'px';
            escapeBtn.style.top = (maxY - 20) + 'px';
        }
        
        const ACTIVATION_DISTANCE = 100;
        const TELEPORT_DISTANCE = 45;
        const MOVE_SPEED = 22;

        function moveButtonAway(mouseX, mouseY) {
            if (!escapeActive || !escapeBtn || !btnGroup) return;
            
            const btnRect = escapeBtn.getBoundingClientRect();
            const btnCenterX = btnRect.left + btnRect.width / 2;
            const btnCenterY = btnRect.top + btnRect.height / 2;
            
            const dx = mouseX - btnCenterX;
            const dy = mouseY - btnCenterY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            const containerRect = btnGroup.getBoundingClientRect();
            const maxX = containerRect.width - btnRect.width - 10;
            const maxY = containerRect.height - btnRect.height - 10;
            
            if (maxX <= 0 || maxY <= 0) return;
            
            let currentLeft = parseFloat(escapeBtn.style.left) || 0;
            let currentTop = parseFloat(escapeBtn.style.top) || 0;
            
            if (distance < ACTIVATION_DISTANCE) {
                let angle = Math.atan2(dy, dx);
                let moveX = -Math.cos(angle) * MOVE_SPEED;
                let moveY = -Math.sin(angle) * MOVE_SPEED;
                
                let newLeft = currentLeft + moveX;
                let newTop = currentTop + moveY;
                
                newLeft = Math.max(0, Math.min(newLeft, maxX));
                newTop = Math.max(0, Math.min(newTop, maxY));
                
                escapeBtn.style.left = newLeft + 'px';
                escapeBtn.style.top = newTop + 'px';
                
                if (distance < TELEPORT_DISTANCE) {
                    const { x, y } = getRandomPosition(maxX, maxY);
                    escapeBtn.style.left = x + 'px';
                    escapeBtn.style.top = y + 'px';
                }
            }
        }

        function handleMouseMove(e) {
            if (!escapeActive) return;
            moveButtonAway(e.clientX, e.clientY);
        }

        document.addEventListener('mousemove', handleMouseMove);
        
        const teleportInterval = setInterval(() => {
            if (!escapeActive) {
                clearInterval(teleportInterval);
                return;
            }
            teleportToSafeSpot();
        }, 1500);

        yesBtn.addEventListener('click', function() {
            if (escapeActive) {
                escapeActive = false;
                document.removeEventListener('mousemove', handleMouseMove);
                clearInterval(teleportInterval);
                answers[currentQuestion] = 0;
                nextQuestion();
            }
        });

        escapeBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            if (escapeActive) {
                alert('💀 Ты охренел? 💀');
                answers[currentQuestion] = 1;
                nextQuestion();
            }
            return false;
        });
    }

    function showError(message) {
        const questionCard = document.querySelector('.question-card');
        if (questionCard) {
            questionCard.classList.add('flash-red');
            setTimeout(() => {
                questionCard.classList.remove('flash-red');
            }, 600);
        }
        
        let errorDiv = document.getElementById('inlineError');
        if (!errorDiv) {
            const nextBtn = document.querySelector('.next-btn');
            if (nextBtn) {
                errorDiv = document.createElement('div');
                errorDiv.id = 'inlineError';
                errorDiv.className = 'error-message';
                nextBtn.parentNode.insertBefore(errorDiv, nextBtn.nextSibling);
            }
        }
        if (errorDiv) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
    }

    function hideError() {
        const errorDiv = document.getElementById('inlineError');
        if (errorDiv) errorDiv.style.display = 'none';
    }

    function renderQuestion() {
        const q = questions[currentQuestion];
        progressSpan.textContent = `Вопрос ${currentQuestion + 1} из ${questions.length}`;

        if (q.isSpecial) {
            questionContainer.innerHTML = `
                <div class="question-card">
                    <div class="question-text">${q.text}</div>
                    <div class="btn-group" style="min-height: 150px; position: relative;">
                        <button class="normal-btn" style="padding: 12px 35px;">✅ ДА!</button>
                        <button class="escape-btn" style="position: absolute; right: 20px; bottom: 20px;">❌ НЕТ</button>
                    </div>
                </div>
            `;
            setTimeout(() => setupEscapeButton(), 50);
        } else {
            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                const isChecked = answers[currentQuestion] === idx;
                optionsHtml += `
                    <div class="option" onclick="selectOption(${idx})">
                        <input type="radio" name="question" value="${idx}" ${isChecked ? 'checked' : ''}>
                        <label>${opt}</label>
                    </div>
                `;
            });

            questionContainer.innerHTML = `
                <div class="question-card">
                    <div class="question-text">${q.text}</div>
                    <div class="options">${optionsHtml}</div>
                    <button class="next-btn" id="nextBtn">➡️ ДАЛЕЕ ⬅️</button>
                    <div id="inlineError" class="error-message" style="display: none;"></div>
                </div>
            `;

            const nextBtn = document.getElementById('nextBtn');
            nextBtn.addEventListener('click', () => {
                const selected = document.querySelector('input[name="question"]:checked');
                if (selected) {
                    answers[currentQuestion] = parseInt(selected.value);
                    hideError();
                    nextQuestion();
                } else {
                    showError('❌ Пожалуйста, выберите ответ, чтобы продолжить!');
                }
            });
        }
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < questions.length) {
            renderQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        let score = 0;
        for (let i = 0; i < questions.length; i++) {
            if (answers[i] === questions[i].correct) score++;
        }

        let rank = '', message = '', color = '#FF8C00';
        
        if (score === 25) { 
            rank = 'ЛЮБИМЧИК ГЛЮКА'; 
            message = 'Он тебя заметил, молодец!'; 
            color = '#FFD700'; 
        }
        else if (score >= 22) { 
            rank = 'ПОЧЁТНЫЙ ЧАЙНИК'; 
            message = 'Ты уже не просто чайник, ты — легенда!'; 
            color = '#FFD700'; 
        }
        else if (score >= 19) { 
            rank = 'КУБОВОД'; 
            message = 'Ты говоришь с кубами, и они тебя слушаются.'; 
            color = '#4A90E2'; 
        }
        else if (score >= 16) { 
            rank = 'ЛАБОРАТОРНАЯ КРЫСА'; 
            message = 'Ты прошёл почти все тесты. Глюк ставит на тебя опыты.'; 
            color = '#4A90E2'; 
        }
        else if (score >= 13) { 
            rank = 'ПРОВОДОЧЕК'; 
            message = 'Ты важная часть системы, но пока маленькая.'; 
            color = '#27ae60'; 
        }
        else if (score >= 10) { 
            rank = 'ВИНТИК'; 
            message = 'Ты крутишься в механизме ASL. Не выпадай!'; 
            color = '#27ae60'; 
        }
        else if (score >= 7) { 
            rank = 'ПЕСОЧЕК В ШЕСТЕРНЯХ'; 
            message = 'Ты здесь, но пока не очень понятно зачем.'; 
            color = '#e74c3c'; 
        }
        else if (score >= 4) { 
            rank = 'СТАРЫЙ ЧАЙНИК'; 
            message = 'Ты здесь уже давно, но всё ещё не понял принцип.'; 
            color = '#e74c3c'; 
        }
        else { 
            rank = 'КУБ-НЕДОНОСОК'; 
            message = 'Ты только родился. Иди, расти, познавай ASL.'; 
            color = '#e74c3c'; 
        }

        questionContainer.style.display = 'none';
        resultContainer.style.display = 'block';
        resultContainer.innerHTML = `
            <h3 style="color: ${color};">🏆 ${rank}</h3>
            <p style="font-size: 18px; margin: 15px 0;">${message}</p>
            <p>Правильных ответов: ${score} из ${questions.length}</p>
            <div class="result-buttons">
                <button class="normal-btn" onclick="location.href='index.html'">🏠 НА ГЛАВНУЮ</button>
                <button class="next-btn" style="background: #4A90E2;" onclick="location.reload()">🔄 ПРОЙТИ СНОВА</button>
            </div>
        `;
    }

    window.selectOption = function(idx) {
        answers[currentQuestion] = idx;
        const radios = document.querySelectorAll('input[name="question"]');
        radios.forEach((radio, i) => radio.checked = (i === idx));
        hideError();
    };

    renderQuestion();
</script>
</body>
</html>
