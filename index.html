<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ASL | Лаборатория Синтеза</title>
    <style>
        /* ===== ОСНОВНЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        body {
            background: linear-gradient(145deg, #0a0f1a 0%, #0c111c 100%);
            color: #fff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированный фон в стиле панели управления */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(90deg, 
                    rgba(0, 255, 157, 0.03) 0px, 
                    rgba(0, 255, 157, 0.03) 2px,
                    transparent 2px, 
                    transparent 4px),
                repeating-linear-gradient(0deg, 
                    rgba(74, 144, 226, 0.03) 0px, 
                    rgba(74, 144, 226, 0.03) 2px,
                    transparent 2px, 
                    transparent 4px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* Летающие кубики */
        .floating-cube {
            position: fixed;
            width: 30px;
            height: 30px;
            background: rgba(0, 255, 157, 0.05);
            border: 1px solid rgba(0, 255, 157, 0.2);
            transform: rotate(45deg);
            animation: floatCube 15s infinite linear;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes floatCube {
            0% { transform: rotate(45deg) translateY(100vh) translateX(-50px); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: rotate(45deg) translateY(-100px) translateX(100px); opacity: 0; }
        }

        /* СТОЛ — ТЕКСТУРА В ВИДЕ КОДА (CSS) */
        .quartz-wall {
            position: relative;
            max-width: 1400px;
            width: 90%;
            margin: 40px auto;
            padding: 40px 30px 64px 30px;
            background: #1e1a14;
            background-image: 
                repeating-linear-gradient(45deg, 
                    rgba(80, 70, 60, 0.3) 0px, 
                    rgba(80, 70, 60, 0.3) 2px,
                    transparent 2px, 
                    transparent 8px),
                repeating-linear-gradient(135deg, 
                    rgba(100, 85, 70, 0.2) 0px, 
                    rgba(100, 85, 70, 0.2) 1px,
                    transparent 1px, 
                    transparent 6px),
                radial-gradient(circle at 20% 40%, rgba(60, 50, 40, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(40, 35, 30, 0.5) 0%, transparent 60%);
            background-color: #2a241e;
            border: 2px solid #5a4a3a;
            border-radius: 8px;
            box-shadow: 
                inset 0 0 30px rgba(0,0,0,0.6),
                0 15px 35px rgba(0,0,0,0.5),
                0 0 0 2px #3a2e26 inset,
                0 0 0 4px #1e1812 inset;
            backdrop-filter: blur(0px);
            z-index: 5;
        }

        /* Заклёпки по углам */
        .rivet {
            position: absolute;
            width: 18px;
            height: 18px;
            background: radial-gradient(circle at 35% 35%, #b8a88a, #5a4a3a);
            border-radius: 50%;
            box-shadow: inset 0 1px 2px rgba(255,255,200,0.4), 0 2px 4px rgba(0,0,0,0.5);
            z-index: 6;
        }
        .rivet-tl { top: 15px; left: 15px; }
        .rivet-tr { top: 15px; right: 15px; }
        .rivet-bl { bottom: 15px; left: 15px; }
        .rivet-br { bottom: 15px; right: 15px; }

        /* Царапины и потёртости */
        .scratch {
            position: absolute;
            background: rgba(0,0,0,0.2);
            pointer-events: none;
            z-index: 5;
        }
        .scratch1 { top: 20%; left: 5%; width: 80px; height: 2px; transform: rotate(15deg); }
        .scratch2 { bottom: 25%; right: 8%; width: 120px; height: 1px; transform: rotate(-10deg); }
        .scratch3 { top: 60%; left: 15%; width: 50px; height: 1px; transform: rotate(45deg); }

        /* Куб */
        .test-cube-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 100px;
            height: 100px;
            perspective: 1000px;
            z-index: 100;
            cursor: pointer;
        }

        .test-cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s;
        }

        .cube-face {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 3px solid #e0e0e0;
            background-image: url('photo/cub.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 0 30px rgba(74, 144, 226, 0.8);
        }
        .front { transform: translateZ(50px); }
        .back { transform: rotateY(180deg) translateZ(50px); }
        .right { transform: rotateY(90deg) translateZ(50px); }
        .left { transform: rotateY(-90deg) translateZ(50px); }
        .top { transform: rotateX(90deg) translateZ(50px); }
        .bottom { transform: rotateX(-90deg) translateZ(50px); }

        /* Логотип */
        .logo {
            position: relative;
            font-size: 120px;
            font-weight: 700;
            color: #fff;
            text-shadow: 2px 2px 0 #4A90E2, 4px 4px 0 #2a5092, 6px 6px 0 #0a1052;
            letter-spacing: 8px;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1;
        }
        .logo span { color: #FF8C00; }
        .logo .logo-tagline {
            font-size: 28px;
            display: block;
            letter-spacing: normal;
            text-shadow: 1px 1px 0 #333;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .logo { font-size: 60px; letter-spacing: 4px; }
            .logo .logo-tagline { font-size: 18px; }
        }

        /* КРАСНАЯ КНОПКА */
        .red-button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 40px 0;
        }
        .red-smiley-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff6666, #cc3333);
            border: 6px solid #fff;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.6);
            cursor: pointer;
            transition: 0.1s linear;
        }
        .red-smiley-button:hover { transform: scale(1.05); box-shadow: 0 0 60px red; }
        .red-smiley-button:active { transform: scale(0.95); }

        .decorative-counter {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            border: 2px solid #FF8C00;
            padding: 10px 20px;
            margin-top: 20px;
            font-size: 20px;
            display: none;
        }
        .counter-value { color: #FF8C00; font-weight: bold; font-size: 28px; }

        /* КНОПКИ */
        .buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .btn {
            padding: 15px 35px;
            font-size: 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #4A90E2;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            color: #fff;
            text-decoration: none;
            display: inline-block;
            backdrop-filter: blur(5px);
        }
        .btn:hover {
            background: #4A90E2;
            color: #000;
            transform: translateY(-3px);
        }
        .btn-light { border-color: #FF8C00; }
        .btn-light:hover { background: #FF8C00; }

        /* ДАШБОРД (после логина) */
        .dashboard { display: none; text-align: center; margin-top: 30px; }
        .info-text { font-size: 18px; margin-bottom: 20px; color: #FF8C00; }
        .dashboard-buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .dash-btn {
            padding: 20px 40px;
            background: linear-gradient(145deg, #4A90E2, #2c5a8c);
            border-radius: 20px;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            box-shadow: 0 8px 0 #1a3a5a;
            transition: 0.1s;
        }
        .dash-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 0 #1a3a5a; }
        .dash-btn:active { transform: translateY(5px); box-shadow: 0 3px 0 #1a3a5a; }

        /* МАГАЗИН */
        .shop { display: none; width: 100%; margin-top: 30px; }
        .shop-title { font-size: 36px; color: #FF8C00; text-align: center; margin-bottom: 30px; }
        .shop-items { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .shop-item {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #4A90E2;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .shop-item:hover { transform: scale(1.02); border-color: #FF8C00; }
        .item-name { font-size: 20px; font-weight: bold; }
        .item-price { font-size: 24px; color: #FF8C00; margin: 15px 0; }

        /* ФУТЕР */
        .site-footer {
            margin-top: 60px;
            padding: 20px;
            border-top: 2px solid #4A90E2;
            background: rgba(0, 0, 0, 0.5);
            text-align: center;
            font-size: 14px;
        }
        .footer-stamp { color: #FF8C00; }
        .footer-link { color: #4A90E2; text-decoration: none; }

        /* ПРОФИЛЬ */
        .profile-button {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid #4A90E2;
            cursor: pointer;
            overflow: hidden;
            background: #000;
            z-index: 200;
            display: none;
        }
        .profile-button img { width: 100%; height: 100%; object-fit: cover; }

        /* ЧЕРДАК (верхняя панель) */
        .attic {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(120deg, #1e2a3a, #2c3e50);
            z-index: 150;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
        }
        .attic-content { font-size: 28px; font-weight: bold; color: #FF8C00; }
        .carousel-container {
            width: 300px;
            height: 60px;
            overflow: hidden;
            cursor: pointer;
            background: #222;
            border-radius: 12px;
        }
        .carousel-slide { display: flex; width: 100%; height: 100%; transition: transform 0.5s; }
        .carousel-slide img { width: 100%; height: 100%; object-fit: contain; flex-shrink: 0; }
        .attic-logout-btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 14px;
            cursor: pointer;
            display: none;
        }

        /* ВЫДВИЖНОЙ ЯЩИК */
        .drawer {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 280px;
            z-index: 1000;
        }
        .drawer-handle {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 80px;
            background: rgba(100, 100, 120, 0.4);
            border-radius: 0 8px 8px 0;
            cursor: ew-resize;
            z-index: 1002;
        }
        .drawer-content {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%) translateX(-100%);
            width: 260px;
            background: rgba(30, 25, 20, 0.95);
            backdrop-filter: blur(8px);
            border: 2px solid #4A90E2;
            border-left: none;
            border-radius: 0 20px 20px 0;
            padding: 20px;
            transition: transform 0.3s;
            z-index: 1001;
        }
        .drawer-paper {
            background: #fef7e0;
            padding: 15px;
            border-radius: 8px;
            color: #2c3e50;
            font-family: monospace;
            font-size: 14px;
            text-align: center;
        }
        .drawer.open .drawer-content { transform: translateY(-50%) translateX(0); }
        .drawer.open .drawer-handle { left: 260px; background: rgba(255, 140, 0, 0.6); }
        .drawer:not(.open) .drawer-content { pointer-events: none; }

        /* ВСПЛЫВАЮЩИЕ СООБЩЕНИЯ */
        .float-message {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #FF8C00;
            border-radius: 40px;
            padding: 10px 20px;
            font-size: 16px;
            color: #FF8C00;
            z-index: 10000;
            animation: fadeUp 3s forwards;
        }
        @keyframes fadeUp {
            0% { opacity: 1; bottom: 80px; }
            100% { opacity: 0; bottom: 100%; }
        }
    </style>
</head>
<body>

    <div class="attic">
        <div class="attic-content">⚛️ ASL</div>
        <div class="carousel-container" id="carouselContainer">
            <div class="carousel-slide" id="carouselSlide">
                <img src="photo/реклама.png" alt="1"><img src="photo/реклама1.png" alt="2"><img src="photo/реклама2.png" alt="3"><img src="photo/реклама3.png" alt="4">
            </div>
        </div>
        <button class="attic-logout-btn" id="atticLogoutBtn" onclick="logout()">ВЫЙТИ</button>
    </div>

    <div class="quartz-wall">
        <div class="rivet rivet-tl"></div><div class="rivet rivet-tr"></div>
        <div class="rivet rivet-bl"></div><div class="rivet rivet-br"></div>
        <div class="scratch scratch1"></div><div class="scratch scratch2"></div><div class="scratch scratch3"></div>

        <div class="container" style="position: relative; z-index: 10; text-align: center;">
            <div class="logo">
                A<span>S</span>L<span class="logo-tagline">— Если это можно вообразить, это можно создать!</span>
            </div>

            <div class="red-button-container">
                <div class="red-smiley-button" id="redSmiley" onclick="redButtonClick()"></div>
                <div class="decorative-counter" id="decorativeCounter">
                    Нажатий: <span class="counter-value" id="decorativeCount">0</span>
                </div>
            </div>

            <div class="buttons" id="main-buttons">
                <a href="reg.html" class="btn btn-blue">РЕГИСТРАЦИЯ</a>
                <a href="about.html" class="btn btn-light">О ASL</a>
            </div>

            <div class="dashboard" id="dashboard">
                <div class="info-text">ЗА КАЖДОЕ НАЖАТИЕ МЫ БРОСАЕМ КУБ НА ТЕСТИРОВЩИКА</div>
                <div class="dashboard-buttons">
                    <div class="dash-btn" onclick="showShop()">🛒 МАГАЗИН</div>
                    <a href="about.html" class="dash-btn">ℹ️ О ASL</a>
                </div>
            </div>

            <div class="shop" id="shop">
                <div class="shop-title">🛒 МАГАЗИН ASL</div>
                <div class="shop-items" id="shopItemsGrid"></div>
                <button class="btn btn-blue" style="margin-top: 20px;" onclick="backToDashboard()">НАЗАД</button>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-content">
            <span class="footer-info">ASL • отдел TToS • версия 2.0</span>
            <span class="footer-stamp">Лицензия CC BY-NC-ND 4.0</span>
            <a href="about.html" class="footer-link"># Извещение</a>
        </div>
    </footer>

    <div class="profile-button" id="profileButton" onclick="location.href='profile.html'">
        <img src="https://i.pinimg.com/originals/58/05/34/580534a241f377ea13478ef988376294.jpg" alt="Profile">
    </div>

    <div class="test-cube-container" onclick="cubeClick()">
        <div class="test-cube" id="test-cube">
            <div class="cube-face front"></div><div class="cube-face back"></div>
            <div class="cube-face right"></div><div class="cube-face left"></div>
            <div class="cube-face top"></div><div class="cube-face bottom"></div>
        </div>
    </div>

    <div class="drawer" id="drawer">
        <div class="drawer-handle" id="drawerHandle"></div>
        <div class="drawer-content">
            <div class="drawer-paper" id="drawerPaper">📜 32048-239</div>
        </div>
    </div>

    <script>
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        let cubeCount = localStorage.getItem('cubeCount') ? parseInt(localStorage.getItem('cubeCount')) : 100;
        let decorativeCount = localStorage.getItem('redButtonClicks') ? parseInt(localStorage.getItem('redButtonClicks')) : 0;
        let currentUser = localStorage.getItem('asl_user') ? JSON.parse(localStorage.getItem('asl_user')) : null;

        document.getElementById('decorativeCount').innerText = decorativeCount;
        if (currentUser) {
            document.getElementById('main-buttons').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('profileButton').style.display = 'block';
            document.getElementById('atticLogoutBtn').style.display = 'block';
            document.getElementById('decorativeCounter').style.display = 'flex';
        }

        function redButtonClick() {
            decorativeCount++;
            document.getElementById('decorativeCount').innerText = decorativeCount;
            localStorage.setItem('redButtonClicks', decorativeCount);
        }

        // Куб
        setInterval(() => {
            const cube = document.getElementById('test-cube');
            if (cube) cube.style.transform = `rotateX(${Date.now() / 50 % 360}deg) rotateY(${Date.now() / 100 % 360}deg)`;
        }, 50);

        function cubeClick() {
            const phrases = ["глюк: Осторожно с кубом!", "глюк: Куб не игрушка!", "глюк: Продолжай...", "куб: Больно!", "куб: ...", "глюк: Тебе делать нечего?", "глюк: Ещё куб?", "куб: ХВАТИТ!", "куб: ПЕРЕСТАНЬ!!!", "глюк: Ты пытаешься побить рекорд"];
            const msg = document.createElement('div');
            msg.className = 'float-message';
            msg.innerText = phrases[Math.floor(Math.random() * phrases.length)];
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);

            const cube = document.getElementById('test-cube');
            cube.style.transform = 'scale(1.2) rotateX(30deg) rotateY(30deg)';
            setTimeout(() => cube.style.transform = '', 200);
        }

        // Магазин
        const shopItems = [
            { id: 'radio', name: 'Радио-тостерная тарелка', price: 1337, image: 'photo/1.png' },
            { id: 'car', name: 'Машина на ядерном реакторе', price: 5000, image: 'photo/2.png' },
            { id: 'microwave', name: 'Микроволновка с реактивным двигателем', price: 9999, image: 'photo/3.png' },
            { id: 'fridge', name: 'Холодильник ГЛУКа', price: 2500, image: 'photo/4.png' },
            { id: 'kettle', name: 'Квантовый чайник', price: 777, image: 'photo/5.png' },
            { id: 'portal', name: 'Портал в другой мир', price: 1000000, image: 'photo/6.png' }
        ];

        function renderShop() {
            const grid = document.getElementById('shopItemsGrid');
            if (!grid) return;
            grid.innerHTML = '';
            shopItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'shop-item';
                div.innerHTML = `<div class="item-name">${item.name}</div><div class="item-price">${item.price} кубов</div>`;
                div.onclick = () => buyItem(item);
                grid.appendChild(div);
            });
        }

        function buyItem(item) {
            if (cubeCount < item.price) {
                alert(`Недостаточно кубов! Нужно ${item.price}, у вас ${cubeCount}`);
                return;
            }
            cubeCount -= item.price;
            localStorage.setItem('cubeCount', cubeCount);
            alert(`✅ Куплено: ${item.name} за ${item.price} кубов!`);
        }

        function showShop() { document.getElementById('dashboard').style.display = 'none'; document.getElementById('shop').style.display = 'block'; renderShop(); }
        function backToDashboard() { document.getElementById('shop').style.display = 'none'; document.getElementById('dashboard').style.display = 'block'; }
        function logout() {
            localStorage.removeItem('asl_user');
            location.reload();
        }

        // Карусель
        let currentSlide = 0;
        const slide = document.getElementById('carouselSlide');
        const slides = document.querySelectorAll('.carousel-slide img');
        function nextSlide() { currentSlide = (currentSlide + 1) % slides.length; slide.style.transform = `translateX(-${currentSlide * 100}%)`; }
        setInterval(nextSlide, 3000);
        document.getElementById('carouselContainer').onclick = () => alert('Скоро здесь появятся товары из магазина!');

        // Выдвижной ящик с динамическими записками
        const drawerNotes = [
            "📜 32048-239", "🔧 Не включать без перчаток", "⚠️ Протокол Синтеза: фрагмент #77",
            "🧪 Тест №6: результат нестабилен", "⚙️ Глюк: «Я здесь»", "📦 Кубов произведено: 10 000"
        ];
        const drawerPaper = document.getElementById('drawerPaper');
        setInterval(() => {
            drawerPaper.innerText = drawerNotes[Math.floor(Math.random() * drawerNotes.length)];
        }, 8000);

        // Выдвижение ящика
        const drawer = document.getElementById('drawer');
        const handle = document.getElementById('drawerHandle');
        let drag = false, startX = 0, startTranslate = 0;
        handle.onmousedown = (e) => { drag = true; startX = e.clientX; startTranslate = drawer.classList.contains('open') ? 260 : 0; document.onmousemove = onMouseMove; document.onmouseup = onMouseUp; e.preventDefault(); };
        function onMouseMove(e) { if (!drag) return; let delta = e.clientX - startX; let newPos = Math.min(260, Math.max(0, startTranslate + delta)); drawer.classList.toggle('open', newPos > 130); }
        function onMouseUp() { drag = false; document.onmousemove = null; document.onmouseup = null; }
    </script>
</body>
</html>
