<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL | Лаборатория Синтеза</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        /* ===== ОСНОВНЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        body {
            background: linear-gradient(145deg, #0a0f1a 0%, #0c111c 100%);
            color: #fff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 120px 20px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .logo {
            font-size: 80px;
            font-weight: 700;
            color: #fff;
            text-shadow: 2px 2px 0 #4A90E2, 4px 4px 0 #2a5092;
            letter-spacing: 10px;
            margin-bottom: 20px;
        }

        .logo span {
            color: #FF8C00;
        }

        .buttons {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #4A90E2;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            backdrop-filter: blur(10px);
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: #4A90E2;
            color: #000;
            transform: translateY(-3px);
        }

        .btn-light {
            border-color: #FF8C00;
        }

        .btn-light:hover {
            background: #FF8C00;
        }

        .user-info {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 40px;
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 100;
        }

        .user-name {
            color: #FF8C00;
            font-weight: bold;
        }

        .small-btn {
            background: #4A90E2;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        .small-btn:hover {
            background: #FF8C00;
        }

        .test-cube-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 100px;
            height: 100px;
            perspective: 1000px;
            z-index: 100;
            cursor: pointer;
        }

        .test-cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s;
        }

        .cube-face {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 3px solid #e0e0e0;
            background-image: url('photo/cub.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 0 30px rgba(74, 144, 226, 0.8);
        }

        .front { transform: translateZ(50px); }
        .back { transform: rotateY(180deg) translateZ(50px); }
        .right { transform: rotateY(90deg) translateZ(50px); }
        .left { transform: rotateY(-90deg) translateZ(50px); }
        .top { transform: rotateX(90deg) translateZ(50px); }
        .bottom { transform: rotateX(-90deg) translateZ(50px); }
    </style>
</head>
<body>
    <!-- КУБ -->
    <div class="test-cube-container" onclick="cubeClick()">
        <div class="test-cube" id="test-cube">
            <div class="cube-face front"></div>
            <div class="cube-face back"></div>
            <div class="cube-face right"></div>
            <div class="cube-face left"></div>
            <div class="cube-face top"></div>
            <div class="cube-face bottom"></div>
        </div>
    </div>

    <!-- КОНТЕЙНЕР ДЛЯ ИНФОРМАЦИИ О ПОЛЬЗОВАТЕЛЕ -->
    <div id="userPanel" class="user-info" style="display: none;">
        <span>👤 <span id="userName" class="user-name"></span></span>
        <button class="small-btn" onclick="goToProfile()">Профиль</button>
        <button class="small-btn" onclick="logout()">Выйти</button>
    </div>

    <div class="container">
        <div class="logo">
            A<span>S</span>L
        </div>
        <div class="buttons" id="authButtons">
            <a href="reg.html" class="btn">РЕГИСТРАЦИЯ</a>
            <a href="login.html" class="btn btn-light">ВОЙТИ</a>
        </div>
        <div class="buttons" id="userButtons" style="display: none;">
            <a href="profile.html" class="btn">ПРОФИЛЬ</a>
            <button class="btn btn-light" onclick="logout()">ВЫЙТИ</button>
        </div>
    </div>

    <script>
        // ========== FIREBASE КОНФИГ ==========
        const firebaseConfig = {
            apiKey: "AIzaSyAuCRlflkjJQeKd4EyBGQIa6wUNWLNKo3c",
            authDomain: "apex-8f11e.firebaseapp.com",
            projectId: "apex-8f11e",
            storageBucket: "apex-8f11e.firebasestorage.app",
            messagingSenderId: "923734077108",
            appId: "1:923734077108:web:f6d2d4059972c215c371e1",
            measurementId: "G-WTKS5JQ7Z5"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Анимация куба
        setInterval(() => {
            const cube = document.getElementById('test-cube');
            if (cube) {
                cube.style.transform = `rotateX(${Date.now() / 50 % 360}deg) rotateY(${Date.now() / 100 % 360}deg)`;
            }
        }, 50);

        function cubeClick() {
            const phrases = ["Глюк: Осторожнее!", "Куб не игрушка!", "Продолжай...", "Куб: Больно!", "Глюк: Тебе делать нечего?"];
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            alert(randomPhrase);
            const cube = document.getElementById('test-cube');
            cube.style.transform = 'scale(1.2) rotateX(30deg) rotateY(30deg)';
            setTimeout(() => cube.style.transform = '', 200);
        }

        // ========== ПРОВЕРКА АВТОРИЗАЦИИ ==========
        auth.onAuthStateChanged((user) => {
            const authButtons = document.getElementById('authButtons');
            const userButtons = document.getElementById('userButtons');
            const userPanel = document.getElementById('userPanel');
            const userNameSpan = document.getElementById('userName');

            if (user) {
                // Пользователь авторизован
                authButtons.style.display = 'none';
                userButtons.style.display = 'flex';
                userPanel.style.display = 'flex';
                
                // Получаем имя пользователя из localStorage или email
                const userData = JSON.parse(localStorage.getItem('asl_user'));
                if (userData && userData.username) {
                    userNameSpan.textContent = userData.username;
                } else {
                    userNameSpan.textContent = user.email.split('@')[0];
                }
            } else {
                // Пользователь не авторизован
                authButtons.style.display = 'flex';
                userButtons.style.display = 'none';
                userPanel.style.display = 'none';
            }
        });

        function goToProfile() {
            window.location.href = 'profile.html';
        }

        function logout() {
            auth.signOut().then(() => {
                localStorage.removeItem('asl_user');
                window.location.href = 'index.html';
            }).catch((error) => {
                console.error('Ошибка выхода:', error);
            });
        }
    </script>
</body>
</html>
