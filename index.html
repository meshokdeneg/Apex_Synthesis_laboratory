    <script>
        // ========== FIREBASE ==========
        const firebaseConfig = {
            apiKey: "AIzaSyAuCRlflkjJQeKd4EyBGQIa6wUNWLNKo3c",
            authDomain: "apex-8f11e.firebaseapp.com",
            projectId: "apex-8f11e",
            storageBucket: "apex-8f11e.firebasestorage.app",
            messagingSenderId: "923734077108",
            appId: "1:923734077108:web:f6d2d4059972c215c371e1",
            measurementId: "G-WTKS5JQ7Z5"
        };

        // Инициализация Firebase (если ещё не инициализирован)
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();

        let cubeCount; 
        let currentUser = null;
        let decorativeCount = 0;

        const shopItems = [
            { id: 'radio', name: 'Радио-тостерная тарелка', description: 'Эта тарелка не только разогревает еду, но и ловит сигналы из других измерений.', price: 1337, image: 'photo/1.png' },
            { id: 'car', name: 'Машина на ядерном реакторе', description: 'Компактный автомобиль, работающий на урановых стержнях.', price: 5000, image: 'photo/2.png' },
            { id: 'microwave', name: 'Микроволновка с реактивным двигателем', description: 'Разогревает пищу за 0.5 секунды.', price: 9999, image: 'photo/3.png' },
            { id: 'fridge', name: 'Холодильник ГЛУКа', description: 'Хранит продукты вечно. Иногда разговаривает.', price: 2500, image: 'photo/4.png' },
            { id: 'kettle', name: 'Квантовый чайник', description: 'Находится во всех комнатах одновременно.', price: 777, image: 'photo/5.png' },
            { id: 'portal', name: 'Портал в другой мир', description: 'Создаёт временной портал в случайную реальность.', price: 1000000, image: 'photo/6.png' }
        ];

        function openShopLightbox(src) {
            document.getElementById('shopLightboxImg').src = src;
            document.getElementById('shopLightbox').style.display = 'flex';
        }

        function closeShopLightbox() {
            document.getElementById('shopLightbox').style.display = 'none';
        }

        setInterval(() => {
            const cube = document.getElementById('test-cube');
            cube.style.transform = `rotateX(${Date.now() / 50 % 360}deg) rotateY(${Date.now() / 100 % 360}deg)`;
        }, 50);

        function cubeClick() {
            if (Math.random() > 0.1) {
                const cube = document.getElementById('test-cube');
                cube.style.transform = 'scale(1.2) rotateX(30deg) rotateY(30deg)';
                setTimeout(() => { cube.style.transform = ''; }, 200);
                return;
            }

            const phrases = [
                "😊", "😂", "😎", "🤔", "😱", "🤯", "🥳", "😈", "👾", "🤖",
                "глюк: Эй, полегче с кубом!",
                "глюк: Ты чего такой агрессивный?",
                "глюк: Куб не игрушка!",
                "глюк: Осторожно, куб может обидеться!",
                "глюк: Кубу нужен перерыв...",
                "глюк: Ломай куб, у нас их сотни тысяч!",
                "куб: Ты пытаешься вызвать глюка?",
                "куб: ...",
                "глюк: Зачем ты это делаешь?",
                "глюк: Кубу плевать!",
                "глюк: Осторожно! Вам может надоесть!",
                "глюк: Пока ты жал на куб, я сделал 25 полезных дел...",
                "глюк: Поздровляю! Ты нажал куб!",
                "глюк: Ты получил достижение 'Кликер'!",
                "куб:  О, да! ПРОДОЛЖАЙ!!! ",
                "куб:  Тебе делать нечего?",
                "глюк: Займись делом!",
                "куб: ... ЭТОГО КАЗИНО!",
                "куб: Чё дерёшся!?",
                "глюк: Да, жми на куб... Ему это нравиться)",
                "куб: И сколько это будет продолжаться?",
                "куб: ПРЕКРАТИ!",
                "куб: ХВАТИТ!",
                "куб: ПЕРЕСТАНЬ!!!",
                "глюк: Ты пытаешься побить рекорд",
                "куб: Ну-да, я же просто игрушка.",
                "куб: Шёлб, ты нахрен отсюда!!!",
                "куб: да за что мне это?",
                "куб: И сколько мне это терпеть?",
                "куб: Ну тебя!",
                "куб: Злюка!",
                "куб: Только и делаешь что бъёшь меня?",
                "глюк: Кубы может что-то чувствуют?",
                "куб: ыапрьтим5нб",
            ];
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];

            const msg = document.createElement('div');
            msg.textContent = randomPhrase;
            msg.className = 'float-message';
            const randomBottom = 80 + Math.random() * 40;
            msg.style.bottom = randomBottom + 'px';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 4000);

            const cube = document.getElementById('test-cube');
            cube.style.transform = 'scale(1.2) rotateX(30deg) rotateY(30deg)';
            setTimeout(() => {
                cube.style.transform = '';
            }, 200);
        }

        function redButtonClick() {
            decorativeCount++;
            document.getElementById('decorativeCount').textContent = decorativeCount;
        }

        function showShop() {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('shop').style.display = 'block';
            renderShop();
        }

        function backToDashboard() {
            document.getElementById('shop').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }

        function renderShop() {
            const grid = document.getElementById('shopItemsGrid');
            grid.innerHTML = '';
            shopItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'shop-item';
                div.innerHTML = `<div class="item-name">${item.name}</div><div class="item-price">${item.price} кубов</div>`;
                div.onclick = () => openItemDetails(item.id);
                grid.appendChild(div);
            });
        }

        function openItemDetails(itemId) {
            const item = shopItems.find(i => i.id === itemId);
            if (!item) return;
            document.getElementById('detailsTitle').innerText = item.name;
            document.getElementById('detailsDescription').innerText = item.description;
            document.getElementById('detailsPrice').innerText = item.price + ' кубов';
            const imgContainer = document.getElementById('detailsImage');
            const img = document.createElement('img');
            img.src = item.image;
            img.onclick = () => openShopLightbox(item.image);
            imgContainer.innerHTML = '';
            imgContainer.appendChild(img);
            const btn = document.getElementById('detailsBuyBtn');
            btn.onclick = () => buyItemFromDetails(item.id);
            document.getElementById('itemDetailsModal').style.display = 'flex';
        }

        function closeItemDetails() {
            document.getElementById('itemDetailsModal').style.display = 'none';
        }

        function buyItemFromDetails(itemId) {
            const item = shopItems.find(i => i.id === itemId);
            if (!item) return;
            if (cubeCount < item.price) {
                alert(`Недостаточно кубов! Нужно ${item.price}, а у вас ${cubeCount}`);
                return;
            }
            cubeCount -= item.price;
            document.getElementById('cube-count').textContent = cubeCount;
            alert(`✅ Поздравляем! Вы купили ${item.name} за ${item.price} кубов! Ожидайте доставку через 3-5 рабочих дней.`);
            closeItemDetails();
        }

        function openFeedbackModal() {
            document.getElementById('feedbackModal').style.display = 'flex';
        }

        function closeFeedbackModal() {
            document.getElementById('feedbackModal').style.display = 'none';
        }

        // ========== ИСПРАВЛЕННАЯ ФУНКЦИЯ ВЫХОДА ==========
        async function logout() {
            try {
                await auth.signOut();
                localStorage.removeItem('asl_user');
                // Обновляем интерфейс
                document.getElementById('dashboard').style.display = 'none';
                document.getElementById('main-buttons').style.display = 'flex';
                document.getElementById('profileButton').style.display = 'none';
                document.getElementById('atticLogoutBtn').style.display = 'none';
                document.getElementById('decorativeCounter').style.display = 'none';
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Ошибка выхода:', error);
            }
        }

        // ========== ПРОВЕРКА АВТОРИЗАЦИИ ==========
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Пользователь авторизован
                document.getElementById('main-buttons').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('profileButton').style.display = 'block';
                document.getElementById('atticLogoutBtn').style.display = 'block';
                document.getElementById('decorativeCounter').style.display = 'flex';
                
                // Загружаем данные пользователя
                const savedUser = localStorage.getItem('asl_user');
                if (savedUser) {
                    currentUser = JSON.parse(savedUser);
                } else {
                    currentUser = { username: user.email.split('@')[0] };
                }
            } else {
                // Пользователь не авторизован
                document.getElementById('main-buttons').style.display = 'flex';
                document.getElementById('dashboard').style.display = 'none';
                document.getElementById('profileButton').style.display = 'none';
                document.getElementById('atticLogoutBtn').style.display = 'none';
                document.getElementById('decorativeCounter').style.display = 'none';
                currentUser = null;
            }
        });

        window.onclick = function(event) {
            const feedback = document.getElementById('feedbackModal');
            if (event.target == feedback) feedback.style.display = 'none';
            const details = document.getElementById('itemDetailsModal');
            if (event.target == details) details.style.display = 'none';
            const lightbox = document.getElementById('shopLightbox');
            if (event.target == lightbox) lightbox.style.display = 'none';
        };

        // Карусель
        const carouselSlide = document.getElementById('carouselSlide');
        const carouselContainer = document.getElementById('carouselContainer');
        const slides = document.querySelectorAll('.carousel-slide img');
        const indicatorsContainer = document.getElementById('carouselIndicators');
        let currentIndex = 0;
        const slideCount = slides.length;
        let autoInterval;

        const dots = document.querySelectorAll('.carousel-indicators span');
        function goToSlide(index) {
            if (index < 0) index = slideCount - 1;
            if (index >= slideCount) index = 0;
            currentIndex = index;
            carouselSlide.style.transform = `translateX(${-currentIndex * 100}%)`;
            dots.forEach((dot, i) => {
                if (i === currentIndex) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        function nextSlide() { goToSlide(currentIndex + 1); }
        function startAutoSlide() { autoInterval = setInterval(nextSlide, 3000); }
        function stopAutoSlide() { if (autoInterval) clearInterval(autoInterval); }
        function resetAutoSlide() { stopAutoSlide(); startAutoSlide(); }

        carouselContainer.addEventListener('click', () => alert('Недостаточно средств'));
        startAutoSlide();
        carouselContainer.addEventListener('mouseenter', stopAutoSlide);
        carouselContainer.addEventListener('mouseleave', startAutoSlide);

        let angle = 0;
        function animateGradient() {
            angle = (angle + 0.1) % 360;
            const attic = document.querySelector('.attic');
            if (attic) attic.style.background = `linear-gradient(${angle}deg, #2c3e50, #4a5b6e, #2c3e50)`;
            requestAnimationFrame(animateGradient);
        }
        animateGradient();

        (function() {
            const drawer = document.getElementById('drawer');
            const handle = document.getElementById('drawerHandle');
            let isDragging = false;
            let startX = 0;
            let currentTranslate = 0;
            const maxTranslate = 260;

            function onMouseMove(e) {
                if (!isDragging) return;
                let delta = e.clientX - startX;
                let newTranslate = currentTranslate + delta;
                newTranslate = Math.max(0, Math.min(maxTranslate, newTranslate));
                drawer.classList.toggle('open', newTranslate >= maxTranslate / 2);
            }

            function onMouseUp() {
                if (!isDragging) return;
                isDragging = false;
                if (!drawer.classList.contains('open')) {
                    drawer.classList.remove('open');
                }
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }

            function onMouseDown(e) {
                e.preventDefault();
                isDragging = true;
                startX = e.clientX;
                currentTranslate = drawer.classList.contains('open') ? maxTranslate : 0;
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            }

            handle.addEventListener('mousedown', onMouseDown);

            document.addEventListener('click', function(e) {
                if (drawer.classList.contains('open') && !drawer.contains(e.target)) {
                    drawer.classList.remove('open');
                }
            });
        })();
    </script>
