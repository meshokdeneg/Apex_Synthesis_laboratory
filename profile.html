<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ASL | Профиль</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getDatabase, ref, set, get, update, push, onValue, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAuCRlflkjJQeKd4EyBGQIa6wUNWLNKo3c",
            authDomain: "apex-8f11e.firebaseapp.com",
            databaseURL: "https://apex-8f11e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "apex-8f11e",
            storageBucket: "apex-8f11e.firebasestorage.app",
            messagingSenderId: "923734077108",
            appId: "1:923734077108:web:f6d2d4059972c215c371e1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // DOM
        const loginScreen = document.getElementById('loginScreen');
        const profileScreen = document.getElementById('profileScreen');
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const loginNickname = document.getElementById('loginNickname');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginError = document.getElementById('loginError');
        
        const avatar = document.getElementById('avatar');
        const profileName = document.getElementById('profileName');
        const profileDescription = document.getElementById('profileDescription');
        const profileLevel = document.getElementById('profileLevel');
        const editAccountBtn = document.getElementById('editAccountBtn');
        const achievementsBtn = document.getElementById('achievementsBtn');
        const friendsBtn = document.getElementById('friendsBtn');
        const groupsBtn = document.getElementById('groupsBtn');
        const friendsList = document.getElementById('friendsList');
        const backBtn = document.getElementById('backBtn');
        const addFriendInput = document.getElementById('addFriendInput');
        const addFriendBtn = document.getElementById('addFriendBtn');
        const friendSearchResult = document.getElementById('friendSearchResult');
        
        let currentUserData = null;
        let unsubscribeFriends = null;

        // Проверка уникальности ника
        async function isNicknameUnique(nickname) {
            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            if (!snapshot.exists()) return true;
            const users = snapshot.val();
            for (let uid in users) {
                if (users[uid].name === nickname) return false;
            }
            return true;
        }

        // Регистрация
        registerBtn.addEventListener('click', async () => {
            const email = loginEmail.value.trim();
            const password = loginPassword.value;
            const nickname = loginNickname.value.trim();
            
            if (!email || !password || !nickname) {
                loginError.textContent = 'Заполните все поля';
                loginError.style.display = 'block';
                return;
            }
            
            const isUnique = await isNicknameUnique(nickname);
            if (!isUnique) {
                loginError.textContent = 'Этот ник уже занят';
                loginError.style.display = 'block';
                return;
            }
            
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                await set(ref(db, 'users/' + userCred.user.uid), {
                    email: email,
                    name: nickname,
                    description: 'Сотрудник ASL',
                    level: 1,
                    friends: {},
                    incomingRequests: {},
                    createdAt: Date.now()
                });
                loginError.style.display = 'none';
                loginNickname.value = '';
            } catch (error) {
                loginError.textContent = error.message;
                loginError.style.display = 'block';
            }
        });

        // Вход
        loginBtn.addEventListener('click', async () => {
            const email = loginEmail.value.trim();
            const password = loginPassword.value;
            if (!email || !password) {
                loginError.textContent = 'Заполните email и пароль';
                loginError.style.display = 'block';
                return;
            }
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                loginError.textContent = 'Неверный email или пароль';
                loginError.style.display = 'block';
            }
        });

        // Выход
        logoutBtn.addEventListener('click', async () => {
            await signOut(auth);
        });

        // Редактировать аккаунт
        editAccountBtn.addEventListener('click', () => {
            const newDesc = prompt('Введите новое описание:', currentUserData?.description || '');
            if (newDesc !== null && currentUserData) {
                update(ref(db, 'users/' + currentUserData.uid), { description: newDesc });
            }
        });

        // Кнопки-заглушки
        achievementsBtn.addEventListener('click', () => alert('Заслуги: пока пусто'));
        groupsBtn.addEventListener('click', () => alert('Группы: пока пусто'));

        // Назад
        backBtn.addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        // Поиск и добавление друга по нику
        addFriendBtn.addEventListener('click', async () => {
            const nickname = addFriendInput.value.trim();
            if (!nickname) {
                friendSearchResult.textContent = 'Введите ник';
                friendSearchResult.style.display = 'block';
                setTimeout(() => friendSearchResult.style.display = 'none', 3000);
                return;
            }
            
            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            if (!snapshot.exists()) {
                friendSearchResult.textContent = 'Пользователь не найден';
                friendSearchResult.style.display = 'block';
                setTimeout(() => friendSearchResult.style.display = 'none', 3000);
                return;
            }
            
            let foundUser = null;
            const users = snapshot.val();
            for (let uid in users) {
                if (users[uid].name === nickname) {
                    foundUser = { id: uid, ...users[uid] };
                    break;
                }
            }
            
            if (!foundUser) {
                friendSearchResult.textContent = 'Пользователь с таким ником не найден';
                friendSearchResult.style.display = 'block';
                setTimeout(() => friendSearchResult.style.display = 'none', 3000);
                return;
            }
            
            if (foundUser.id === currentUserData.uid) {
                friendSearchResult.textContent = 'Нельзя добавить самого себя';
                friendSearchResult.style.display = 'block';
                setTimeout(() => friendSearchResult.style.display = 'none', 3000);
                return;
            }
            
            const isFriend = currentUserData.friends && currentUserData.friends[foundUser.id];
            if (isFriend) {
                friendSearchResult.textContent = `${foundUser.name} уже в друзьях`;
                friendSearchResult.style.display = 'block';
                setTimeout(() => friendSearchResult.style.display = 'none', 3000);
                return;
            }
            
            // Отправляем заявку
            await set(ref(db, `users/${foundUser.id}/incomingRequests/${currentUserData.uid}`), {
                fromId: currentUserData.uid,
                fromName: currentUserData.name
            });
            friendSearchResult.textContent = `Заявка отправлена ${foundUser.name}`;
            friendSearchResult.style.display = 'block';
            setTimeout(() => friendSearchResult.style.display = 'none', 3000);
            addFriendInput.value = '';
        });

        // Слушаем авторизацию
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loginScreen.style.display = 'none';
                profileScreen.style.display = 'block';
                currentUserData = { uid: user.uid, email: user.email };
                
                const userRef = ref(db, 'users/' + user.uid);
                const snapshot = await get(userRef);
                if (!snapshot.exists()) {
                    await set(userRef, {
                        email: user.email,
                        name: user.email.split('@')[0],
                        description: 'Сотрудник ASL',
                        level: 1,
                        friends: {},
                        incomingRequests: {},
                        createdAt: Date.now()
                    });
                }
                
                subscribeToUserData(user.uid);
            } else {
                loginScreen.style.display = 'flex';
                profileScreen.style.display = 'none';
                loginEmail.value = '';
                loginPassword.value = '';
                loginNickname.value = '';
                loginError.style.display = 'none';
                if (unsubscribeFriends) unsubscribeFriends();
            }
        });

        // Подписка на данные пользователя
        function subscribeToUserData(uid) {
            const userRef = ref(db, 'users/' + uid);
            onValue(userRef, (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    currentUserData = { ...currentUserData, ...data };
                    profileName.textContent = data.name;
                    profileDescription.textContent = data.description || 'Сотрудник ASL';
                    profileLevel.textContent = data.level || 1;
                    
                    renderFriendsList(data.friends || {});
                }
            });
        }

        // Рендер списка друзей
        function renderFriendsList(friends) {
            const friendsArray = Object.entries(friends).map(([id, friend]) => ({ id, ...friend }));
            if (!friendsArray.length) {
                friendsList.innerHTML = '<div style="padding: 15px; text-align: center; color: #555;">Нет друзей</div>';
                return;
            }
            friendsList.innerHTML = '';
            friendsArray.forEach(friend => {
                const div = document.createElement('div');
                div.className = 'friend-item';
                div.innerHTML = `
                    <span class="friend-name">${friend.name}</span>
                    <button class="view-profile-btn" data-id="${friend.id}" data-name="${friend.name}">👁️ Профиль</button>
                `;
                friendsList.appendChild(div);
            });
            
            document.querySelectorAll('.view-profile-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const friendId = btn.getAttribute('data-id');
                    const friendName = btn.getAttribute('data-name');
                    const friendRef = ref(db, 'users/' + friendId);
                    const snapshot = await get(friendRef);
                    if (snapshot.exists()) {
                        const friendData = snapshot.val();
                        alert(`👤 ${friendData.name}\n📧 ${friendData.email}\n📝 ${friendData.description || 'Нет описания'}\n⭐ Уровень: ${friendData.level || 1}`);
                    } else {
                        alert('Данные пользователя не найдены');
                    }
                });
            });
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0f1a;
            font-family: 'Segoe UI', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        /* Компьютерный стиль ASL */
        .asl-computer {
            max-width: 1200px;
            width: 100%;
            background: #001a00;
            border-radius: 16px;
            border: 2px solid #00ff9d;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.3);
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        /* Монитор */
        .monitor {
            background: #000000;
            padding: 20px;
        }
        .screen {
            background: #0a1a0a;
            border: 1px solid #00ff9d;
            border-radius: 8px;
            padding: 20px;
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }
        /* Верхняя панель */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #00ff9d;
        }
        .user-icon {
            font-size: 24px;
            color: #00ff9d;
        }
        .user-name {
            color: #00ff9d;
            font-size: 18px;
            font-weight: bold;
        }
        /* Основной контент */
        .main-content {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        /* Левая колонка — профиль */
        .profile-section {
            flex: 2;
            min-width: 250px;
        }
        .profile-card {
            background: #0a1a0a;
            border: 1px solid #00ff9d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .profile-avatar {
            font-size: 48px;
            color: #00ff9d;
        }
        .profile-info h2 {
            color: #00ff9d;
            font-size: 24px;
        }
        .profile-info p {
            color: #88ffaa;
            font-size: 14px;
        }
        .profile-description {
            color: #bbffcc;
            margin: 15px 0;
            padding: 10px;
            background: #001a00;
            border-left: 3px solid #00ff9d;
        }
        .level-info {
            color: #00ff9d;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .edit-btn {
            background: transparent;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            width: 100%;
        }
        .edit-btn:hover {
            background: #00ff9d;
            color: #000;
        }
        /* Правая колонка */
        .actions-section {
            flex: 1;
            min-width: 250px;
        }
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .action-btn {
            background: #001a00;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
            text-align: center;
        }
        .action-btn:hover {
            background: #00ff9d;
            color: #000;
        }
        .friends-box {
            background: #0a1a0a;
            border: 1px solid #00ff9d;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .friends-box h3 {
            color: #00ff9d;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .friends-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .friend-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #00ff9d33;
        }
        .friend-name {
            color: #bbffcc;
        }
        .view-profile-btn {
            background: transparent;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .view-profile-btn:hover {
            background: #00ff9d;
            color: #000;
        }
        .add-friend {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }
        .add-friend input {
            flex: 1;
            background: #001a00;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 8px;
            font-family: monospace;
        }
        .add-friend input::placeholder {
            color: #00ff9d66;
        }
        .add-friend button {
            background: #001a00;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 8px 16px;
            cursor: pointer;
        }
        .search-result {
            margin-top: 8px;
            font-size: 12px;
            color: #ffaa44;
            display: none;
        }
        .back-btn {
            background: #001a00;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            text-align: center;
            width: 100%;
        }
        .back-btn:hover {
            background: #00ff9d;
            color: #000;
        }
        /* Экран входа */
        .login-container {
            max-width: 400px;
            margin: 0 auto;
            background: #0a1a0a;
            border: 2px solid #00ff9d;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
        }
        .login-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #001a00;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            font-family: monospace;
        }
        .login-container button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #001a00;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            cursor: pointer;
            font-family: monospace;
        }
        .login-container button:hover {
            background: #00ff9d;
            color: #000;
        }
        .error-msg {
            color: #ff4444;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }
        @media (max-width: 800px) {
            .main-content { flex-direction: column; }
            .top-bar { justify-content: space-between; }
        }
    </style>
</head>
<body>
<div class="asl-computer">
    <div class="monitor">
        <div class="screen">
            <!-- Экран входа -->
            <div id="loginScreen" style="display: flex; justify-content: center; align-items: center; min-height: 500px;">
                <div class="login-container">
                    <h2 style="color: #00ff9d; margin-bottom: 20px;">🏷️ БЕЙДЖ ASL</h2>
                    <input type="text" id="loginNickname" placeholder="Ник (при регистрации)">
                    <input type="email" id="loginEmail" placeholder="Email">
                    <input type="password" id="loginPassword" placeholder="Пароль">
                    <button id="loginBtn">ВОЙТИ</button>
                    <button id="registerBtn">ЗАРЕГИСТРИРОВАТЬСЯ</button>
                    <div class="error-msg" id="loginError"></div>
                </div>
            </div>
            
            <!-- Профиль -->
            <div id="profileScreen" style="display: none;">
                <div class="top-bar">
                    <div style="flex:1"></div>
                    <div class="user-icon">🧪</div>
                    <div class="user-name" id="profileName">Загрузка...</div>
                    <button id="logoutBtn" style="background:transparent; border:1px solid #00ff9d; color:#00ff9d; padding:4px 12px; cursor:pointer;">ВЫЙТИ</button>
                </div>
                
                <div class="main-content">
                    <div class="profile-section">
                        <div class="profile-card">
                            <div class="profile-header">
                                <div class="profile-avatar">⚛️</div>
                                <div class="profile-info">
                                    <h2 id="profileNameLarge">Загрузка...</h2>
                                    <p>Сотрудник ASL</p>
                                </div>
                            </div>
                            <div class="profile-description" id="profileDescription">Загрузка...</div>
                            <div class="level-info">⭐ УРОВЕНЬ: <span id="profileLevel">1</span></div>
                            <button class="edit-btn" id="editAccountBtn">✏️ РЕДАКТИРОВАТЬ АККАУНТ</button>
                        </div>
                    </div>
                    
                    <div class="actions-section">
                        <div class="action-buttons">
                            <button class="action-btn" id="achievementsBtn">🏆 ЗАСЛУГИ</button>
                            <button class="action-btn" id="friendsBtn" style="background:#00ff9d20;">👥 ДРУЗЬЯ</button>
                            <button class="action-btn" id="groupsBtn">👥 ГРУППЫ</button>
                        </div>
                        
                        <div class="friends-box">
                            <h3>👥 ДРУЗЬЯ</h3>
                            <div class="friends-list" id="friendsList">Загрузка...</div>
                            <div class="add-friend">
                                <input type="text" id="addFriendInput" placeholder="Ник для добавления">
                                <button id="addFriendBtn">➕</button>
                            </div>
                            <div class="search-result" id="friendSearchResult"></div>
                        </div>
                        
                        <button class="back-btn" id="backBtn">🔙 ВЕРНУТЬСЯ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
