<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ASL | Профиль</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: url('https://static.planetminecraft.com/files/image/minecraft/texture-pack/2021/362/14416263-quartzpack_l.jpg') repeat;
            background-size: 64px 64px;
            font-family: 'Segoe UI', 'Courier New', monospace;
            color: #1a1a1a;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .asl-container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(1px);
            border: 2px solid #b0b0b0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            overflow: hidden;
        }

        .header {
            background: #1a2a2f;
            padding: 20px 30px;
            border-bottom: 4px solid #FF8C00;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            font-size: 28px;
            color: #FF8C00;
            letter-spacing: 1px;
        }

        .logout-btn {
            background: #2c3e2f;
            border: 1px solid #FF8C00;
            border-radius: 30px;
            padding: 6px 20px;
            font-size: 14px;
            font-weight: bold;
            color: #FF8C00;
            cursor: pointer;
        }

        .nav {
            background: #2c3e2f;
            padding: 10px 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            border-bottom: 1px solid #4A90E2;
        }

        .nav a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        .nav a:hover { color: #FF8C00; }

        /* ДВЕ КОЛОНКИ */
        .profile-layout {
            display: flex;
            gap: 30px;
            padding: 30px;
            flex-wrap: wrap;
        }

        /* ЛЕВАЯ КОЛОНКА — информация о пользователе */
        .profile-left {
            flex: 2;
            min-width: 250px;
        }

        .profile-card {
            background: #f9f9f9;
            border-left: 4px solid #FF8C00;
            padding: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .avatar {
            font-size: 64px;
            background: #2c3e2f;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FF8C00;
            border: 2px solid #FF8C00;
        }

        .profile-name {
            font-size: 28px;
            font-weight: bold;
            color: #1a2a2f;
        }

        .profile-email {
            color: #666;
            font-size: 14px;
        }

        .profile-description {
            margin: 20px 0;
            padding: 15px;
            background: white;
            border-left: 3px solid #FF8C00;
            color: #333;
        }

        .level-box {
            margin: 15px 0;
            padding: 10px;
            background: #f0f0f0;
            display: inline-block;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .edit-btn {
            background: #2c3e2f;
            border: 1px solid #FF8C00;
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: bold;
            color: #FF8C00;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        /* ПРАВАЯ КОЛОНКА — кнопки и друзья */
        .profile-right {
            flex: 1;
            min-width: 280px;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .action-btn {
            background: #2c3e2f;
            border: 1px solid #FF8C00;
            border-radius: 40px;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: #FF8C00;
            cursor: pointer;
            text-align: center;
        }

        .action-btn:hover {
            background: #FF8C00;
            color: #1a2a2f;
        }

        .friends-box {
            background: #f9f9f9;
            border-left: 4px solid #FF8C00;
            padding: 20px;
            margin-bottom: 25px;
        }

        .friends-box h3 {
            color: #1a2a2f;
            margin-bottom: 15px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 8px;
        }

        .friends-list {
            max-height: 250px;
            overflow-y: auto;
        }

        .friend-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .friend-name {
            font-weight: bold;
            color: #1a2a2f;
        }

        .view-profile-btn {
            background: #2c3e2f;
            border: 1px solid #FF8C00;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            color: #FF8C00;
            cursor: pointer;
        }

        .add-friend {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .add-friend input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-family: inherit;
        }

        .add-friend button {
            background: #2c3e2f;
            border: 1px solid #FF8C00;
            border-radius: 30px;
            padding: 8px 18px;
            color: #FF8C00;
            cursor: pointer;
        }

        .search-result {
            margin-top: 8px;
            font-size: 12px;
            color: #c0392b;
            display: none;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: #FF8C00;
            text-decoration: none;
            font-weight: bold;
        }

        .footer {
            background: #1a2a2f;
            color: #aaa;
            padding: 15px 30px;
            text-align: center;
            font-size: 12px;
            border-top: 1px solid #4A90E2;
        }

        .login-container {
            max-width: 450px;
            margin: 50px auto;
            background: white;
            border: 3px solid #FF8C00;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
        }

        .login-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .login-container button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #2c3e2f;
            border: none;
            border-radius: 30px;
            color: #FF8C00;
            font-weight: bold;
            cursor: pointer;
        }

        .error-msg {
            color: #c0392b;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }

        @media (max-width: 800px) {
            .profile-layout { flex-direction: column; }
            .profile-header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
<div class="asl-container" id="appContainer">
    <!-- Контент будет загружен через JS -->
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAuCRlflkjJQeKd4EyBGQIa6wUNWLNKo3c",
        authDomain: "apex-8f11e.firebaseapp.com",
        databaseURL: "https://apex-8f11e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "apex-8f11e",
        storageBucket: "apex-8f11e.firebasestorage.app",
        messagingSenderId: "923734077108",
        appId: "1:923734077108:web:f6d2d4059972c215c371e1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const container = document.getElementById('appContainer');

    // Проверка уникальности ника
    async function isNicknameUnique(nickname) {
        const snapshot = await get(ref(db, 'users'));
        if (!snapshot.exists()) return true;
        const users = snapshot.val();
        for (let uid in users) {
            if (users[uid].name === nickname) return false;
        }
        return true;
    }

    // Рендер экрана входа
    function renderLogin() {
        container.innerHTML = `
            <div class="login-container">
                <h2 style="margin-bottom: 20px;">🏷️ БЕЙДЖ ASL</h2>
                <input type="text" id="loginNickname" placeholder="Ник (при регистрации)">
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button id="loginBtn">ВОЙТИ</button>
                <button id="registerBtn">ЗАРЕГИСТРИРОВАТЬСЯ</button>
                <div class="error-msg" id="loginError"></div>
            </div>
        `;
        
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                const errDiv = document.getElementById('loginError');
                errDiv.textContent = 'Неверный email или пароль';
                errDiv.style.display = 'block';
            }
        };
        
        document.getElementById('registerBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const nickname = document.getElementById('loginNickname').value.trim();
            const errDiv = document.getElementById('loginError');
            
            if (!email || !password || !nickname) {
                errDiv.textContent = 'Заполните все поля';
                errDiv.style.display = 'block';
                return;
            }
            
            const unique = await isNicknameUnique(nickname);
            if (!unique) {
                errDiv.textContent = 'Этот ник уже занят';
                errDiv.style.display = 'block';
                return;
            }
            
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                await set(ref(db, 'users/' + userCred.user.uid), {
                    email: email,
                    name: nickname,
                    description: 'Сотрудник ASL',
                    level: 1,
                    friends: {},
                    incomingRequests: {},
                    createdAt: Date.now()
                });
                errDiv.style.display = 'none';
            } catch (error) {
                errDiv.textContent = error.message;
                errDiv.style.display = 'block';
            }
        };
    }

    // Рендер профиля
    function renderProfile(user, userData) {
        const friends = userData.friends || {};
        const friendsList = Object.entries(friends).map(([id, f]) => ({ id, name: f.name }));
        
        container.innerHTML = `
            <div class="header">
                <h1>🔹 ПРОФИЛЬ ASL</h1>
                <button class="logout-btn" id="logoutBtn">🚪 ВЫЙТИ</button>
            </div>
            <div class="nav">
                <a href="index.html">🏠 ГЛАВНАЯ</a>
                <a href="lore.html">📖 ЛОР</a>
                <a href="games.html">🎮 ИГРЫ</a>
            </div>
            <div class="profile-layout">
                <div class="profile-left">
                    <div class="profile-card">
                        <div class="profile-header">
                            <div class="avatar">⚛️</div>
                            <div>
                                <div class="profile-name" id="profileName">${escapeHtml(userData.name)}</div>
                                <div class="profile-email">${escapeHtml(user.email)}</div>
                            </div>
                        </div>
                        <div class="profile-description" id="profileDesc">${escapeHtml(userData.description || 'Сотрудник ASL')}</div>
                        <div class="level-box">⭐ УРОВЕНЬ: ${userData.level || 1}</div>
                        <button class="edit-btn" id="editAccountBtn">✏️ РЕДАКТИРОВАТЬ АККАУНТ</button>
                    </div>
                </div>
                <div class="profile-right">
                    <div class="action-buttons">
                        <button class="action-btn" id="achievementsBtn">🏆 ЗАСЛУГИ</button>
                        <button class="action-btn" id="friendsBtn" style="background:#FF8C0020;">👥 ДРУЗЬЯ</button>
                        <button class="action-btn" id="groupsBtn">👥 ГРУППЫ</button>
                    </div>
                    <div class="friends-box">
                        <h3>👥 ДРУЗЬЯ</h3>
                        <div id="friendsListContainer">
                            ${friendsList.map(f => `
                                <div class="friend-item">
                                    <span class="friend-name">${escapeHtml(f.name)}</span>
                                    <button class="view-profile-btn" data-id="${f.id}">👁️ Профиль</button>
                                </div>
                            `).join('')}
                            ${friendsList.length === 0 ? '<div style="padding: 15px; text-align: center; color: #777;">Нет друзей</div>' : ''}
                        </div>
                        <div class="add-friend">
                            <input type="text" id="addFriendInput" placeholder="Ник для добавления">
                            <button id="addFriendBtn">➕ ДОБАВИТЬ</button>
                        </div>
                        <div class="search-result" id="friendSearchResult"></div>
                    </div>
                    <a href="index.html" class="back-link">← ВЕРНУТЬСЯ</a>
                </div>
            </div>
            <div class="footer">
                ASL • отдел TToS • версия протокола 2.3
            </div>
        `;
        
        // Выход
        document.getElementById('logoutBtn').onclick = () => signOut(auth);
        
        // Редактирование описания
        document.getElementById('editAccountBtn').onclick = async () => {
            const newDesc = prompt('Введите новое описание:', userData.description || '');
            if (newDesc !== null) {
                await update(ref(db, 'users/' + user.uid), { description: newDesc });
            }
        };
        
        // Заглушки
        document.getElementById('achievementsBtn').onclick = () => alert('🏆 Заслуги: пока пусто');
        document.getElementById('groupsBtn').onclick = () => alert('👥 Группы: пока пусто');
        
        // Добавление друга по нику
        document.getElementById('addFriendBtn').onclick = async () => {
            const nickname = document.getElementById('addFriendInput').value.trim();
            const resultDiv = document.getElementById('friendSearchResult');
            if (!nickname) {
                resultDiv.textContent = 'Введите ник';
                resultDiv.style.display = 'block';
                setTimeout(() => resultDiv.style.display = 'none', 3000);
                return;
            }
            
            const snapshot = await get(ref(db, 'users'));
            let foundUser = null;
            if (snapshot.exists()) {
                const users = snapshot.val();
                for (let uid in users) {
                    if (users[uid].name === nickname && uid !== user.uid) {
                        foundUser = { id: uid, ...users[uid] };
                        break;
                    }
                }
            }
            
            if (!foundUser) {
                resultDiv.textContent = 'Пользователь не найден';
                resultDiv.style.display = 'block';
                setTimeout(() => resultDiv.style.display = 'none', 3000);
                return;
            }
            
            if (userData.friends && userData.friends[foundUser.id]) {
                resultDiv.textContent = 'Уже в друзьях';
                resultDiv.style.display = 'block';
                setTimeout(() => resultDiv.style.display = 'none', 3000);
                return;
            }
            
            // Отправляем заявку
            await set(ref(db, `users/${foundUser.id}/incomingRequests/${user.uid}`), {
                fromId: user.uid,
                fromName: userData.name
            });
            resultDiv.textContent = `Заявка отправлена ${foundUser.name}`;
            resultDiv.style.color = '#27ae60';
            resultDiv.style.display = 'block';
            setTimeout(() => resultDiv.style.display = 'none', 3000);
            document.getElementById('addFriendInput').value = '';
        };
        
        // Просмотр профиля друга
        document.querySelectorAll('.view-profile-btn').forEach(btn => {
            btn.onclick = async () => {
                const friendId = btn.getAttribute('data-id');
                const friendSnap = await get(ref(db, 'users/' + friendId));
                if (friendSnap.exists()) {
                    const fd = friendSnap.val();
                    alert(`👤 ${fd.name}\n📧 ${fd.email}\n📝 ${fd.description || 'Нет описания'}\n⭐ Уровень: ${fd.level || 1}`);
                }
            };
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Слушаем авторизацию
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userRef = ref(db, 'users/' + user.uid);
            const snapshot = await get(userRef);
            let userData = snapshot.val();
            if (!userData) {
                userData = {
                    email: user.email,
                    name: user.email.split('@')[0],
                    description: 'Сотрудник ASL',
                    level: 1,
                    friends: {},
                    incomingRequests: {},
                    createdAt: Date.now()
                };
                await set(userRef, userData);
            }
            
            renderProfile(user, userData);
            
            // Подписка на обновления данных
            onValue(userRef, (snap) => {
                if (snap.exists()) {
                    renderProfile(user, snap.val());
                }
            });
        } else {
            renderLogin();
        }
    });
</script>
</body>
</html>
