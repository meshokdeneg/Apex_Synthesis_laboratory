<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ASL | Профиль</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0f1a 0%, #0c111c 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .profile-container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(30, 35, 45, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 140, 0, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .profile-header {
            background: linear-gradient(135deg, #1a2a2f, #0f1a1f);
            padding: 25px 30px;
            border-bottom: 3px solid #FF8C00;
            display: flex;
            align-items: flex-start;
            gap: 30px;
            flex-wrap: wrap;
        }

        .profile-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            min-width: 150px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #FF8C00;
            background: #2c3e2f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            cursor: pointer;
            transition: 0.2s;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar:hover {
            transform: scale(1.02);
            border-color: #4A90E2;
        }

        .change-avatar-btn {
            background: rgba(74,144,226,0.3);
            border: 1px solid #4A90E2;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            color: #fff;
        }

        .profile-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .profile-name {
            font-size: 28px;
            font-weight: bold;
            color: #FF8C00;
        }

        .profile-status {
            color: #8bc34a;
            font-size: 13px;
        }

        .profile-bio {
            color: #ccc;
            font-size: 14px;
            margin-top: 5px;
        }

        .profile-stats {
            display: flex;
            gap: 15px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            color: #FF8C00;
        }

        .profile-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 140px;
            align-items: flex-end;
        }

        .action-btn {
            background: rgba(74,144,226,0.2);
            border: 1px solid #4A90E2;
            padding: 8px 20px;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            text-align: center;
            transition: 0.2s;
            width: 100%;
        }

        .action-btn:hover {
            background: #4A90E2;
            transform: translateY(-2px);
        }

        .profile-nav {
            display: flex;
            gap: 5px;
            background: #1a2a2f;
            padding: 0 20px;
            border-bottom: 1px solid #2c3e2f;
        }

        .nav-btn {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-btn.active {
            color: #FF8C00;
            border-bottom: 3px solid #FF8C00;
        }

        .nav-btn:hover {
            color: #fff;
        }

        .profile-content {
            padding: 30px;
            min-height: 400px;
        }

        .friends-section, .badges-section, .achievements-section {
            display: none;
        }

        .friends-section.active, .badges-section.active, .achievements-section.active {
            display: block;
        }

        .friends-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .friend-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255,140,0,0.2);
        }

        .friend-card:hover {
            background: rgba(74,144,226,0.2);
            transform: translateY(-2px);
        }

        .friend-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #2c3e2f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .friend-info {
            flex: 1;
        }

        .friend-name {
            color: #FF8C00;
            font-weight: bold;
            font-size: 14px;
        }

        .friend-status {
            font-size: 11px;
            color: #8bc34a;
        }

        .chat-btn {
            background: #4A90E2;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 11px;
        }

        .add-friend {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .add-friend input {
            flex: 1;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #4A90E2;
            border-radius: 8px;
            color: #fff;
        }

        .add-friend button {
            background: #27ae60;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .achievement-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255,140,0,0.2);
        }

        .achievement-icon {
            font-size: 35px;
            margin-bottom: 8px;
        }

        .achievement-name {
            color: #FF8C00;
            font-weight: bold;
            font-size: 13px;
        }

        .achievement-desc {
            font-size: 10px;
            color: #aaa;
            margin-top: 5px;
        }

        .badges-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .badge {
            background: rgba(255,140,0,0.2);
            border-radius: 40px;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #FF8C00;
        }

        .chat-modal {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            background: #1a2a2f;
            border-radius: 16px;
            border: 1px solid #FF8C00;
            display: none;
            flex-direction: column;
            z-index: 1000;
        }

        .chat-header {
            background: #2c3e2f;
            padding: 12px;
            border-radius: 16px 16px 0 0;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            color: #FF8C00;
        }

        .chat-messages {
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-message {
            background: rgba(255,255,255,0.1);
            padding: 8px 12px;
            border-radius: 12px;
            max-width: 80%;
            font-size: 13px;
        }

        .chat-message.own {
            align-self: flex-end;
            background: #4A90E2;
        }

        .chat-input-area {
            display: flex;
            padding: 10px;
            gap: 8px;
            border-top: 1px solid #2c3e2f;
        }

        .chat-input-area input {
            flex: 1;
            padding: 8px;
            background: #0a0f1a;
            border: 1px solid #4A90E2;
            border-radius: 8px;
            color: #fff;
        }

        .chat-input-area button {
            background: #4A90E2;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #FF8C00;
            color: #FF8C00;
            padding: 8px 16px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 14px;
            z-index: 100;
        }

        @media (max-width: 700px) {
            .profile-header { flex-direction: column; align-items: center; text-align: center; }
            .profile-actions { align-items: center; width: 100%; }
            .profile-center { align-items: center; }
            .profile-stats { justify-content: center; }
            .nav-btn { padding: 8px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>
<a href="index.html" class="back-btn">← НА ГЛАВНУЮ</a>

<div class="profile-container" id="profileContainer">
    <div class="profile-header">
        <div class="profile-left">
            <div class="avatar" id="avatar" onclick="changeAvatar()">
                <span id="avatarEmoji">🧊</span>
            </div>
            <div class="change-avatar-btn" onclick="changeAvatar()">Сменить аватар</div>
        </div>

        <div class="profile-center">
            <div class="profile-name" id="profileName">Загрузка...</div>
            <div class="profile-status" id="profileStatus">● В сети</div>
            <div class="profile-bio" id="profileBio">Загрузка...</div>
            <div class="profile-stats">
                <div class="stat">🏆 Друзей: <span id="friendsCount">0</span></div>
                <div class="stat">⭐ Уровень: <span id="level">1</span></div>
                <div class="stat">🧊 Кубов: <span id="cubes">0</span></div>
            </div>
        </div>

        <div class="profile-actions">
            <div class="action-btn" onclick="editProfile()">✎ Редактировать</div>
            <div class="action-btn" onclick="logout()">🚪 Выйти</div>
        </div>
    </div>

    <div class="profile-nav">
        <button class="nav-btn active" data-tab="friends">👥 ДРУЗЬЯ</button>
        <button class="nav-btn" data-tab="badges">🎖️ ЗНАЧКИ</button>
        <button class="nav-btn" data-tab="achievements">🏅 ЗАСЛУГИ</button>
    </div>

    <div class="profile-content">
        <div id="friendsSection" class="friends-section active">
            <div class="add-friend">
                <input type="text" id="friendSearch" placeholder="Имя пользователя...">
                <button onclick="addFriend()">➕ Добавить друга</button>
            </div>
            <div id="friendsList" class="friends-list"></div>
        </div>

        <div id="badgesSection" class="badges-section">
            <div id="badgesList" class="badges-grid"></div>
        </div>

        <div id="achievementsSection" class="achievements-section">
            <div id="achievementsList" class="achievements-grid"></div>
        </div>
    </div>
</div>

<div id="chatModal" class="chat-modal">
    <div class="chat-header" onclick="closeChat()">
        <span id="chatFriendName">Чат</span>
        <span>✕</span>
    </div>
    <div id="chatMessages" class="chat-messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Сообщение...">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    // ========== ЗАГРУЗКА ДАННЫХ ПОЛЬЗОВАТЕЛЯ ==========
    let currentUser = null;
    let friends = [];
    let messages = {};
    let chatWith = null;

    function loadCurrentUser() {
        const savedUser = localStorage.getItem('asl_user');
        if (!savedUser) {
            window.location.href = 'reg.html';
            return;
        }
        
        currentUser = JSON.parse(savedUser);
        
        document.getElementById('profileName').textContent = currentUser.username;
        document.getElementById('profileBio').textContent = currentUser.bio;
        document.getElementById('level').textContent = currentUser.level;
        document.getElementById('cubes').textContent = currentUser.cubes;
        
        if (currentUser.avatar) {
            if (currentUser.avatar.startsWith('http')) {
                document.getElementById('avatar').innerHTML = `<img src="${currentUser.avatar}">`;
            } else {
                document.getElementById('avatarEmoji').textContent = currentUser.avatar;
            }
        }
        
        // Загружаем друзей и сообщения
        friends = JSON.parse(localStorage.getItem('asl_friends')) || [];
        messages = JSON.parse(localStorage.getItem('asl_messages')) || {};
        renderFriends();
    }
    
    function renderFriends() {
        const container = document.getElementById('friendsList');
        if (friends.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:#aaa;">У вас пока нет друзей. Добавьте кого-нибудь!</div>';
            return;
        }
        container.innerHTML = friends.map(f => `
            <div class="friend-card" onclick="openChat('${f.username}')">
                <div class="friend-avatar">${f.avatar || '👤'}</div>
                <div class="friend-info">
                    <div class="friend-name">${f.username}</div>
                    <div class="friend-status">${f.status || '● В сети'}</div>
                </div>
                <button class="chat-btn" onclick="event.stopPropagation(); openChat('${f.username}')">💬</button>
            </div>
        `).join('');
        document.getElementById('friendsCount').textContent = friends.length;
    }
    
    function addFriend() {
        const searchName = document.getElementById('friendSearch').value.trim();
        if (!searchName) return;
        if (searchName === currentUser.username) {
            alert('Нельзя добавить самого себя!');
            return;
        }
        if (friends.some(f => f.username === searchName)) {
            alert('Этот пользователь уже в друзьях!');
            return;
        }
        
        let allUsers = JSON.parse(localStorage.getItem('asl_all_users')) || [];
        if (!allUsers.includes(searchName)) {
            allUsers.push(searchName);
            localStorage.setItem('asl_all_users', JSON.stringify(allUsers));
        }
        
        friends.push({ username: searchName, avatar: '👤', status: '● В сети' });
        localStorage.setItem('asl_friends', JSON.stringify(friends));
        renderFriends();
        document.getElementById('friendSearch').value = '';
        alert(`✅ ${searchName} добавлен в друзья!`);
    }
    
    function openChat(username) {
        chatWith = username;
        document.getElementById('chatFriendName').textContent = username;
        document.getElementById('chatModal').style.display = 'flex';
        loadMessages();
    }
    
    function closeChat() {
        document.getElementById('chatModal').style.display = 'none';
        chatWith = null;
    }
    
    function loadMessages() {
        const container = document.getElementById('chatMessages');
        const chatId = [currentUser.username, chatWith].sort().join('_');
        const msgs = messages[chatId] || [];
        container.innerHTML = msgs.map(m => `
            <div class="chat-message ${m.from === currentUser.username ? 'own' : ''}">
                <strong>${m.from === currentUser.username ? 'Вы' : m.from}:</strong> ${m.text}
                <div style="font-size: 10px; color:#888;">${new Date(m.time).toLocaleTimeString()}</div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text || !chatWith) return;
        
        const chatId = [currentUser.username, chatWith].sort().join('_');
        if (!messages[chatId]) messages[chatId] = [];
        messages[chatId].push({
            from: currentUser.username,
            text: text,
            time: Date.now()
        });
        localStorage.setItem('asl_messages', JSON.stringify(messages));
        input.value = '';
        loadMessages();
    }
    
    function editProfile() {
        const newBio = prompt('Введите новую информацию о себе:', currentUser.bio);
        if (newBio) {
            currentUser.bio = newBio;
            document.getElementById('profileBio').textContent = newBio;
            localStorage.setItem('asl_user', JSON.stringify(currentUser));
        }
    }
    
    function changeAvatar() {
        const newAvatar = prompt('Введите эмодзи или ссылку на картинку:', currentUser.avatar || '🧊');
        if (newAvatar) {
            if (newAvatar.startsWith('http')) {
                document.getElementById('avatar').innerHTML = `<img src="${newAvatar}">`;
            } else {
                document.getElementById('avatarEmoji').textContent = newAvatar;
            }
            currentUser.avatar = newAvatar;
            localStorage.setItem('asl_user', JSON.stringify(currentUser));
        }
    }
    
    function logout() {
        localStorage.removeItem('asl_user');
        window.location.href = 'index.html';
    }
    
    function renderBadges() {
        const badges = JSON.parse(localStorage.getItem('asl_badges')) || ['КУБОКЛИКЕР', 'ТЕСТОПРОХОДЕЦ'];
        const container = document.getElementById('badgesList');
        container.innerHTML = badges.map(b => `<div class="badge">🎖️ ${b}</div>`).join('');
        if (badges.length === 0) container.innerHTML = '<div style="color:#aaa;">Пока нет значков. Проходите тесты и ищите пасхалки!</div>';
    }
    
    function renderAchievements() {
        const achievements = JSON.parse(localStorage.getItem('asl_achievements')) || [
            { name: 'Первый куб', desc: 'Кликнуть по кубу 1 раз', icon: '🟦' },
            { name: 'Любопытный', desc: 'Найти первую пасхалку', icon: '🔍' },
            { name: 'Теоретик', desc: 'Пройди тест на 25/25', icon: '📚' }
        ];
        const container = document.getElementById('achievementsList');
        container.innerHTML = achievements.map(a => `
            <div class="achievement-card">
                <div class="achievement-icon">${a.icon}</div>
                <div class="achievement-name">${a.name}</div>
                <div class="achievement-desc">${a.desc}</div>
            </div>
        `).join('');
    }
    
    // Навигация по вкладкам
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tab = btn.dataset.tab;
            document.querySelectorAll('.friends-section, .badges-section, .achievements-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`${tab}Section`).classList.add('active');
        });
    });
    
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    loadCurrentUser();
    renderBadges();
    renderAchievements();
</script>
</body>
</html>
