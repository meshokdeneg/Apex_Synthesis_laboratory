<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ASL | Профиль</title>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion, arrayRemove, collection, query, where, getDocs, onSnapshot, addDoc, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // ТВОИ ДАННЫЕ ИЗ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAuCRlflkjJQeKd4EyBGQIa6wUNWLNKo3c",
            authDomain: "apex-8f11e.firebaseapp.com",
            databaseURL: "https://apex-8f11e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "apex-8f11e",
            storageBucket: "apex-8f11e.firebasestorage.app",
            messagingSenderId: "923734077108",
            appId: "1:923734077108:web:f6d2d4059972c215c371e1",
            measurementId: "G-WTKS5JQ7Z5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // DOM элементы
        const loginScreen = document.getElementById('loginScreen');
        const profileScreen = document.getElementById('profileScreen');
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginError = document.getElementById('loginError');
        
        const currentUserName = document.getElementById('currentUserName');
        const userEmailSpan = document.getElementById('userEmail');
        const friendsCountSpan = document.getElementById('friendsCount');
        const requestsCountSpan = document.getElementById('requestsCount');
        const requestsList = document.getElementById('requestsList');
        const friendsListDiv = document.getElementById('friendsList');
        const messagesList = document.getElementById('messagesList');
        const messageInput = document.getElementById('messageInput');
        const sendMsgBtn = document.getElementById('sendMsgBtn');
        const chatFriendName = document.getElementById('chatFriendName');
        const inviteFriendBtn = document.getElementById('inviteFriendBtn');
        const openFriendsPanelBtn = document.getElementById('openFriendsPanelBtn');
        const friendsPanel = document.getElementById('friendsPanel');
        const closeFriendsPanel = document.getElementById('closeFriendsPanel');
        
        let currentUserData = null;
        let selectedFriendId = null;
        let unsubscribeMessages = null;

        // Регистрация
        registerBtn.addEventListener('click', async () => {
            const email = loginEmail.value.trim();
            const password = loginPassword.value;
            if (!email || !password) {
                loginError.textContent = 'Заполните оба поля';
                loginError.style.display = 'block';
                return;
            }
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, 'users', userCred.user.uid), {
                    email: email,
                    name: email.split('@')[0],
                    friends: [],
                    incomingRequests: [],
                    createdAt: serverTimestamp()
                });
                loginError.style.display = 'none';
            } catch (error) {
                loginError.textContent = error.message;
                loginError.style.display = 'block';
            }
        });

        // Вход
        loginBtn.addEventListener('click', async () => {
            const email = loginEmail.value.trim();
            const password = loginPassword.value;
            if (!email || !password) {
                loginError.textContent = 'Заполните оба поля';
                loginError.style.display = 'block';
                return;
            }
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                loginError.textContent = 'Неверный email или пароль';
                loginError.style.display = 'block';
            }
        });

        // Выход
        logoutBtn.addEventListener('click', async () => {
            await signOut(auth);
        });

        // Слушаем состояние авторизации
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loginScreen.style.display = 'none';
                profileScreen.style.display = 'block';
                currentUserData = user;
                userEmailSpan.textContent = user.email;
                
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (!userDoc.exists()) {
                    await setDoc(doc(db, 'users', user.uid), {
                        email: user.email,
                        name: user.email.split('@')[0],
                        friends: [],
                        incomingRequests: [],
                        createdAt: serverTimestamp()
                    });
                }
                
                subscribeToUserData(user.uid);
            } else {
                loginScreen.style.display = 'flex';
                profileScreen.style.display = 'none';
                loginEmail.value = '';
                loginPassword.value = '';
                loginError.style.display = 'none';
                if (unsubscribeMessages) unsubscribeMessages();
                selectedFriendId = null;
                chatFriendName.textContent = 'Выберите друга';
            }
        });

        // Подписка на данные пользователя
        function subscribeToUserData(uid) {
            const userRef = doc(db, 'users', uid);
            onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    currentUserData = { ...currentUserData, ...data };
                    currentUserName.textContent = data.name || currentUserData.email.split('@')[0];
                    friendsCountSpan.textContent = data.friends?.length || 0;
                    requestsCountSpan.textContent = data.incomingRequests?.length || 0;
                    
                    renderRequests(data.incomingRequests || []);
                    renderFriendsList(data.friends || []);
                }
            });
        }

        // Рендер входящих заявок
        function renderRequests(requests) {
            if (!requests.length) {
                requestsList.innerHTML = '<div style="padding: 15px; text-align: center; color: #777;">Нет новых заявок</div>';
                return;
            }
            requestsList.innerHTML = '';
            requests.forEach(req => {
                const div = document.createElement('div');
                div.className = 'request-item';
                div.innerHTML = `
                    <span class="request-user">${req.fromName}</span>
                    <div class="request-actions">
                        <button class="accept-btn" data-id="${req.fromId}" data-name="${req.fromName}">✔ Принять</button>
                        <button class="reject-btn" data-id="${req.fromId}">✘ Отклонить</button>
                    </div>
                `;
                requestsList.appendChild(div);
            });
            
            document.querySelectorAll('.accept-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const fromId = btn.getAttribute('data-id');
                    const fromName = btn.getAttribute('data-name');
                    acceptRequest(fromId, fromName);
                });
            });
            document.querySelectorAll('.reject-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const fromId = btn.getAttribute('data-id');
                    rejectRequest(fromId);
                });
            });
        }

        // Принять заявку
        async function acceptRequest(fromId, fromName) {
            const userRef = doc(db, 'users', currentUserData.uid);
            const friendRef = doc(db, 'users', fromId);
            
            await updateDoc(userRef, {
                friends: arrayUnion({ id: fromId, name: fromName }),
                incomingRequests: arrayRemove({ fromId, fromName })
            });
            await updateDoc(friendRef, {
                friends: arrayUnion({ id: currentUserData.uid, name: currentUserData.email.split('@')[0] })
            });
        }

        // Отклонить заявку
        async function rejectRequest(fromId) {
            const userRef = doc(db, 'users', currentUserData.uid);
            const request = currentUserData.incomingRequests?.find(r => r.fromId === fromId);
            if (request) {
                await updateDoc(userRef, {
                    incomingRequests: arrayRemove(request)
                });
            }
        }

        // Рендер списка друзей
        function renderFriendsList(friends) {
            if (!friends.length) {
                friendsListDiv.innerHTML = '<div style="padding: 15px; text-align: center; color: #777;">У вас пока нет друзей</div>';
                return;
            }
            friendsListDiv.innerHTML = '';
            friends.forEach(friend => {
                const btn = document.createElement('button');
                btn.className = 'friend-item';
                btn.innerHTML = `👤 ${friend.name}`;
                btn.addEventListener('click', () => {
                    selectedFriendId = friend.id;
                    chatFriendName.textContent = friend.name;
                    loadMessages(friend.id);
                    if (window.innerWidth < 800) {
                        friendsPanel.classList.remove('open');
                    }
                });
                friendsListDiv.appendChild(btn);
            });
        }

        // Загрузить сообщения с другом
        function loadMessages(friendId) {
            if (unsubscribeMessages) unsubscribeMessages();
            
            const chatId = [currentUserData.uid, friendId].sort().join('_');
            const messagesRef = collection(db, 'chats', chatId, 'messages');
            const q = query(messagesRef, orderBy('timestamp', 'asc'));
            
            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                messagesList.innerHTML = '';
                if (snapshot.empty) {
                    messagesList.innerHTML = '<div style="color: #aaa; text-align: center; padding: 40px;">Нет сообщений. Напишите что-нибудь!</div>';
                }
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${msg.fromId === currentUserData.uid ? 'my-message' : 'friend-message'}`;
                    msgDiv.innerHTML = `
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                        <div class="message-time">${msg.time || ''}</div>
                    `;
                    messagesList.appendChild(msgDiv);
                });
                messagesList.scrollTop = messagesList.scrollHeight;
            });
        }

        // Защита от XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Отправить сообщение
        sendMsgBtn.addEventListener('click', async () => {
            if (!selectedFriendId) {
                alert('Сначала выберите друга из списка');
                return;
            }
            const text = messageInput.value.trim();
            if (!text) return;
            
            const chatId = [currentUserData.uid, selectedFriendId].sort().join('_');
            const messagesRef = collection(db, 'chats', chatId, 'messages');
            
            await addDoc(messagesRef, {
                fromId: currentUserData.uid,
                text: text,
                timestamp: serverTimestamp(),
                time: new Date().toLocaleTimeString()
            });
            messageInput.value = '';
        });

        // Отправить заявку в друзья
        inviteFriendBtn.addEventListener('click', async () => {
            const friendEmail = prompt('Введите email пользователя, которого хотите пригласить:');
            if (!friendEmail) return;
            
            const usersRef = collection(db, 'users');
            const q = query(usersRef, where('email', '==', friendEmail));
            const querySnapshot = await getDocs(q);
            
            if (querySnapshot.empty) {
                alert('Пользователь с таким email не найден');
                return;
            }
            
            const friendDoc = querySnapshot.docs[0];
            const friendId = friendDoc.id;
            const friendName = friendDoc.data().name || friendEmail.split('@')[0];
            
            const currentFriends = currentUserData.friends || [];
            if (currentFriends.some(f => f.id === friendId)) {
                alert('Этот пользователь уже в ваших друзьях');
                return;
            }
            
            const friendRef = doc(db, 'users', friendId);
            await updateDoc(friendRef, {
                incomingRequests: arrayUnion({
                    fromId: currentUserData.uid,
                    fromName: currentUserData.email.split('@')[0]
                })
            });
            alert(`Приглашение отправлено пользователю ${friendName}`);
        });

        // Открыть панель друзей на мобилке
        openFriendsPanelBtn.addEventListener('click', () => {
            friendsPanel.classList.add('open');
        });
        
        closeFriendsPanel.addEventListener('click', () => {
            friendsPanel.classList.remove('open');
        });
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMsgBtn.click();
        });
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: url('https://static.planetminecraft.com/files/image/minecraft/texture-pack/2021/362/14416263-quartzpack_l.jpg') repeat;
            background-size: 64px 64px;
            font-family: 'Segoe UI', 'Courier New', monospace;
            min-height: 100vh;
            padding: 20px;
        }
        .asl-container {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(1px);
            border: 2px solid #b0b0b0;
            border-radius: 8px;
            overflow: hidden;
        }
        .header {
            background: #1a2a2f;
            padding: 20px 30px;
            border-bottom: 4px solid #FF8C00;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { font-size: 28px; color: #FF8C00; }
        .icon-btn {
            background: #2c3e2f;
            border: 1px solid #FF8C00;
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: bold;
            color: #FF8C00;
            cursor: pointer;
            font-family: inherit;
        }
        .icon-btn:hover { background: #FF8C00; color: #1a2a2f; }
        .nav {
            background: #2c3e2f;
            padding: 10px 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            border-bottom: 1px solid #4A90E2;
        }
        .nav a { color: #fff; text-decoration: none; font-weight: bold; }
        .nav a:hover { color: #FF8C00; }
        .profile-layout {
            display: flex;
            min-height: 500px;
            position: relative;
        }
        .friends-sidebar {
            width: 280px;
            background: #f5f5f5;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }
        .friends-header {
            padding: 15px;
            background: #eee;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .friends-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .friend-item {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 5px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
        }
        .friend-item:hover { background: #fff0e0; border-color: #FF8C00; }
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }
        .chat-header {
            padding: 15px 20px;
            background: #f9f9f9;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 300px;
        }
        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
        }
        .my-message {
            align-self: flex-end;
            background: #FF8C00;
            color: white;
        }
        .friend-message {
            align-self: flex-start;
            background: #f0f0f0;
            color: #333;
        }
        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
        }
        .chat-input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #ddd;
            gap: 10px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-family: inherit;
        }
        .chat-input-area button {
            padding: 12px 24px;
            background: #2c3e2f;
            border: none;
            border-radius: 25px;
            color: #FF8C00;
            font-weight: bold;
            cursor: pointer;
        }
        .requests-box {
            background: #f9f9f9;
            padding: 15px;
            margin: 15px;
            border-left: 3px solid #FF8C00;
        }
        .request-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .accept-btn, .reject-btn {
            padding: 5px 12px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            margin-left: 8px;
        }
        .accept-btn { background: #27ae60; color: white; }
        .reject-btn { background: #c0392b; color: white; }
        .footer {
            background: #1a2a2f;
            color: #aaa;
            padding: 15px;
            text-align: center;
            font-size: 12px;
        }
        .login-container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border: 3px solid #FF8C00;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
        }
        .login-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .login-container button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #2c3e2f;
            border: none;
            border-radius: 30px;
            color: #FF8C00;
            font-weight: bold;
            cursor: pointer;
        }
        .error-msg {
            color: #c0392b;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }
        @media (max-width: 800px) {
            .friends-sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                bottom: 0;
                z-index: 100;
                transition: 0.3s;
                background: white;
            }
            .friends-sidebar.open { left: 0; }
            .profile-layout { display: block; }
            .chat-main { width: 100%; }
        }
    </style>
</head>
<body>
<div class="asl-container">
    <div class="header">
        <h1>🔹 ПРОФИЛЬ ASL</h1>
        <div>
            <button class="icon-btn" id="openFriendsPanelBtn">👥 ДРУЗЬЯ</button>
            <button class="icon-btn" id="logoutBtn">🚪 ВЫЙТИ</button>
        </div>
    </div>
    
    <div class="nav">
        <a href="index.html">🏠 ГЛАВНАЯ</a>
        <a href="lore.html">📖 ЛОР</a>
        <a href="games.html">🎮 ИГРЫ</a>
    </div>
    
    <div id="loginScreen" style="display: flex; justify-content: center; align-items: center; min-height: 500px; padding: 40px;">
        <div class="login-container">
            <h2 style="margin-bottom: 20px;">🏷️ БЕЙДЖ ASL</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button id="loginBtn">ВОЙТИ</button>
            <button id="registerBtn">ЗАРЕГИСТРИРОВАТЬСЯ</button>
            <div class="error-msg" id="loginError"></div>
        </div>
    </div>
    
    <div id="profileScreen" style="display: none;">
        <div class="profile-layout">
            <div class="friends-sidebar" id="friendsPanel">
                <div class="friends-header">
                    <span>👥 ДРУЗЬЯ</span>
                    <button id="closeFriendsPanel" style="background: none; border: none; font-size: 20px; cursor: pointer;">✕</button>
                </div>
                <div class="friends-list" id="friendsList"></div>
                <div style="padding: 15px;">
                    <button id="inviteFriendBtn" class="icon-btn" style="width: 100%;">➕ ПРИГЛАСИТЬ</button>
                </div>
            </div>
            
            <div class="chat-main">
                <div class="chat-header">
                    <span>💬 Чат с <span id="chatFriendName">—</span></span>
                </div>
                <div class="messages-container" id="messagesList">
                    <div style="color: #aaa; text-align: center; padding: 40px;">Выберите друга из списка слева</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="messageInput" placeholder="Введите сообщение...">
                    <button id="sendMsgBtn">➤</button>
                </div>
            </div>
        </div>
        
        <div class="requests-box">
            <h3>📨 ВХОДЯЩИЕ ЗАЯВКИ</h3>
            <div id="requestsList">Загрузка...</div>
        </div>
        
        <div class="footer">
            <span>Вы вошли как: <span id="userEmail"></span> | Друзей: <span id="friendsCount">0</span> | Заявок: <span id="requestsCount">0</span></span>
        </div>
    </div>
</div>
</body>
</html>
