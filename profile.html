<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ASL | Профиль</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getDatabase, ref, set, get, update, push, onValue, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAuCRlflkjJQeKd4EyBGQIa6wUNWLNKo3c",
            authDomain: "apex-8f11e.firebaseapp.com",
            databaseURL: "https://apex-8f11e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "apex-8f11e",
            storageBucket: "apex-8f11e.firebasestorage.app",
            messagingSenderId: "923734077108",
            appId: "1:923734077108:web:f6d2d4059972c215c371e1",
            measurementId: "G-WTKS5JQ7Z5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // DOM элементы
        const loginScreen = document.getElementById('loginScreen');
        const profileScreen = document.getElementById('profileScreen');
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const loginNickname = document.getElementById('loginNickname');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginError = document.getElementById('loginError');
        
        const currentUserName = document.getElementById('currentUserName');
        const userEmailSpan = document.getElementById('userEmail');
        const friendsCountSpan = document.getElementById('friendsCount');
        const requestsCountSpan = document.getElementById('requestsCount');
        const requestsList = document.getElementById('requestsList');
        const friendsListDiv = document.getElementById('friendsList');
        const messagesList = document.getElementById('messagesList');
        const messageInput = document.getElementById('messageInput');
        const sendMsgBtn = document.getElementById('sendMsgBtn');
        const chatFriendName = document.getElementById('chatFriendName');
        const inviteFriendBtn = document.getElementById('inviteFriendBtn');
        const openFriendsPanelBtn = document.getElementById('openFriendsPanelBtn');
        const friendsPanel = document.getElementById('friendsPanel');
        const closeFriendsPanel = document.getElementById('closeFriendsPanel');
        const searchFriendInput = document.getElementById('searchFriendInput');
        const searchFriendBtn = document.getElementById('searchFriendBtn');
        
        let currentUserData = null;
        let selectedFriendId = null;
        let unsubscribeFriends = null;
        let unsubscribeRequests = null;
        let unsubscribeMessages = null;

        // Проверка уникальности ника
        async function isNicknameUnique(nickname) {
            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            if (!snapshot.exists()) return true;
            const users = snapshot.val();
            for (let uid in users) {
                if (users[uid].name === nickname) return false;
            }
            return true;
        }

        // Регистрация
        registerBtn.addEventListener('click', async () => {
            const email = loginEmail.value.trim();
            const password = loginPassword.value;
            const nickname = loginNickname.value.trim();
            
            if (!email || !password || !nickname) {
                loginError.textContent = 'Заполните все поля';
                loginError.style.display = 'block';
                return;
            }
            
            const isUnique = await isNicknameUnique(nickname);
            if (!isUnique) {
                loginError.textContent = 'Этот ник уже занят. Выберите другой';
                loginError.style.display = 'block';
                return;
            }
            
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                await set(ref(db, 'users/' + userCred.user.uid), {
                    email: email,
                    name: nickname,
                    friends: {},
                    incomingRequests: {},
                    createdAt: Date.now()
                });
                loginError.style.display = 'none';
                loginNickname.value = '';
            } catch (error) {
                loginError.textContent = error.message;
                loginError.style.display = 'block';
            }
        });

        // Вход
        loginBtn.addEventListener('click', async () => {
            const email = loginEmail.value.trim();
            const password = loginPassword.value;
            if (!email || !password) {
                loginError.textContent = 'Заполните email и пароль';
                loginError.style.display = 'block';
                return;
            }
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                loginError.textContent = 'Неверный email или пароль';
                loginError.style.display = 'block';
            }
        });

        // Выход
        logoutBtn.addEventListener('click', async () => {
            await signOut(auth);
        });

        // Поиск пользователя по нику
        searchFriendBtn.addEventListener('click', async () => {
            const nickname = searchFriendInput.value.trim();
            if (!nickname) {
                alert('Введите ник для поиска');
                return;
            }
            
            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            if (!snapshot.exists()) {
                alert('Пользователь не найден');
                return;
            }
            
            let foundUser = null;
            const users = snapshot.val();
            for (let uid in users) {
                if (users[uid].name === nickname) {
                    foundUser = { id: uid, ...users[uid] };
                    break;
                }
            }
            
            if (!foundUser) {
                alert('Пользователь с таким ником не найден');
                return;
            }
            
            const isFriend = currentUserData.friends && currentUserData.friends[foundUser.id];
            if (isFriend) {
                alert(`${foundUser.name} уже в ваших друзьях`);
                return;
            }
            
            if (confirm(`Найден пользователь: ${foundUser.name} (${foundUser.email})\nОтправить заявку в друзья?`)) {
                await set(ref(db, `users/${foundUser.id}/incomingRequests/${currentUserData.uid}`), {
                    fromId: currentUserData.uid,
                    fromName: currentUserData.name,
                    fromEmail: currentUserData.email
                });
                alert(`Приглашение отправлено пользователю ${foundUser.name}`);
                searchFriendInput.value = '';
            }
        });

        // Слушаем состояние авторизации
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loginScreen.style.display = 'none';
                profileScreen.style.display = 'block';
                currentUserData = { uid: user.uid, email: user.email };
                
                const userRef = ref(db, 'users/' + user.uid);
                const snapshot = await get(userRef);
                if (!snapshot.exists()) {
                    await set(userRef, {
                        email: user.email,
                        name: user.email.split('@')[0],
                        friends: {},
                        incomingRequests: {},
                        createdAt: Date.now()
                    });
                }
                
                subscribeToUserData(user.uid);
            } else {
                loginScreen.style.display = 'flex';
                profileScreen.style.display = 'none';
                loginEmail.value = '';
                loginPassword.value = '';
                loginNickname.value = '';
                loginError.style.display = 'none';
                if (unsubscribeFriends) unsubscribeFriends();
                if (unsubscribeRequests) unsubscribeRequests();
                if (unsubscribeMessages) unsubscribeMessages();
                selectedFriendId = null;
                chatFriendName.textContent = 'Выберите друга';
            }
        });

        // Подписка на данные пользователя
        function subscribeToUserData(uid) {
            const userRef = ref(db, 'users/' + uid);
            onValue(userRef, (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    currentUserData = { ...currentUserData, ...data };
                    currentUserName.textContent = data.name || currentUserData.email.split('@')[0];
                    userEmailSpan.textContent = currentUserData.email;
                    
                    const friendsCount = data.friends ? Object.keys(data.friends).length : 0;
                    const requestsCount = data.incomingRequests ? Object.keys(data.incomingRequests).length : 0;
                    friendsCountSpan.textContent = friendsCount;
                    requestsCountSpan.textContent = requestsCount;
                    
                    renderRequests(data.incomingRequests || {});
                    renderFriendsList(data.friends || {});
                }
            });
        }

        // Рендер входящих заявок
        function renderRequests(requests) {
            const requestsArray = Object.entries(requests).map(([id, req]) => ({ id, ...req }));
            if (!requestsArray.length) {
                requestsList.innerHTML = '<div style="padding: 15px; text-align: center; color: #777;">Нет новых заявок</div>';
                return;
            }
            requestsList.innerHTML = '';
            requestsArray.forEach(req => {
                const div = document.createElement('div');
                div.className = 'request-item';
                div.innerHTML = `
                    <span class="request-user">${req.fromName}</span>
                    <div class="request-actions">
                        <button class="accept-btn" data-id="${req.fromId}" data-name="${req.fromName}">✔ Принять</button>
                        <button class="reject-btn" data-id="${req.fromId}">✘ Отклонить</button>
                    </div>
                `;
                requestsList.appendChild(div);
            });
            
            document.querySelectorAll('.accept-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const fromId = btn.getAttribute('data-id');
                    const fromName = btn.getAttribute('data-name');
                    acceptRequest(fromId, fromName);
                });
            });
            document.querySelectorAll('.reject-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const fromId = btn.getAttribute('data-id');
                    rejectRequest(fromId);
                });
            });
        }

        // Принять заявку
        async function acceptRequest(fromId, fromName) {
            const fromUserRef = ref(db, 'users/' + fromId);
            const fromSnapshot = await get(fromUserRef);
            const fromName2 = fromSnapshot.val().name;
            
            await update(ref(db, `users/${currentUserData.uid}/friends`), { [fromId]: { id: fromId, name: fromName } });
            await update(ref(db, `users/${fromId}/friends`), { [currentUserData.uid]: { id: currentUserData.uid, name: currentUserData.name } });
            await set(ref(db, `users/${currentUserData.uid}/incomingRequests/${fromId}`), null);
        }

        // Отклонить заявку
        async function rejectRequest(fromId) {
            await set(ref(db, `users/${currentUserData.uid}/incomingRequests/${fromId}`), null);
        }

        // Рендер списка друзей
        function renderFriendsList(friends) {
            const friendsArray = Object.entries(friends).map(([id, friend]) => ({ id, ...friend }));
            if (!friendsArray.length) {
                friendsListDiv.innerHTML = '<div style="padding: 15px; text-align: center; color: #777;">У вас пока нет друзей</div>';
                return;
            }
            friendsListDiv.innerHTML = '';
            friendsArray.forEach(friend => {
                const btn = document.createElement('button');
                btn.className = 'friend-item';
                btn.innerHTML = `👤 ${friend.name}`;
                btn.addEventListener('click', () => {
                    selectedFriendId = friend.id;
                    chatFriendName.textContent = friend.name;
                    loadMessages(friend.id);
                    if (window.innerWidth < 800) {
                        friendsPanel.classList.remove('open');
                    }
                });
                friendsListDiv.appendChild(btn);
            });
        }

        // Загрузить сообщения с другом
        function loadMessages(friendId) {
            if (unsubscribeMessages) unsubscribeMessages();
            
            const chatId = [currentUserData.uid, friendId].sort().join('_');
            const messagesRef = ref(db, 'chats/' + chatId + '/messages');
            
            unsubscribeMessages = onValue(messagesRef, (snapshot) => {
                messagesList.innerHTML = '';
                if (!snapshot.exists()) {
                    messagesList.innerHTML = '<div style="color: #aaa; text-align: center; padding: 40px;">Нет сообщений. Напишите что-нибудь!</div>';
                    return;
                }
                const messages = snapshot.val();
                const messagesArray = Object.entries(messages).map(([id, msg]) => ({ id, ...msg })).sort((a,b) => a.timestamp - b.timestamp);
                messagesArray.forEach(msg => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${msg.fromId === currentUserData.uid ? 'my-message' : 'friend-message'}`;
                    msgDiv.innerHTML = `
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                        <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                    `;
                    messagesList.appendChild(msgDiv);
                });
                messagesList.scrollTop = messagesList.scrollHeight;
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Отправить сообщение
        sendMsgBtn.addEventListener('click', async () => {
            if (!selectedFriendId) {
                alert('Сначала выберите друга из списка');
                return;
            }
            const text = messageInput.value.trim();
            if (!text) return;
            
            const chatId = [currentUserData.uid, selectedFriendId].sort().join('_');
            const newMsgRef = push(ref(db, 'chats/' + chatId + '/messages'));
            await set(newMsgRef, {
                fromId: currentUserData.uid,
                text: text,
                timestamp: Date.now()
            });
            messageInput.value = '';
        });

        openFriendsPanelBtn.addEventListener('click', () => {
            friendsPanel.classList.add('open');
        });
        
        closeFriendsPanel.addEventListener('click', () => {
            friendsPanel.classList.remove('open');
        });
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMsgBtn.click();
        });
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

            background-size: 64px 64px;
            font-family: 'Segoe UI', 'Courier New', monospace;
            min-height: 100vh;
            padding: 20px;
        }
        .asl-container {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(1px);

        }
        .header {

        }

            font-family: inherit;
        }
        .icon-btn:hover { background: #FF8C00; color: #1a2a2f; }
        .nav {
            background: #2c3e2f;
            padding: 10px 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            border-bottom: 1px solid #4A90E2;
        }
        .nav a { color: #fff; text-decoration: none; font-weight: bold; }
        .nav a:hover { color: #FF8C00; }
        .profile-layout {
            display: flex;

            position: relative;
        }
        .friends-sidebar {

            padding: 15px;

        }
        .friends-list {
            flex: 1;

            padding: 10px;
        }
        .friend-item {
            display: block;
            width: 100%;

            margin-bottom: 5px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;

            cursor: pointer;
            font-family: inherit;
        }
        .friend-item:hover { background: #fff0e0; border-color: #FF8C00; }
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }
        .chat-header {
            padding: 15px 20px;
            background: #f9f9f9;

            justify-content: space-between;

        }
        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 300px;
        }
        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
        }
        .my-message {
            align-self: flex-end;
            background: #FF8C00;
            color: white;
        }
        .friend-message {
            align-self: flex-start;
            background: #f0f0f0;
            color: #333;
        }
        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
        }
        .chat-input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #ddd;
            gap: 10px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-family: inherit;
        }
        .chat-input-area button {
            padding: 12px 24px;
            background: #2c3e2f;
            border: none;
            border-radius: 25px;
            color: #FF8C00;
            font-weight: bold;
            cursor: pointer;
        }
        .requests-box {
            background: #f9f9f9;
            padding: 15px;
            margin: 15px;
            border-left: 3px solid #FF8C00;
        }
        .request-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .accept-btn, .reject-btn {
            padding: 5px 12px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            margin-left: 8px;
        }
        .accept-btn { background: #27ae60; color: white; }
        .reject-btn { background: #c0392b; color: white; }
        .search-box {
            padding: 15px;
            border-bottom: 1px solid #ddd;
            background: #f5f5f5;
        }
        .search-box input {
            width: calc(100% - 80px);
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-family: inherit;
        }
        .search-box button {
            width: 70px;
            padding: 8px;
            background: #2c3e2f;
            border: none;
            border-radius: 20px;
            color: #FF8C00;
            cursor: pointer;
        }
        .footer {
            background: #1a2a2f;
            color: #aaa;
            padding: 15px;
            text-align: center;
            font-size: 12px;
        }
        .login-container {
            max-width: 450px;
            margin: 0 auto;
            background: white;
            border: 3px solid #FF8C00;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
        }
        .login-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .login-container button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #2c3e2f;
            border: none;
            border-radius: 30px;
            color: #FF8C00;
            font-weight: bold;
            cursor: pointer;
        }
        .error-msg {
            color: #c0392b;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }
        @media (max-width: 800px) {
            .friends-sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                bottom: 0;
                z-index: 100;
                transition: 0.3s;
                background: white;
            }
            .friends-sidebar.open { left: 0; }
            .profile-layout { display: block; }
            .chat-main { width: 100%; }
        }
    </style>
</head>
<body>
<div class="asl-container">
    <div class="header">
        <h1>🔹 ПРОФИЛЬ ASL</h1>
        <div>
            <button class="icon-btn" id="openFriendsPanelBtn">👥 ДРУЗЬЯ</button>
            <button class="icon-btn" id="logoutBtn">🚪 ВЫЙТИ</button>
        </div>
    </div>
    
    <div class="nav">
        <a href="index.html">🏠 ГЛАВНАЯ</a>
        <a href="lore.html">📖 ЛОР</a>
        <a href="games.html">🎮 ИГРЫ</a>
    </div>
    
    <div id="loginScreen" style="display: flex; justify-content: center; align-items: center; min-height: 500px; padding: 40px;">
        <div class="login-container">
            <h2 style="margin-bottom: 20px;">🏷️ БЕЙДЖ ASL</h2>
            <input type="text" id="loginNickname" placeholder="Ник (только при регистрации)">
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button id="loginBtn">ВОЙТИ</button>
            <button id="registerBtn">ЗАРЕГИСТРИРОВАТЬСЯ</button>
            <div class="error-msg" id="loginError"></div>
        </div>
    </div>
    
    <div id="profileScreen" style="display: none;">
        <div class="profile-layout">
            <div class="friends-sidebar" id="friendsPanel">
                <div class="friends-header">
                    <span>👥 ДРУЗЬЯ</span>
                    <button id="closeFriendsPanel" style="background: none; border: none; font-size: 20px; cursor: pointer;">✕</button>
                </div>
                <div class="search-box">
                    <input type="text" id="searchFriendInput" placeholder="Поиск по нику...">
                    <button id="searchFriendBtn">🔍</button>
                </div>
                <div class="friends-list" id="friendsList"></div>
            </div>
            
            <div class="chat-main">
                <div class="chat-header">
                    <span>💬 Чат с <span id="chatFriendName">—</span></span>
                </div>
                <div class="messages-container" id="messagesList">
                    <div style="color: #aaa; text-align: center; padding: 40px;">Выберите друга из списка слева</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="messageInput" placeholder="Введите сообщение...">
                    <button id="sendMsgBtn">➤</button>
                </div>
            </div>
        </div>
        
        <div class="requests-box">
            <h3>📨 ВХОДЯЩИЕ ЗАЯВКИ</h3>
            <div id="requestsList">Загрузка...</div>
        </div>
        
        <div class="footer">
            <span>Вы вошли как: <span id="currentUserName"></span> | <span id="userEmail"></span> | Друзей: <span id="friendsCount">0</span> | Заявок: <span id="requestsCount">0</span></span>
        </div>
    </div>
</div>
</body>
</html>
