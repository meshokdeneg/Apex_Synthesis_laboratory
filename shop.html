<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL | Магазин</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        body {
            background: url('photo/i.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            min-height: 100vh;
            position: relative;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .cube-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #4A90E2;
            border-radius: 50px;
            padding: 15px 30px;
            z-index: 200;
            color: #fff;
            font-size: 18px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .cube-counter span {
            color: #FF8C00;
            font-size: 24px;
            font-weight: bold;
            margin-left: 10px;
        }

        .cart-icon {
            position: fixed;
            top: 20px;
            right: 200px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #FF8C00;
            border-radius: 50px;
            padding: 12px 25px;
            z-index: 200;
            color: #FF8C00;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cart-icon:hover {
            transform: scale(1.05);
            background: #FF8C00;
            color: #000;
            border-color: #fff;
        }
        .cart-count {
            background: #FF8C00;
            color: #000;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }
        .cart-icon:hover .cart-count {
            background: #000;
            color: #FF8C00;
        }

        .shop-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .shop-title {
            font-size: 48px;
            color: #FF8C00;
            margin-bottom: 30px;
            font-weight: 700;
            text-shadow: 2px 2px 0 #4A90E2, 4px 4px 0 #3A70B2;
        }

        .search-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
        }
        .search-input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #4A90E2;
            border-radius: 50px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .search-input:focus {
            border-color: #FF8C00;
            box-shadow: 0 0 15px rgba(255,140,0,0.5);
        }
        .search-input::placeholder {
            color: #aaa;
        }

        .shop-items {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 30px;
        }

        .shop-item {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 2px solid #4A90E2;
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .shop-item:hover {
            transform: scale(1.05);
            border-color: #FF8C00;
        }
        .shop-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 2px solid #4A90E2;
            transition: 0.3s;
            cursor: pointer;
        }
        .shop-item img:hover {
            transform: scale(1.02);
            border-color: #FF8C00;
        }
        .item-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .item-price {
            font-size: 22px;
            color: #FF8C00;
            margin: 10px 0;
        }
        .cart-btn {
            background: rgba(74, 144, 226, 0.8);
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 5px;
        }
        .cart-btn:hover {
            background: #FF8C00;
            transform: scale(1.05);
        }

        /* Корзина модальное окно */
        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .cart-content {
            background: rgba(30,30,30,0.95);
            border: 3px solid #FF8C00;
            border-radius: 30px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            color: #fff;
        }
        .cart-content h2 { color: #FF8C00; margin-bottom: 20px; text-align: center; }
        .cart-items { margin-bottom: 20px; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #4A90E2;
        }
        .cart-item-info { flex: 2; }
        .cart-item-price { width: 100px; text-align: right; color: #FF8C00; }
        .cart-item-remove { background: none; border: none; color: #ff6b6b; font-size: 20px; cursor: pointer; margin-left: 15px; transition: 0.2s; }
        .cart-item-remove:hover { transform: scale(1.2); color: #ff0000; }
        .cart-total { text-align: right; font-size: 20px; margin: 20px 0; padding-top: 10px; border-top: 2px solid #FF8C00; }
        .cart-buttons { display: flex; gap: 15px; justify-content: center; }
        .cart-btn-checkout, .cart-btn-close { background: #4A90E2; border: none; border-radius: 50px; padding: 10px 25px; font-size: 16px; font-weight: bold; color: #fff; cursor: pointer; transition: 0.2s; }
        .cart-btn-checkout:hover { background: #FF8C00; transform: scale(1.05); }
        .cart-btn-close:hover { background: #666; }
        .empty-cart { text-align: center; padding: 30px; color: #aaa; }

        /* ===== ПОЛНОЭКРАННОЕ МОДАЛЬНОЕ ОКНО ТОВАРА (КАК НА МАРКЕТПЛЕЙСАХ) ===== */
        .item-details-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff; /* белый фон */
            z-index: 3000;
            display: none;
            overflow-y: auto;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }
        .item-details-content {
            max-width: 1200px;
            width: 100%;
            background: #fff;
            color: #1a1a1a;
            position: relative;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        /* Левая колонка — фото */
        .item-details-left {
            flex: 1;
            min-width: 300px;
            text-align: center;
        }
        .item-details-image {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .item-details-image img {
            width: 100%;
            height: auto;
            object-fit: cover;
            cursor: pointer;
        }
        /* Правая колонка — информация */
        .item-details-right {
            flex: 1;
            min-width: 300px;
        }
        .item-details-right h2 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #FF8C00;
        }
        .item-price-large {
            font-size: 36px;
            font-weight: bold;
            color: #FF8C00;
            margin: 20px 0;
        }
        .item-description {
            font-size: 16px;
            line-height: 1.6;
            margin: 20px 0;
            color: #555;
        }
        .specs-title {
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0 10px;
            border-bottom: 2px solid #FF8C00;
            display: inline-block;
        }
        .specs-list {
            list-style: none;
            padding: 0;
            margin: 15px 0;
        }
        .specs-list li {
            padding: 8px 0;
            border-bottom: 1px dashed #ddd;
            display: flex;
        }
        .specs-list li strong {
            width: 120px;
            color: #333;
        }
        .item-buttons {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .item-buttons button {
            background: #4A90E2;
            border: none;
            border-radius: 50px;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            min-width: 180px;
        }
        .item-buttons button:hover {
            background: #FF8C00;
            transform: scale(1.02);
        }
        .close-item-details {
            position: absolute;
            top: 0px;
            right: 20px;
            font-size: 40px;
            cursor: pointer;
            transition: 0.3s;
            color: #FF8C00;
            z-index: 10;
        }
        .close-item-details:hover {
            transform: rotate(90deg);
            color: #4A90E2;
        }
        /* Адаптация */
        @media (max-width: 800px) {
            .item-details-content {
                flex-direction: column;
                gap: 20px;
            }
            .item-details-left, .item-details-right {
                min-width: auto;
            }
            .item-buttons button {
                min-width: auto;
            }
        }

        .shop-lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 4000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .shop-lightbox-content {
            max-width: 90%;
            max-height: 90%;
            border: 3px solid #FF8C00;
            border-radius: 10px;
        }
        .shop-lightbox-close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #FF8C00;
            font-size: 40px;
            cursor: pointer;
        }

        .btn-blue {
            background: #4A90E2;
            border: none;
            border-radius: 50px;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 30px;
            transition: 0.3s;
        }
        .btn-blue:hover { background: #FF8C00; transform: scale(1.05); }

        .site-footer {
            width: 100%;
            margin-top: 30px;
            padding: 20px 0;
            border-top: 2px solid #4A90E2;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            font-size: 14px;
        }
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            padding: 0 20px;
        }
        .footer-info { color: #aaa; }
        .footer-stamp { color: #FF8C00; font-weight: bold; text-shadow: 0 0 5px #FF8C00; }
        .footer-link { color: #4A90E2; text-decoration: none; border-bottom: 1px dashed #4A90E2; transition: 0.3s; }
        .footer-link:hover { color: #FF8C00; }

        .test-cube-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 100px;
            height: 100px;
            perspective: 1000px;
            z-index: 100;
            cursor: pointer;
        }
        .test-cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 10s infinite linear;
        }
        .cube-face {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 3px solid #4A90E2;
            background-image: url('cub.png');
            background-size: cover;
            background-color: #1A3B5D;
            background-blend-mode: overlay;
            box-shadow: 0 0 30px rgba(74,144,226,0.8);
            animation: pulse-blue 2s infinite;
        }
        @keyframes pulse-blue {
            0% { box-shadow: 0 0 20px rgba(74,144,226,0.6); background-color: #1A3B5D; }
            50% { box-shadow: 0 0 40px rgba(74,144,226,1); background-color: #2A4B7D; }
            100% { box-shadow: 0 0 20px rgba(74,144,226,0.6); background-color: #1A3B5D; }
        }
        @keyframes rotate {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }
        .front { transform: translateZ(50px); }
        .back { transform: rotateY(180deg) translateZ(50px); }
        .right { transform: rotateY(90deg) translateZ(50px); }
        .left { transform: rotateY(-90deg) translateZ(50px); }
        .top { transform: rotateX(90deg) translateZ(50px); }
        .bottom { transform: rotateX(-90deg) translateZ(50px); }

        .conveyor-vertical {
            position: fixed;
            left: 30px;
            top: 0px;
            width: 150px;
            height: calc(100vh - 1px);
            border: 3px solid #4A90E2;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(74, 144, 226, 0.5);
            z-index: 200;
            pointer-events: none;
            overflow: hidden;
            background-color: #2c3e50;
            background-image: repeating-linear-gradient(180deg, #2c3e50 0px, #2c3e50 20px, #4a5b6e 20px, #4a5b6e 40px);
            background-size: 100% 40px;
            animation: moveStripes 0.8s linear infinite;
        }
        @keyframes moveStripes { 0% { background-position: 0% 0%; } 100% { background-position: 0% 40px; } }
        .conveyor-vertical::before {
            content: '';
            position: absolute;
            top: -10;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(180deg, rgba(0,0,0,0.2) 0px, rgba(0,0,0,0.2) 20px, rgba(255,255,255,0.05) 20px, rgba(255,255,255,0.05) 40px);
            border-radius: 17px;
            pointer-events: none;
        }
        #cube-stream { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .cube-fly {
            position: absolute; top: -80px; width: 80px; height: 80px;
            background-image: url('photo/каробка.png'); background-size: cover; background-position: center;
            background-repeat: no-repeat; border: 2px solid rgba(255,255,255,0.9);
            box-shadow: 0 0 15px rgba(255,140,0,0.8); border-radius: 8px;
            left: 50%; transform: translateX(-50%); animation: slideDown linear forwards;
        }
        @keyframes slideDown { 0% { top: -60px; opacity: 1; } 100% { top: calc(100% + 10px); opacity: 1; } }

        .float-message {
            position: fixed; bottom: 80px; right: 20px; background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px); border: 2px solid #FF8C00; border-radius: 40px;
            padding: 10px 20px; font-family: monospace; font-size: 18px; color: #FF8C00;
            white-space: nowrap; z-index: 10000; pointer-events: none; opacity: 0;
            animation: floatUpSlow 4s forwards;
        }
        @keyframes floatUpSlow { 0% { bottom: 80px; opacity: 1; } 100% { bottom: calc(100% - 30px); opacity: 0; } }

        @media (max-width: 1000px) { .shop-items { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 700px) { .shop-items { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .shop-items { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="cube-counter">Баланс оч.н.с.: <span id="cube-count">0</span></div>
    <div class="cart-icon" id="cartIcon">
        🛒 Корзина <span id="cartCount" class="cart-count">0</span>
    </div>

    <!-- Модальное окно корзины -->
    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <span class="close-item-details" onclick="closeCartModal()">&times;</span>
            <h2>🛍️ Ваша корзина</h2>
            <div id="cartItemsList" class="cart-items"></div>
            <div id="cartTotal" class="cart-total"></div>
            <div class="cart-buttons">
                <button class="cart-btn-checkout" onclick="checkout()">Оформить заказ</button>
                <button class="cart-btn-close" onclick="closeCartModal()">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- Полноэкранное модальное окно товара (маркетплейс стиль) -->
    <div class="item-details-modal" id="itemDetailsModal">
        <div class="item-details-content">
            <span class="close-item-details" onclick="closeItemDetails()">&times;</span>
            <div class="item-details-left">
                <div class="item-details-image" id="detailsImage"></div>
            </div>
            <div class="item-details-right">
                <h2 id="detailsTitle"></h2>
                <div class="item-price-large" id="detailsPrice"></div>
                <div class="item-description" id="detailsDescription"></div>
                <div class="specs-title">📋 Характеристики</div>
                <ul class="specs-list" id="detailsSpecs"></ul>
                <div class="item-buttons">
                    <button id="detailsBuyBtn">Купить сразу</button>
                    <button id="detailsCartBtn">Добавить в корзину</button>
                </div>
            </div>
        </div>
    </div>

    <div class="shop-lightbox" id="shopLightbox">
        <span class="shop-lightbox-close" onclick="closeShopLightbox()">&times;</span>
        <img class="shop-lightbox-content" id="shopLightboxImg">
    </div>

    <div class="shop-container">
        <h1 class="shop-title">🛒 МАГАЗИН ASL</h1>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск товара по названию...">
        </div>
        <div class="shop-items" id="shopItemsGrid"></div>
        <a href="index.html" class="btn-blue">НАЗАД</a>

        <footer class="site-footer">
            <div class="footer-content">
                <span class="footer-info">ASL • отдел TToS • версия 2.0</span>
                <span class="footer-stamp">✻ СИНТЕЗ ПОДТВЕРЖДЁН ✻</span>
                <a href="about.html" class="footer-link"># Извещение</a>
            </div>
        </footer>
    </div>

    <div class="test-cube-container" onclick="cubeClick()">
        <div class="test-cube">
            <div class="cube-face front"></div><div class="cube-face back"></div>
            <div class="cube-face right"></div><div class="cube-face left"></div>
            <div class="cube-face top"></div><div class="cube-face bottom"></div>
        </div>
    </div>

    <div class="conveyor-vertical"><div id="cube-stream"></div></div>

    <script>
        let cubeCount = 100;
        let currentUser = null;
        let cart = [];

        const savedCount = localStorage.getItem('cubeCount');
        if (savedCount) cubeCount = parseInt(savedCount);
        document.getElementById('cube-count').textContent = cubeCount;

        const savedUser = localStorage.getItem('asl_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            document.getElementById('profileButton').style.display = 'block';
        }

        const savedCart = localStorage.getItem('asl_cart');
        if (savedCart) {
            cart = JSON.parse(savedCart);
        }
        updateCartUI();

        // Массив товаров с характеристиками
        const shopItems = [
            { id: 'item1', name: 'Радио-тостерная тарелка', description: 'Эта тарелка не только разогревает еду, но и ловит сигналы из других измерений.', price: 1337, image: 'photo/2026-03-04_11-31-41.png', specs: { 'Материал': 'Керамика + кварц', 'Мощность': '1200 Вт', 'Гарантия': '3 года', 'Вес': '1.2 кг' } },
            { id: 'item2', name: 'Машина на ядерном реакторе', description: 'Компактный автомобиль, работающий на урановых стержнях.', price: 5000, image: 'photo/машина.png', specs: { 'Двигатель': 'Ядерный', 'Разгон 0-100': '2 сек', 'Запас хода': '∞ (почти)', 'Радиация': 'в комплекте' } },
            { id: 'item3', name: 'Микроволновка с реактивным двигателем', description: 'Разогревает пищу за 0.5 секунды.', price: 9999, image: 'photo/3.png', specs: { 'Мощность': '5000 Вт', 'Режимы': 'разогрев, взлёт', 'Тяга': '250 кгс', 'Опасность': 'высокая' } },
            { id: 'item4', name: 'Холодильник ГЛУКа', description: 'Хранит продукты вечно. Иногда разговаривает.', price: 2500, image: 'photo/4.png', specs: { 'Объём': '250 л', 'Температура': '-∞ до +∞', 'Особенность': 'Голосовой помощник', 'Гарантия': 'пожизненная' } },

        function renderShop(filterText = '') {
            const grid = document.getElementById('shopItemsGrid');
            grid.innerHTML = '';
            const filteredItems = shopItems.filter(item =>
                item.name.toLowerCase().includes(filterText.toLowerCase())
            );
            if (filteredItems.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.style.textAlign = 'center';
                emptyMsg.style.padding = '40px';
                emptyMsg.style.color = '#FF8C00';
                emptyMsg.style.fontSize = '20px';
                emptyMsg.textContent = '❌ Товары не найдены. Попробуйте другой запрос.';
                grid.appendChild(emptyMsg);
                return;
            }
            filteredItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'shop-item';
                const img = document.createElement('img');
                img.src = item.image;
                img.alt = item.name;
                img.onerror = () => { img.src = 'photo/placeholder.png'; };
                img.onclick = (e) => { e.stopPropagation(); openShopLightbox(item.image); };
                const nameDiv = document.createElement('div'); nameDiv.className = 'item-name'; nameDiv.textContent = item.name;
                const priceDiv = document.createElement('div'); priceDiv.className = 'item-price'; priceDiv.textContent = item.price + ' кубов';
                const cartBtn = document.createElement('button'); cartBtn.textContent = '🛒 В корзину'; cartBtn.className = 'cart-btn';
                cartBtn.onclick = (e) => { e.stopPropagation(); addToCart(item); };
                div.appendChild(img); div.appendChild(nameDiv); div.appendChild(priceDiv); div.appendChild(cartBtn);
                div.onclick = () => openItemDetails(item.id);
                grid.appendChild(div);
            });
        }

        function openItemDetails(id) {
            const item = shopItems.find(i => i.id === id);
            if (!item) return;
            document.getElementById('detailsTitle').innerText = item.name;
            document.getElementById('detailsDescription').innerText = item.description;
            document.getElementById('detailsPrice').innerText = item.price + ' кубов';
            const imgContainer = document.getElementById('detailsImage');
            const img = document.createElement('img');
            img.src = item.image;
            img.onclick = () => openShopLightbox(item.image);
            imgContainer.innerHTML = '';
            imgContainer.appendChild(img);
            // Характеристики
            const specsList = document.getElementById('detailsSpecs');
            specsList.innerHTML = '';
            for (const [key, value] of Object.entries(item.specs)) {
                const li = document.createElement('li');
                li.innerHTML = `<strong>${key}:</strong> ${value}`;
                specsList.appendChild(li);
            }
            const buyBtn = document.getElementById('detailsBuyBtn');
            const cartBtn = document.getElementById('detailsCartBtn');
            buyBtn.onclick = () => buyItem(item.id);
            cartBtn.onclick = () => { addToCart(item); closeItemDetails(); };
            document.getElementById('itemDetailsModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeItemDetails() {
            document.getElementById('itemDetailsModal').style.display = 'none';
            document.body.style.overflow = '';
        }

        function addToCart(item) {
            if (cart.find(i => i.id === item.id)) {
                alert('Товар уже в корзине!');
                return;
            }
            cart.push({ id: item.id, name: item.name, price: item.price, image: item.image });
            localStorage.setItem('asl_cart', JSON.stringify(cart));
            updateCartUI();
            showFloatMessage(`✅ ${item.name} добавлен в корзину`);
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            localStorage.setItem('asl_cart', JSON.stringify(cart));
            updateCartUI();
            showFloatMessage(`🗑️ Товар удалён из корзины`);
        }

        function updateCartUI() {
            document.getElementById('cartCount').textContent = cart.length;
            if (cart.length === 0) {
                document.getElementById('cartItemsList').innerHTML = '<div class="empty-cart">Корзина пуста</div>';
                document.getElementById('cartTotal').innerHTML = '';
                return;
            }
            let total = 0;
            let html = '';
            cart.forEach(item => {
                total += item.price;
                html += `
                    <div class="cart-item">
                        <div class="cart-item-info">${item.name}</div>
                        <div class="cart-item-price">${item.price} кубов</div>
                        <button class="cart-item-remove" data-id="${item.id}">✖</button>
                    </div>
                `;
            });
            document.getElementById('cartItemsList').innerHTML = html;
            document.getElementById('cartTotal').innerHTML = `Итого: ${total} кубов`;
            document.querySelectorAll('.cart-item-remove').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = btn.getAttribute('data-id');
                    removeFromCart(id);
                });
            });
        }

        function checkout() {
            if (cart.length === 0) {
                alert('Корзина пуста!');
                return;
            }
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            if (cubeCount < total) {
                alert(`Недостаточно кубов! Нужно ${total}, у вас ${cubeCount}`);
                return;
            }
            cubeCount -= total;
            document.getElementById('cube-count').textContent = cubeCount;
            localStorage.setItem('cubeCount', cubeCount);
            cart = [];
            localStorage.setItem('asl_cart', JSON.stringify(cart));
            updateCartUI();
            closeCartModal();
            showFloatMessage(`✅ Заказ оформлен! Списано ${total} кубов.`);
        }

        function openCartModal() { document.getElementById('cartModal').style.display = 'flex'; }
        function closeCartModal() { document.getElementById('cartModal').style.display = 'none'; }

        function buyItem(id) {
            const item = shopItems.find(i => i.id === id);
            if (cubeCount < item.price) { alert(`Недостаточно кубов! Нужно ${item.price}`); return; }
            cubeCount -= item.price;
            document.getElementById('cube-count').innerText = cubeCount;
            localStorage.setItem('cubeCount', cubeCount);
            alert(`✅ Вы купили ${item.name} за ${item.price} очков!`);
            closeItemDetails();
        }

        function openShopLightbox(src) { document.getElementById('shopLightboxImg').src = src; document.getElementById('shopLightbox').style.display = 'flex'; }
        function closeShopLightbox() { document.getElementById('shopLightbox').style.display = 'none'; }

        function showFloatMessage(text) {
            const msg = document.createElement('div');
            msg.textContent = text;
            msg.className = 'float-message';
            msg.style.bottom = (80 + Math.random() * 40) + 'px';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        window.onclick = function(e) {
            if (e.target === document.getElementById('itemDetailsModal')) closeItemDetails();
            if (e.target === document.getElementById('shopLightbox')) closeShopLightbox();
            if (e.target === document.getElementById('cartModal')) closeCartModal();
        };

        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => renderShop(e.target.value));

            stream.appendChild(cube);
            cube.addEventListener('animationend', () => cube.remove());
        }

            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            const msg = document.createElement('div');
            msg.textContent = randomPhrase;
            msg.className = 'float-message';
            msg.style.bottom = (80 + Math.random() * 40) + 'px';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 4000);
            const cube = document.getElementById('test-cube');
            cube.style.transform = 'scale(1.2) rotateX(30deg) rotateY(30deg)';
            setTimeout(() => cube.style.transform = '', 200);
        }

        document.getElementById('cartIcon').addEventListener('click', openCartModal);
        renderShop();
    </script>
