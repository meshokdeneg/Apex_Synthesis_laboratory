<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL | Магазин</title>
    <style>
        /* ===== ОБЩИЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        body {
            background: url('photo/i.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            min-height: 100vh;
            position: relative;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* Счётчик кубов */
        .cube-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #4A90E2;
            border-radius: 50px;
            padding: 15px 30px;
            z-index: 200;
            color: #fff;
            font-size: 18px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .cube-counter span {
            color: #FF8C00;
            font-size: 24px;
            font-weight: bold;
            margin-left: 10px;
        }

        /* Магазин */
        .shop-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .shop-title {
            font-size: 48px;
            color: #FF8C00;
            margin-bottom: 30px;
            font-weight: 700;
            text-shadow: 2px 2px 0 #4A90E2, 4px 4px 0 #3A70B2;
        }

        .shop-items {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 30px;
        }

        .shop-item {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 2px solid #4A90E2;
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .shop-item:hover {
            transform: scale(1.05);
            border-color: #FF8C00;
        }

        .shop-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 2px solid #4A90E2;
            transition: 0.3s;
        }

        .shop-item img:hover {
            transform: scale(1.02);
            border-color: #FF8C00;
        }

        .item-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .item-price {
            font-size: 24px;
            color: #FF8C00;
            margin: 10px 0;
        }

        /* Модальное окно деталей товара (НЕ полноэкранное) */
.item-details-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(10px);
    z-index: 3000;
    display: none;
    justify-content: center;
    align-items: center;
}

.item-details-content {
    background-color: #FFFFFF;
    border: 3px solid #FF8C00;
    border-radius: 0px;
    padding: 30px;
    max-width: 3500px;
    width: 100%;
    max-height: 230vh;
    overflow-y: auto;
    text-align: center;
    position: relative;
    box-shadow: 0 0 50px rgba(0,0,0,0.5);
}

.item-details-image {
    right: 100px;
    width: 700px;
    height: 700px;
    margin: 20px auto;
    border: 3px solid #4A90E2;
    border-radius: 20px;
    overflow: hidden;
}

.item-details-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    cursor: pointer;
}

        .item-details-description {
            margin: 20px 0;
            color: #333;
        }

        .item-details-price {
            font-size: 28px;
            color: #FF8C00;
            margin: 20px 0;
        }

        .item-details-buy-btn {
            background: #4A90E2;
            border: none;
            border-radius: 50px;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
        }

        .item-details-buy-btn:hover {
            background: #FF8C00;
            transform: scale(1.05);
        }

        .close-item-details {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 35px;
            cursor: pointer;
            transition: 0.3s;
            color: #FF8C00;
        }

        .close-item-details:hover {
            transform: rotate(90deg);
            color: #4A90E2;
        }

        /* Lightbox для увеличения фото */
        .shop-lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 4000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .shop-lightbox-content {
            max-width: 90%;
            max-height: 90%;
            border: 3px solid #FF8C00;
            border-radius: 10px;
        }

        .shop-lightbox-close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #FF8C00;
            font-size: 40px;
            cursor: pointer;
        }

        .btn-blue {
            background: #4A90E2;
            border: none;
            border-radius: 50px;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 30px;
            transition: 0.3s;
        }
        .btn-blue:hover {
            background: #FF8C00;
            transform: scale(1.05);
        }

        /* Подвал */
        .site-footer {
            width: 100%;
            margin-top: 30px;
            padding: 20px 0;
            border-top: 2px solid #4A90E2;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            font-size: 14px;
        }
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            padding: 0 20px;
        }
        .footer-info {
            color: #aaa;
        }
        .footer-stamp {
            color: #FF8C00;
            font-weight: bold;
            text-shadow: 0 0 5px #FF8C00;
        }
        .footer-link {
            color: #4A90E2;
            text-decoration: none;
            border-bottom: 1px dashed #4A90E2;
            transition: 0.3s;
        }
        .footer-link:hover {
            color: #FF8C00;
        }

        /* Тестовый куб справа внизу */
        .test-cube-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 100px;
            height: 100px;
            perspective: 1000px;
            z-index: 100;
            cursor: pointer;
        }
        .test-cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 10s infinite linear;
        }
        .cube-face {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 3px solid #4A90E2;
            background-image: url('cub.png');
            background-size: cover;
            background-color: #1A3B5D;
            background-blend-mode: overlay;
            box-shadow: 0 0 30px rgba(74,144,226,0.8);
            animation: pulse-blue 2s infinite;
        }
        @keyframes pulse-blue {
            0% { box-shadow: 0 0 20px rgba(74,144,226,0.6); background-color: #1A3B5D; }
            50% { box-shadow: 0 0 40px rgba(74,144,226,1); background-color: #2A4B7D; }
            100% { box-shadow: 0 0 20px rgba(74,144,226,0.6); background-color: #1A3B5D; }
        }
        @keyframes rotate {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }
        .front { transform: translateZ(50px); }
        .back { transform: rotateY(180deg) translateZ(50px); }
        .right { transform: rotateY(90deg) translateZ(50px); }
        .left { transform: rotateY(-90deg) translateZ(50px); }
        .top { transform: rotateX(90deg) translateZ(50px); }
        .bottom { transform: rotateX(-90deg) translateZ(50px); }

        /* ===== ВЕРТИКАЛЬНЫЙ КОНВЕЙЕР БЕЗ СКРУГЛЕНИЯ ===== */
        .conveyor-vertical {
            position: fixed;
            left: 30px;
            top: 0px;
            width: 150px;
            height: calc(100vh - 1px);
            border: 3px solid #4A90E2;
            border-radius: 0;
            box-shadow: 0 0 20px rgba(74, 144, 226, 0.5);
            z-index: 200;
            pointer-events: none;
            overflow: hidden;
            background-color: #2c3e50;
            background-image: repeating-linear-gradient(
                180deg,
                #2c3e50 0px,
                #2c3e50 20px,
                #4a5b6e 20px,
                #4a5b6e 40px
            );
            background-size: 100% 40px;
            animation: moveStripes 0.8s linear infinite;
        }

        @keyframes moveStripes {
            0% { background-position: 0% 0%; }
            100% { background-position: 0% 40px; }
        }

        .conveyor-vertical::before {
            content: '';
            position: absolute;
            top: -10;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                180deg,
                rgba(0,0,0,0.2) 0px,
                rgba(0,0,0,0.2) 20px,
                rgba(255,255,255,0.05) 20px,
                rgba(255,255,255,0.05) 40px
            );
            border-radius: 0;
            pointer-events: none;
        }

        #cube-stream {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .cube-fly {
            position: absolute;
            top: -80px;
            width: 80px;
            height: 80px;
            background-image: url('photo/каробка.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: 2px solid rgba(255,255,255,0.9);
            box-shadow: 0 0 15px rgba(255,140,0,0.8);
            border-radius: 8px;
            left: 50%;
            transform: translateX(-50%);
            animation: slideDown linear forwards;
        }

        @keyframes slideDown {
            0% { top: -60px; opacity: 1; }
            100% { top: calc(100% + 10px); opacity: 1; }
        }

        /* ===== ВСПЛЫВАЮЩИЕ СООБЩЕНИЯ (справа) ===== */
        .float-message {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            border: 2px solid #FF8C00;
            border-radius: 40px;
            padding: 10px 20px;
            font-family: 'Segoe UI', monospace;
            font-size: 18px;
            color: #FF8C00;
            white-space: nowrap;
            z-index: 10000;
            pointer-events: none;
            opacity: 0;
            animation: floatUpSlow 4s forwards;
        }

        @keyframes floatUpSlow {
            0% { bottom: 80px; opacity: 1; }
            100% { bottom: calc(100% - 30px); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="cube-counter">Баланс оч.н.с.: <span id="cube-count">0</span></div>
    <div class="profile-button" id="profileButton" style="display: none;"></div>

    <!-- Модальные окна -->
    <div class="item-details-modal" id="itemDetailsModal">
        <div class="item-details-content">
            <span class="close-item-details" onclick="closeItemDetails()">&times;</span>
            <h2 id="detailsTitle"></h2>
            <div class="item-details-image" id="detailsImage"></div>
            <div class="item-details-description" id="detailsDescription"></div>
            <div class="item-details-price" id="detailsPrice"></div>
            <button class="item-details-buy-btn" id="detailsBuyBtn">КУПИТЬ</button>
        </div>
    </div>

    <div class="shop-lightbox" id="shopLightbox">
        <span class="shop-lightbox-close" onclick="closeShopLightbox()">&times;</span>
        <img class="shop-lightbox-content" id="shopLightboxImg">
    </div>

    <div class="shop-container">
        <h1 class="shop-title">🛒 МАГАЗИН ASL</h1>
        <div class="shop-items" id="shopItemsGrid"></div>
        <a href="index.html" class="btn-blue">НАЗАД</a>

        <footer class="site-footer">
            <div class="footer-content">
                <span class="footer-info">ASL • отдел TToS • версия 2.0</span>
                <span class="footer-stamp">✻ СИНТЕЗ ПОДТВЕРЖДЁН ✻</span>
                <a href="about.html" class="footer-link"># Извещение</a>
            </div>
        </footer>
    </div>

    <div class="test-cube-container" onclick="cubeClick()">
        <div class="test-cube">
            <div class="cube-face front"></div>
            <div class="cube-face back"></div>
            <div class="cube-face right"></div>
            <div class="cube-face left"></div>
            <div class="cube-face top"></div>
            <div class="cube-face bottom"></div>
        </div>
    </div>

    <!-- ВЕРТИКАЛЬНЫЙ КОНВЕЙЕР -->
    <div class="conveyor-vertical">
        <div id="cube-stream"></div>
    </div>

    <script>
        let cubeCount = 100;
        let currentUser = null;

        const savedCount = localStorage.getItem('cubeCount');
        if (savedCount) cubeCount = parseInt(savedCount);
        document.getElementById('cube-count').textContent = cubeCount;

        const savedUser = localStorage.getItem('asl_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            document.getElementById('profileButton').style.display = 'block';
        }

        const shopItems = [
            { id: 'item1', name: 'Радио-тостерная тарелка', description: 'Эта тарелка не только разогревает еду, но и ловит сигналы из других измерений.', price: 1337, image: 'photo/2026-03-04_11-31-41.png' },
            { id: 'item2', name: 'Машина на ядерном реакторе', description: 'Компактный автомобиль, работающий на урановых стержнях.', price: 5000, image: 'photo/машина.png' },
            { id: 'item3', name: 'Микроволновка с реактивным двигателем', description: 'Разогревает пищу за 0.5 секунды.', price: 9999, image: 'photo/3.png' },
            { id: 'item4', name: 'Холодильник ГЛУКа', description: 'Хранит продукты вечно. Иногда разговаривает.', price: 2500, image: 'photo/4.png' },
            { id: 'item5', name: 'Квантовый чайник', description: 'Находится во всех комнатах одновременно.', price: 777, image: 'photo/5.png' },
            { id: 'item6', name: 'Портал в другой мир', description: 'Создаёт временной портал в случайную реальность.', price: 1000000, image: 'photo/6.png' },
            { id: 'item7', name: 'Гравитационные ботинки', description: 'Позволяют ходить по потолку.', price: 3200, image: 'photo/7.png' },
            { id: 'item8', name: 'Фонарик, который светит в прошлое', description: 'Освещает события, которые уже произошли.', price: 4500, image: 'photo/8.png' },
            { id: 'item9', name: 'Телепортационная кружка', description: 'Перемещает напиток прямо в рот.', price: 2100, image: 'photo/9.png' },
            { id: 'item10', name: 'Шляпа-невидимка', description: 'Делает невидимым только то, что под ней.', price: 1850, image: 'photo/10.png' },
            { id: 'item11', name: 'Робот-пылесос с ИИ', description: 'Не только пылесосит, но и философствует.', price: 4200, image: 'photo/11.png' },
            { id: 'item12', name: 'Будильник, который читает мысли', description: 'Будит ровно за 5 минут до того, как вы захотите встать.', price: 1900, image: 'photo/12.png' },
            { id: 'item13', name: 'Сублиматор реальности', description: 'Переводит абстрактные идеи в физические объекты.', price: 15000, image: 'photo/13.png' },
            { id: 'item14', name: 'Очки дополненной лжи', description: 'Показывают, когда вам врут.', price: 3300, image: 'photo/14.png' },
            { id: 'item15', name: 'Наушники с эффектом эха', description: 'Воспроизводят звук с задержкой в 2 секунды.', price: 1100, image: 'photo/15.png' },
            { id: 'item16', name: 'Ковёр-самолёт эконом-класса', description: 'Летает, но только на высоте 10 см.', price: 6800, image: 'photo/16.png' },
            { id: 'item17', name: 'Калькулятор судьбы', description: 'Вычисляет вероятность событий.', price: 1200, image: 'photo/17.png' },
            { id: 'item18', name: 'Зонт-антидождь', description: 'Отталкивает капли дождя обратно в небо.', price: 2700, image: 'photo/18.png' },
            { id: 'item19', name: 'Перчатки для сенсорного экрана', description: 'Позволяют пользоваться телефоном в перчатках.', price: 500, image: 'photo/19.png' },
            { id: 'item20', name: 'Коробка сюрпризов ASL', description: 'Внутри может быть всё что угодно.', price: 999, image: 'photo/20.png' }
        ];

        function renderShop() {
            const grid = document.getElementById('shopItemsGrid');
            grid.innerHTML = '';
            shopItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'shop-item';
                
                const img = document.createElement('img');
                img.src = item.image;
                img.alt = item.name;
                img.onerror = () => { img.src = 'photo/placeholder.png'; };
                
                const nameDiv = document.createElement('div');
                nameDiv.className = 'item-name';
                nameDiv.textContent = item.name;
                
                const priceDiv = document.createElement('div');
                priceDiv.className = 'item-price';
                priceDiv.textContent = item.price + ' кубов';
                
                div.appendChild(img);
                div.appendChild(nameDiv);
                div.appendChild(priceDiv);
                
                div.onclick = () => openItemDetails(item.id);
                grid.appendChild(div);
            });
        }

        function openItemDetails(id) {
            const item = shopItems.find(i => i.id === id);
            if (!item) return;
            document.getElementById('detailsTitle').innerText = item.name;
            document.getElementById('detailsDescription').innerText = item.description;
            document.getElementById('detailsPrice').innerText = item.price + ' кубов';
            const imgContainer = document.getElementById('detailsImage');
            const img = document.createElement('img');
            img.src = item.image;
            img.onclick = () => openShopLightbox(item.image);
            imgContainer.innerHTML = '';
            imgContainer.appendChild(img);
            const btn = document.getElementById('detailsBuyBtn');
            btn.onclick = () => buyItem(item.id);
            document.getElementById('itemDetailsModal').style.display = 'flex';
        }

        function closeItemDetails() { document.getElementById('itemDetailsModal').style.display = 'none'; }
        function openShopLightbox(src) { document.getElementById('shopLightboxImg').src = src; document.getElementById('shopLightbox').style.display = 'flex'; }
        function closeShopLightbox() { document.getElementById('shopLightbox').style.display = 'none'; }

        function buyItem(id) {
            const item = shopItems.find(i => i.id === id);
            if (cubeCount < item.price) { alert(`Недостаточно кубов! Нужно ${item.price}`); return; }
            cubeCount -= item.price;
            document.getElementById('cube-count').innerText = cubeCount;
            localStorage.setItem('cubeCount', cubeCount);
            alert(`✅ Вы купили ${item.name} за ${item.price} очков!`);
            closeItemDetails();
        }

        window.onclick = function(e) {
            if (e.target === document.getElementById('itemDetailsModal')) closeItemDetails();
            if (e.target === document.getElementById('shopLightbox')) closeShopLightbox();
        };

        function openProfileModal() { alert('Функция профиля в разработке'); }

        function cubeClick() {
            // 10% шанс показать сообщение
            if (Math.random() > 0.1) {
                const cube = document.getElementById('test-cube');
                cube.style.transform = 'scale(1.2) rotateX(30deg) rotateY(30deg)';
                setTimeout(() => { cube.style.transform = ''; }, 200);
                return;
            }

            const phrases = [
                "😊", "😂", "😎", "🤔", "😱", "🤯", "🥳", "😈", "👾", "🤖",
                "глюк: Эй, полегче с кубом!",
                "глюк: Ты чего такой агрессивный?",
                "глюк: Куб не игрушка!",
                "глюк: Осторожно, куб может обидеться!",
                "глюк: Кубу нужен перерыв...",
                "глюк: Не ломай куб, он нам нужен!",
                "глюк: Ты пытаешься вызвать глюк?",
                "глюк: Ещё чуть-чуть и куб засветится!",
                "глюк: Зачем ты это делаешь?",
                "глюк: Куб начинает светиться!",
                "глюк: Осторожно, куб может взорваться!",
                "глюк: Ты кликаешь быстрее чем я думаю!",
                "глюк: Поздравляю с нажатием!",
                "глюк: Ты получил достижение 'Кликер'!"
            ];
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];

            const msg = document.createElement('div');
            msg.textContent = randomPhrase;
            msg.className = 'float-message';
            const randomBottom = 80 + Math.random() * 40;
            msg.style.bottom = randomBottom + 'px';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 4000);

            const cube = document.getElementById('test-cube');
            cube.style.transform = 'scale(1.2) rotateX(30deg) rotateY(30deg)';
            setTimeout(() => { cube.style.transform = ''; }, 200);
        }

        // ===== СОЗДАНИЕ КУБОВ НА КОНВЕЙЕРЕ =====
        function createCube() {
            const stream = document.getElementById('cube-stream');
            if (!stream) return;

            const cube = document.createElement('div');
            cube.className = 'cube-fly';
            const duration = 3 + Math.random() * 4;
            cube.style.animationDuration = duration + 's';
            const startDelay = Math.random() * 1.5;
            cube.style.animationDelay = startDelay + 's';
            stream.appendChild(cube);
            cube.addEventListener('animationend', () => cube.remove());
        }

        setInterval(() => {
            createCube();
        }, 1800 + Math.random() * 1200);

        renderShop();
    </script>
</body>
</html>
