<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL | Магазин</title>
    <style>
        /* ===== ОБЩИЕ СТИЛИ (как на главной) ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        body {
            background: url('i.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            min-height: 100vh;
            overflow: auto;
            position: relative;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* Счётчик кубов (правый верхний угол) */
        .cube-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #4A90E2;
            border-radius: 50px;
            padding: 15px 30px;
            z-index: 200;
            display: block;
            color: #fff;
            font-size: 18px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .cube-counter span {
            color: #FF8C00;
            font-size: 24px;
            font-weight: bold;
            margin-left: 10px;
        }

        /* ===== СТИЛИ МАГАЗИНА ===== */
        .shop-container {
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .shop-title {
            font-size: 48px;
            color: #FF8C00;
            margin-bottom: 30px;
            font-weight: 700;
            text-align: center;
            text-shadow: 2px 2px 0 #4A90E2, 4px 4px 0 #3A70B2;
        }

        .shop-items {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 30px;
        }

        .shop-item {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 2px solid #4A90E2;
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .shop-item:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(74, 144, 226, 0.3);
            border-color: #FF8C00;
        }

        .item-name {
            font-size: 20px;
            color: #fff;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .item-price {
            font-size: 24px;
            color: #FF8C00;
            margin: 15px 0;
        }

        /* Модальное окно деталей товара */
        .item-details-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .item-details-content {
            background: rgba(30, 30, 30, 0.95);
            border: 3px solid #FF8C00;
            border-radius: 30px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            color: #fff;
            text-align: center;
        }

        .item-details-content h2 {
            color: #FF8C00;
            margin-bottom: 20px;
            font-size: 32px;
        }

        .item-details-image {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border: 3px solid #4A90E2;
            border-radius: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }

        .item-details-image:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #FF8C00, 0 0 60px rgba(255, 140, 0, 0.5);
            border-color: #FF8C00;
        }

        .item-details-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 17px;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .item-details-image:hover img {
            transform: scale(1.02);
        }

        .item-details-description {
            font-size: 18px;
            line-height: 1.6;
            margin: 20px 0;
            color: #ccc;
        }

        .item-details-price {
            font-size: 28px;
            color: #FF8C00;
            margin: 20px 0;
        }

        .item-details-buy-btn {
            background: #4A90E2;
            border: none;
            border-radius: 50px;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            margin: 20px 0;
        }

        .item-details-buy-btn:hover {
            background: #FF8C00;
            transform: scale(1.05);
        }

        .close-item-details {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #FF8C00;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            line-height: 1;
        }

        .close-item-details:hover {
            color: #4A90E2;
            transform: rotate(90deg);
        }

        /* Lightbox для увеличения фото */
        .shop-lightbox {
            display: none;
            position: fixed;
            z-index: 4000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
        }

        .shop-lightbox-content {
            max-width: 90%;
            max-height: 90%;
            border: 3px solid #FF8C00;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(255,140,0,0.5);
        }

        .shop-lightbox-close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #FF8C00;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .shop-lightbox-close:hover {
            color: #4A90E2;
            transform: rotate(90deg);
        }

        .btn-blue {
            background: #4A90E2;
            border: none;
            border-radius: 50px;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 30px;
        }

        .btn-blue:hover {
            background: #FF8C00;
            transform: scale(1.05);
        }

        /* ===== СТИЛИ ПОДВАЛА ===== */
        .site-footer {
            width: 100%;
            margin-top: 30px;
            padding: 20px 0;
            border-top: 2px solid #4A90E2;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #ccc;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            padding: 0 20px;
        }

        .footer-info {
            color: #aaa;
        }

        .footer-stamp {
            color: #FF8C00;
            font-weight: bold;
            text-shadow: 0 0 5px #FF8C00;
        }

        .footer-link {
            color: #4A90E2;
            text-decoration: none;
            border-bottom: 1px dashed #4A90E2;
            transition: 0.3s;
        }

        .footer-link:hover {
            color: #FF8C00;
            border-bottom-color: #FF8C00;
        }

        /* Тестовый куб */
        .test-cube-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 100px;
            height: 100px;
            perspective: 1000px;
            z-index: 100;
            cursor: pointer;
        }

        .test-cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s;
            animation: rotate 10s infinite linear;
        }

        .test-cube:hover {
            transform: scale(1.1) rotateX(10deg) rotateY(10deg);
        }

        .test-cube:active {
            transform: scale(0.95);
        }

        .cube-face {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 3px solid #4A90E2;
            background-image: url('cub.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #1A3B5D;
            background-blend-mode: overlay;
            box-shadow: 0 0 30px rgba(74, 144, 226, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            font-weight: bold;
            text-transform: uppercase;
            backdrop-filter: blur(2px);
            animation: pulse-blue 2s infinite ease-in-out;
        }

        @keyframes pulse-blue {
            0% { 
                box-shadow: 0 0 20px rgba(74, 144, 226, 0.6);
                background-color: #1A3B5D;
            }
            50% { 
                box-shadow: 0 0 40px rgba(74, 144, 226, 1), 0 0 60px rgba(74, 144, 226, 0.6);
                background-color: #2A4B7D;
            }
            100% { 
                box-shadow: 0 0 20px rgba(74, 144, 226, 0.6);
                background-color: #1A3B5D;
            }
        }

        @keyframes rotate {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }

        .front { transform: translateZ(50px); }
        .back { transform: rotateY(180deg) translateZ(50px); }
        .right { transform: rotateY(90deg) translateZ(50px); }
        .left { transform: rotateY(-90deg) translateZ(50px); }
        .top { transform: rotateX(90deg) translateZ(50px); }
        .bottom { transform: rotateX(-90deg) translateZ(50px); }

        /* ===== ТРУБА С ЛЕТЯЩИМИ КУБАМИ (СЛЕВА) ===== */
        .tube-container {
            position: fixed;
            left: 20px;
            top: 0px;
            width: 180px;
            height: 1500px;
            z-index: 200;
            pointer-events: none;
        }

        .tube {
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                #2c3e50 0px,
                #2c3e50 10px,
                #34495e 10px,
                #34495e 20px
            );
            border: 3px solid #4A90E2;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(74, 144, 226, 0.5);
            position: relative;
            overflow: visible;
        }

        #cube-stream {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .cube-fly {
            position: absolute;
            top: -110px;
            width: 100px;
            height: 100px;
            background-image: url('file:///C:/Users/User/Desktop/Новая%20папка%20(11)/каробка.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: 2px solid rgba(255,255,255,0.9);
            box-shadow: 0 0 15px rgba(255,140,0,0.8);
            border-radius: 8px;
            left: 50%;
            /* убрали начальный rotate, чтобы куб не крутился сам по себе */
            animation: flyCube linear forwards;
        }

        @keyframes flyCube {
    0% {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
    }
    100% {
        transform: translateX(-50%) translateY(1200px);
    }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <!-- СЧЁТЧИК КУБОВ -->

        Баланс оч.н.с.: <span id="cube-count">0</span>

        <!-- ПОДВАЛ -->

            <div id="cube-stream"></div>

        // ===== ФУНКЦИИ МАГАЗИНА =====
        function renderShop() {
            const grid = document.getElementById('shopItemsGrid');
            grid.innerHTML = '';
            shopItems.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'shop-item';
                itemDiv.setAttribute('data-id', item.id);
                itemDiv.innerHTML = `
                    <div class="item-name">${item.name}</div>
                    <div class="item-price">${item.price} кубов</div>
                `;
                itemDiv.addEventListener('click', () => openItemDetails(item.id));
                grid.appendChild(itemDiv);
            });
        }

        function openItemDetails(itemId) {
            const item = shopItems.find(i => i.id === itemId);
            if (!item) return;

            document.getElementById('detailsTitle').textContent = item.name;
            document.getElementById('detailsDescription').textContent = item.description;
            document.getElementById('detailsPrice').textContent = item.price + ' кубов';

            const imageContainer = document.getElementById('detailsImage');
            const img = document.createElement('img');
            img.src = item.image;
            img.alt = item.name;
            img.style.cursor = 'pointer';
            img.onclick = () => openShopLightbox(item.image);
            img.onerror = () => img.src = 'placeholder.png';
            imageContainer.innerHTML = '';
            imageContainer.appendChild(img);

            const buyBtn = document.getElementById('detailsBuyBtn');
            buyBtn.replaceWith(buyBtn.cloneNode(true));
            const newBuyBtn = document.getElementById('detailsBuyBtn');
            newBuyBtn.addEventListener('click', () => buyItemFromDetails(item.id));

            document.getElementById('itemDetailsModal').style.display = 'flex';
        }

        function closeItemDetails() {
            document.getElementById('itemDetailsModal').style.display = 'none';
        }

        function buyItemFromDetails(itemId) {
            const item = shopItems.find(i => i.id === itemId);
            if (!item) return;
            if (cubeCount < item.price) {
                alert(`Недостаточно кубов! Нужно ${item.price}, а у вас ${cubeCount}`);
                return;
            }
            cubeCount -= item.price;
            document.getElementById('cube-count').textContent = cubeCount;
            localStorage.setItem('cubeCount', cubeCount);
            alert(`✅ Поздравляем! Вы купили ${item.name} за ${item.price} очков научного сотрудника! Ожидайте доставку после перезапуска вселенной.`);
            closeItemDetails();
        }

        // ===== ФУНКЦИИ LIGHTBOX =====
        function openShopLightbox(src) {
            document.getElementById('shopLightboxImg').src = src;
            document.getElementById('shopLightbox').style.display = 'flex';
        }

        function closeShopLightbox() {
            document.getElementById('shopLightbox').style.display = 'none';
        }

        // ===== ФУНКЦИИ ПРОФИЛЯ (заглушки) =====
        function openProfileModal() {
            alert('Функция профиля в разработке');
        }

        function closeProfileModal() {}

        function saveProfileChanges() {}

        // ===== ЗАКРЫТИЕ МОДАЛОК ПО КЛИКУ НА ФОН =====
        window.onclick = function(event) {
            const details = document.getElementById('itemDetailsModal');
            if (event.target == details) details.style.display = 'none';
            const lightbox = document.getElementById('shopLightbox');
            if (event.target == lightbox) lightbox.style.display = 'none';
        };

        // ===== ТРУБА С КУБАМИ =====
        function createCube() {
            const stream = document.getElementById('cube-stream');
            if (!stream) return;

            const cube = document.createElement('div');
            cube.className = 'cube-fly';
            
            // Случайная длительность полёта (5-8 секунд)
            const duration = 5 + Math.random() * 3;
            cube.style.animationDuration = duration + 's';
            
            // Небольшой случайный разброс стартовой позиции по вертикали, чтобы кубы не шли строго друг за другом
            const startDelay = Math.random() * 2;
            cube.style.animationDelay = startDelay + 's';
            
            stream.appendChild(cube);
            
            cube.addEventListener('animationend', () => {
                cube.remove();
            });
        }

        // Запускаем появление кубов с интервалом 4-6 секунд
        setInterval(() => {
            createCube();
        }, 4500 + Math.random() * 2000);

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        renderShop();

        // ===== КУБ (для клика, если нужен) =====
        function cubeClick() {
            // Можно оставить пустым или добавить логику
        }
        window.cubeClick = cubeClick;
    </script>
</body>
</html>
