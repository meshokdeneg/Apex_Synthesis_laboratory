<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL | Змейка</title>
    <style>
        body {
            background: url('../photo/i.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #FF8C00;
            text-align: center;
        }
        canvas {
            background-color: #111;
            border: 2px solid #4A90E2;
        }
        .info {
            margin-top: 20px;
            color: #FF8C00;
            font-size: 20px;
        }
        button {
            background: #4A90E2;
            border: none;
            padding: 8px 20px;
            margin: 10px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border-radius: 30px;
            cursor: pointer;
        }
        button:hover { background: #FF8C00; }
        a { color: #FF8C00; text-decoration: none; }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="snakeCanvas" width="400" height="400"></canvas>
    <div class="info">
        <div>🍎 Счёт: <span id="score">0</span></div>
        <button id="restartBtn">🔄 Новая игра</button>
        <div><a href="../minigames.html">← К списку игр</a></div>
    </div>
</div>
<script>
    const canvas = document.getElementById('snakeCanvas');
    const ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('score');

    let snake = [{x: 200, y: 200}];
    let direction = 'RIGHT';
    let nextDirection = 'RIGHT';
    let food = {x: 300, y: 200};
    let score = 0;
    let gameLoop = null;
    let gameRunning = true;
    const cellSize = 20;

    function randomFood() {
        let maxX = canvas.width - cellSize;
        let maxY = canvas.height - cellSize;
        let newFood = {
            x: Math.floor(Math.random() * (maxX/cellSize)) * cellSize,
            y: Math.floor(Math.random() * (maxY/cellSize)) * cellSize
        };
        // проверка, что еда не на змее
        for(let seg of snake) {
            if(seg.x === newFood.x && seg.y === newFood.y) {
                return randomFood();
            }
        }
        return newFood;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#4A90E2';
        for(let seg of snake) {
            ctx.fillRect(seg.x, seg.y, cellSize-1, cellSize-1);
        }
        ctx.fillStyle = '#FF8C00';
        ctx.fillRect(food.x, food.y, cellSize-1, cellSize-1);
    }

    function update() {
        if(!gameRunning) return;
        direction = nextDirection;
        let head = snake[0];
        let newHead = {...head};
        switch(direction) {
            case 'RIGHT': newHead.x += cellSize; break;
            case 'LEFT': newHead.x -= cellSize; break;
            case 'UP': newHead.y -= cellSize; break;
            case 'DOWN': newHead.y += cellSize; break;
        }
        // проверка столкновения со стеной
        if(newHead.x < 0 || newHead.x >= canvas.width || newHead.y < 0 || newHead.y >= canvas.height) {
            gameOver();
            return;
        }
        // проверка столкновения с собой
        for(let seg of snake) {
            if(seg.x === newHead.x && seg.y === newHead.y) {
                gameOver();
                return;
            }
        }
        snake.unshift(newHead);
        if(newHead.x === food.x && newHead.y === food.y) {
            score++;
            scoreSpan.innerText = score;
            food = randomFood();
        } else {
            snake.pop();
        }
        draw();
    }

    function gameOver() {
        gameRunning = false;
        clearInterval(gameLoop);
        alert("Игра окончена! Счёт: " + score);
    }

    function restart() {
        snake = [{x: 200, y: 200}];
        direction = 'RIGHT';
        nextDirection = 'RIGHT';
        score = 0;
        scoreSpan.innerText = score;
        gameRunning = true;
        food = randomFood();
        if(gameLoop) clearInterval(gameLoop);
        gameLoop = setInterval(() => update(), 150);
        draw();
    }

    document.addEventListener('keydown', (e) => {
        if(!gameRunning) return;
        switch(e.key) {
            case 'ArrowUp': if(direction !== 'DOWN') nextDirection = 'UP'; break;
            case 'ArrowDown': if(direction !== 'UP') nextDirection = 'DOWN'; break;
            case 'ArrowLeft': if(direction !== 'RIGHT') nextDirection = 'LEFT'; break;
            case 'ArrowRight': if(direction !== 'LEFT') nextDirection = 'RIGHT'; break;
        }
    });
    document.getElementById('restartBtn').addEventListener('click', restart);

    restart();
</script>
</body>
</html>
