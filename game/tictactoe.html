<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL | Крестики-нолики</title>
    <style>
        body {
            background: url('../photo/i.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #FF8C00;
            text-align: center;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 5px;
            background-color: #1a2a2f;
            padding: 15px;
            border-radius: 12px;
        }
        .cell {
            width: 100px;
            height: 100px;
            background-color: #2c3e2f;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: #FF8C00;
            cursor: pointer;
        }
        .status {
            margin: 20px;
            font-size: 20px;
            color: #FF8C00;
        }
        button {
            background: #4A90E2;
            border: none;
            padding: 8px 20px;
            margin: 10px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border-radius: 30px;
            cursor: pointer;
        }
        button:hover { background: #FF8C00; }
        a { color: #FF8C00; text-decoration: none; }
    </style>
</head>
<body>
<div class="game-container">
    <h2 style="color:#FF8C00;">КРЕСТИКИ-НОЛИКИ</h2>
    <div id="board" class="board"></div>
    <div id="status" class="status"></div>
    <button id="reset">🔄 Новая игра</button>
    <div><a href="../minigames.html">← К списку игр</a></div>
</div>
<script>
    let board = [
        ['', '', ''],
        ['', '', ''],
        ['', '', '']
    ];
    let currentPlayer = 'X';
    let gameActive = true;
    let lossCount = 0;

    const winPatterns = [
        [[0,0],[0,1],[0,2]],
        [[1,0],[1,1],[1,2]],
        [[2,0],[2,1],[2,2]],
        [[0,0],[1,0],[2,0]],
        [[0,1],[1,1],[2,1]],
        [[0,2],[1,2],[2,2]],
        [[0,0],[1,1],[2,2]],
        [[0,2],[1,1],[2,0]]
    ];

    function loadLossCount() {
        const saved = localStorage.getItem('ttt_losses');
        lossCount = saved ? parseInt(saved, 10) : 0;
    }
    function saveLossCount() {
        localStorage.setItem('ttt_losses', lossCount);
    }
    function resetLossCount() {
        lossCount = 0;
        saveLossCount();
    }
    function checkAndRedirect() {
        if (lossCount >= 5) {
            localStorage.removeItem('ttt_losses');
            window.location.href = 'loser.html';
        }
    }

    function findWinningMove(board, player) {
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                if (board[i][j] === '') {
                    board[i][j] = player;
                    if (checkWinnerOnBoard(board)) {
                        board[i][j] = '';
                        return [i, j];
                    }
                    board[i][j] = '';
                }
            }
        }
        return null;
    }

    function checkWinnerOnBoard(board) {
        for (let pattern of winPatterns) {
            const [a,b,c] = pattern;
            const val = board[a[0]][a[1]];
            if (val && val === board[b[0]][b[1]] && val === board[c[0]][c[1]]) return true;
        }
        return false;
    }

    function computerMove() {
        if (!gameActive) return;
        let winMove = findWinningMove(board, 'O');
        if (winMove) {
            board[winMove[0]][winMove[1]] = 'O';
            afterMove();
            return;
        }
        let blockMove = findWinningMove(board, 'X');
        if (blockMove) {
            board[blockMove[0]][blockMove[1]] = 'O';
            afterMove();
            return;
        }
        if (board[1][1] === '') {
            board[1][1] = 'O';
            afterMove();
            return;
        }
        const corners = [[0,0],[0,2],[2,0],[2,2]];
        for (let corner of corners) {
            if (board[corner[0]][corner[1]] === '') {
                board[corner[0]][corner[1]] = 'O';
                afterMove();
                return;
            }
        }
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                if (board[i][j] === '') {
                    board[i][j] = 'O';
                    afterMove();
                    return;
                }
            }
        }
    }

    function afterMove() {
        if (checkWinnerOnBoard(board)) {
            if (currentPlayer === 'O') {
                lossCount++;
                saveLossCount();
                checkAndRedirect();
            }
            gameActive = false;
            render();
            return;
        }
        let isFull = true;
        for (let i = 0; i < 3; i++)
            for (let j = 0; j < 3; j++)
                if (board[i][j] === '') isFull = false;
        if (isFull) {
            gameActive = false;
            render();
            return;
        }
        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        render();
        if (gameActive && currentPlayer === 'O') {
            setTimeout(() => computerMove(), 200);
        }
    }

    function playerMove(row, col) {
        if (!gameActive || currentPlayer !== 'X') return;
        if (board[row][col] !== '') return;
        board[row][col] = 'X';
        afterMove();
    }

    function render() {
        const boardDiv = document.getElementById('board');
        boardDiv.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = board[i][j];
                cell.addEventListener('click', (function(row, col) {
                    return function() { playerMove(row, col); };
                })(i, j));
                boardDiv.appendChild(cell);
            }
        }
        const statusDiv = document.getElementById('status');
        if (!gameActive) {
            if (checkWinnerOnBoard(board)) {
                statusDiv.innerHTML = currentPlayer === 'O' ? '🤖 Компьютер победил...' : '🏆 Вы победили!';
            } else {
                statusDiv.innerHTML = 'Ничья!';
            }
        } else {
            statusDiv.innerHTML = `Ход: ${currentPlayer === 'X' ? 'Вы (X)' : 'Компьютер (O)'}`;
        }
    }

    function resetGame() {
        board = [['','',''],['','',''],['','','']];
        currentPlayer = 'X';
        gameActive = true;
        render();
    }

    loadLossCount();
    resetGame();
    document.getElementById('reset').addEventListener('click', resetGame);
</script>
</body>
</html>
