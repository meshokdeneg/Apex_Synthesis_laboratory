<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL | Пятнашки</title>
    <style>
        body {
            background: url('../photo/i.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #FF8C00;
            text-align: center;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            gap: 5px;
            background-color: #1a2a2f;
            padding: 15px;
            border-radius: 12px;
        }
        .cell {
            width: 70px;
            height: 70px;
            background-color: #2c3e2f;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: #FF8C00;
            cursor: pointer;
        }
        .cell.empty {
            background-color: #111;
            color: #333;
        }
        button {
            background: #4A90E2;
            border: none;
            padding: 8px 20px;
            margin: 15px 5px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border-radius: 30px;
            cursor: pointer;
        }
        button:hover { background: #FF8C00; }
        a { color: #FF8C00; text-decoration: none; }
    </style>
</head>
<body>
<div class="game-container">
    <h2 style="color:#FF8C00;">ПЯТНАШКИ</h2>
    <div id="puzzle" class="grid"></div>
    <button id="shuffle">🔀 Перемешать</button>
    <div><a href="../minigames.html">← К списку игр</a></div>
</div>
<script>
    const size = 4;
    let tiles = [];
    let emptyRow = 3, emptyCol = 3;

    function initBoard() {
        tiles = [];
        for (let i = 0; i < size; i++) {
            tiles[i] = [];
            for (let j = 0; j < size; j++) {
                tiles[i][j] = i * size + j + 1;
            }
        }
        tiles[size-1][size-1] = 0;
        emptyRow = size-1;
        emptyCol = size-1;
        render();
    }

    function render() {
        const container = document.getElementById('puzzle');
        container.innerHTML = '';
        for (let i = 0; i < size; i++) {
            for (let j = 0; j < size; j++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const val = tiles[i][j];
                if (val === 0) {
                    cell.classList.add('empty');
                    cell.textContent = '';
                } else {
                    cell.textContent = val;
                }
                cell.addEventListener('click', (function(row, col) {
                    return function() { moveTile(row, col); };
                })(i, j));
                container.appendChild(cell);
            }
        }
    }

    function moveTile(row, col) {
        if ((Math.abs(row - emptyRow) + Math.abs(col - emptyCol)) === 1) {
            tiles[emptyRow][emptyCol] = tiles[row][col];
            tiles[row][col] = 0;
            emptyRow = row;
            emptyCol = col;
            render();
            if (checkWin()) {
                setTimeout(() => alert("Поздравляем! Вы собрали пятнашки!"), 50);
            }
        }
    }

    function checkWin() {
        for (let i = 0; i < size; i++) {
            for (let j = 0; j < size; j++) {
                if (i === size-1 && j === size-1) continue;
                if (tiles[i][j] !== i * size + j + 1) return false;
            }
        }
        return true;
    }

    function shuffle() {
        for (let step = 0; step < 500; step++) {
            let moves = [];
            if (emptyRow > 0) moves.push([emptyRow-1, emptyCol]);
            if (emptyRow < size-1) moves.push([emptyRow+1, emptyCol]);
            if (emptyCol > 0) moves.push([emptyRow, emptyCol-1]);
            if (emptyCol < size-1) moves.push([emptyRow, emptyCol+1]);
            let random = moves[Math.floor(Math.random() * moves.length)];
            moveTile(random[0], random[1]);
        }
    }

    document.getElementById('shuffle').addEventListener('click', () => {
        initBoard();
        shuffle();
    });
    initBoard();
    shuffle(); // стартовая перемешка
</script>
</body>
</html>
