<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ASL | Пресс-наказание</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 30% 20%, #0a0f0a, #000000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            position: relative;
        }

        /* металлическая платформа */
        .platform {
            position: relative;
            width: 1100px;
            height: 650px;
            background: #2e2e2e;
            background-image: repeating-linear-gradient(0deg, #3c3c3c 0px, #3c3c3c 2px, #2a2a2a 2px, #2a2a2a 12px);
            border: 5px solid #5a5a5a;
            border-radius: 30px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 15px 30px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        /* Конвейерная лента (движущаяся полоса) */
        .conveyor-belt {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            height: 80px;
            background: repeating-linear-gradient(90deg, #555, #555 30px, #777 30px, #777 60px);
            border-top: 3px solid #aaa;
            border-bottom: 3px solid #333;
            animation: beltMove 0.4s linear infinite;
            z-index: 5;
        }
        @keyframes beltMove {
            0% { background-position: 0 0; }
            100% { background-position: 60px 0; }
        }

        /* Пресс (массивный, с гидравликой) */
        .press {
            position: absolute;
            right: 80px;
            bottom: 50px;
            width: 220px;
            height: 220px;
            background: #3a3a3a;
            border: 5px solid #8a8a8a;
            border-radius: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 0 0 3px #222;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .press::before {
            content: "⚠️";
            font-size: 48px;
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            filter: drop-shadow(0 0 4px red);
        }
        .press-plate {
            width: 180px;
            height: 35px;
            background: #888;
            border-radius: 12px;
            margin-top: 20px;
            box-shadow: inset 0 2px 5px #ccc, 0 3px 0 #444;
        }
        .press-text {
            color: #ff2200;
            font-weight: bold;
            font-size: 26px;
            text-shadow: 0 0 6px darkred;
            margin-top: 15px;
        }
        .hydraulic {
            width: 40px;
            height: 60px;
            background: #5a5a5a;
            border-radius: 20px;
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset 0 0 8px black;
        }
        .hydraulic::after {
            content: "⚙️";
            position: absolute;
            bottom: -30px;
            left: -10px;
            font-size: 26px;
            color: silver;
        }

        /* Игрок (человечек в страхе) */
        .player {
            position: absolute;
            left: 70px;
            bottom: 85px;
            width: 70px;
            height: 70px;
            background: #f0a33b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 0 20px rgba(255,150,0,0.9);
            z-index: 25;
            transition: left 0.05s linear, bottom 0.05s linear;
            cursor: default;
        }
        .player::after {
            content: "😱";
            font-size: 52px;
        }

        /* Тряска платформы при ударе пресса */
        .shake {
            animation: shakeEffect 0.2s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }
        @keyframes shakeEffect {
            0% { transform: translate(1px, 1px); }
            10% { transform: translate(-1px, -2px); }
            20% { transform: translate(-2px, 0px); }
            30% { transform: translate(2px, 1px); }
            40% { transform: translate(1px, -1px); }
            50% { transform: translate(-1px, 2px); }
            60% { transform: translate(-2px, 1px); }
            70% { transform: translate(2px, 1px); }
            80% { transform: translate(-1px, -1px); }
            90% { transform: translate(1px, 2px); }
            100% { transform: translate(0, 0); }
        }

        /* Эффект удара пресса */
        .press-crush {
            animation: crushAnim 0.25s forwards;
        }
        @keyframes crushAnim {
            0% { transform: scale(1); background: #3a3a3a; }
            100% { transform: scale(1.08); background: #2a2a2a; filter: brightness(0.7); }
        }

        /* Искры и дым */
        .spark {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ffaa00;
            border-radius: 50%;
            pointer-events: none;
            z-index: 200;
        }
        .smoke {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #555, transparent);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: smokeFade 0.8s forwards;
            z-index: 200;
        }
        @keyframes smokeFade {
            0% { opacity: 0.7; transform: scale(0.5); }
            100% { opacity: 0; transform: scale(2.5); }
        }

        /* Диалоговое окно ГЛюКа */
        .gluk-box {
            position: absolute;
            bottom: 20px;
            left: 20px;
            max-width: 550px;
            background: rgba(0, 0, 0, 0.85);
            border-left: 8px solid #00FF9D;
            border-radius: 24px;
            padding: 18px 22px;
            backdrop-filter: blur(10px);
            font-family: monospace;
            z-index: 100;
            box-shadow: 0 5px 20px rgba(0,255,157,0.2);
        }
        .gluk-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .gluk-avatar {
            width: 42px;
            height: 42px;
            background: #00FF9D;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: black;
            font-weight: bold;
        }
        .gluk-name {
            color: #FF8C00;
            font-weight: bold;
            font-size: 20px;
            letter-spacing: 1px;
        }
        .gluk-text {
            color: #0f0;
            font-size: 17px;
            line-height: 1.45;
            white-space: pre-wrap;
        }
        .cursor {
            display: inline-block;
            width: 8px;
            height: 17px;
            background: #0f0;
            vertical-align: middle;
            margin-left: 5px;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Кнопка возврата */
        .return-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(145deg, #4A90E2, #2c5a8c);
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            z-index: 200;
            transition: 0.2s;
            display: none;
            font-family: monospace;
            box-shadow: 0 5px 0 #1a3a5a;
        }
        .return-btn:hover {
            background: #FF8C00;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #b85c00;
        }

        /* Фоновые огни */
        .alert-light {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 20px;
            height: 20px;
            background: red;
            border-radius: 50%;
            box-shadow: 0 0 15px red;
            animation: pulseRed 0.6s infinite;
        }
        @keyframes pulseRed {
            0% { opacity: 0.3; box-shadow: 0 0 5px red; }
            100% { opacity: 1; box-shadow: 0 0 20px red; }
        }
        .alert-light2 {
            top: auto;
            bottom: 20px;
            left: auto;
            right: 20px;
        }

        /* частицы крови/масла */
        .blood {
            position: absolute;
            background: #8b0000;
            border-radius: 50%;
            pointer-events: none;
            z-index: 150;
        }
    </style>
</head>
<body>
<div class="platform">
    <div class="conveyor-belt"></div>
    <div class="press">
        <div class="hydraulic"></div>
        <div class="press-plate"></div>
        <div class="press-text">⚠️ ПРЕСС ⚠️</div>
    </div>
    <div class="player" id="player"></div>
    <div class="gluk-box" id="glukBox">
        <div class="gluk-header">
            <div class="gluk-avatar">🟩</div>
            <div class="gluk-name">ГЛюК (главный логический компьютер)</div>
        </div>
        <div class="gluk-text" id="glukText"></div>
    </div>
    <button id="returnBtn" class="return-btn">💀 ВЕРНУТЬСЯ 💀</button>
    <div class="alert-light"></div>
    <div class="alert-light alert-light2"></div>
</div>

<script>
    const player = document.getElementById('player');
    const press = document.querySelector('.press');
    const returnBtn = document.getElementById('returnBtn');
    const glukTextDiv = document.getElementById('glukText');
    const platformElem = document.querySelector('.platform');

    // Координаты для движения (конвейер тащит игрока)
    let currentLeft = 70;
    let targetLeft = 800;   // около пресса (правая часть)
    let moveInterval = null;
    let animationActive = false;

    // Эффекты
    function createSpark(x, y) {
        const spark = document.createElement('div');
        spark.classList.add('spark');
        spark.style.left = x + 'px';
        spark.style.top = y + 'px';
        document.body.appendChild(spark);
        setTimeout(() => spark.remove(), 300);
    }
    function createSmoke(x, y) {
        const smoke = document.createElement('div');
        smoke.classList.add('smoke');
        smoke.style.left = x + 'px';
        smoke.style.top = y + 'px';
        document.body.appendChild(smoke);
        setTimeout(() => smoke.remove(), 800);
    }
    function createBloodSpray(x, y) {
        for(let i=0;i<12;i++) {
            const drop = document.createElement('div');
            drop.classList.add('blood');
            drop.style.width = Math.random()*6+3 + 'px';
            drop.style.height = drop.style.width;
            drop.style.left = x + (Math.random()-0.5)*30 + 'px';
            drop.style.top = y + (Math.random()-0.5)*40 + 'px';
            drop.style.opacity = Math.random()*0.6+0.2;
            document.body.appendChild(drop);
            setTimeout(() => drop.remove(), 1500);
        }
    }

    // Анимация движения игрока по конвейеру (рывками, с искрами)
    function startMovingToPress() {
        if (moveInterval) clearInterval(moveInterval);
        animationActive = true;
        const step = 12;  // пикселей за шаг
        moveInterval = setInterval(() => {
            if (currentLeft < targetLeft) {
                currentLeft += step;
                player.style.left = currentLeft + 'px';
                // искры из-под ног
                const rect = player.getBoundingClientRect();
                const platformRect = platformElem.getBoundingClientRect();
                createSpark(rect.left + 20, rect.bottom - 10);
                if (Math.random() < 0.3) createSmoke(rect.left + 15, rect.bottom - 5);
            } else {
                clearInterval(moveInterval);
                // достиг пресса — удар!
                crushPlayer();
            }
        }, 50);
    }

    // Удар пресса и эффекты
    function crushPlayer() {
        // Добавляем тряску
        platformElem.classList.add('shake');
        setTimeout(() => platformElem.classList.remove('shake'), 300);
        // Анимация пресса
        press.classList.add('press-crush');
        // Игрок исчезает (сплющен)
        player.style.transform = 'scale(0.1)';
        player.style.opacity = '0';
        // Искры, дым, кровь
        const pressRect = press.getBoundingClientRect();
        for(let i=0;i<30;i++) {
            setTimeout(() => {
                createSpark(pressRect.left + Math.random()*pressRect.width, pressRect.top + Math.random()*pressRect.height);
            }, i*20);
        }
        for(let i=0;i<15;i++) {
            setTimeout(() => {
                createSmoke(pressRect.left + Math.random()*pressRect.width, pressRect.top + Math.random()*pressRect.height);
            }, i*30);
        }
        createBloodSpray(pressRect.left+pressRect.width/2, pressRect.top+pressRect.height/2);
        // Глюк добавляет финальную фразу
        setTimeout(() => {
            const finalMsg = " ... Хруст. Очередной болван спрессован в кубик. Иди, тренируйся в крестики-нолики, неудачник.";
            typeText(finalMsg, () => {
                returnBtn.style.display = 'block';
            });
        }, 600);
    }

    // Эффект печати текста
    let isTyping = false;
    function typeText(text, callback) {
        if (isTyping) return;
        isTyping = true;
        glukTextDiv.innerHTML = '';
        let i = 0;
        const interval = setInterval(() => {
            if (i < text.length) {
                glukTextDiv.innerHTML += text[i];
                i++;
            } else {
                clearInterval(interval);
                isTyping = false;
                const cursorSpan = document.createElement('span');
                cursorSpan.className = 'cursor';
                glukTextDiv.appendChild(cursorSpan);
                if (callback) callback();
            }
        }, 45);
    }

    // Массив фраз (жесткие, насмешливые, без лёгких путей)
    const messages = [
        "ПЯТЬ поражений в крестиках-ноликах. ПЯТЬ! Это диагноз.",
        "Даже мой старый холодильник (сервер) обыграл бы тебя с закрытыми глазами.",
        "Правила элементарны: три в ряд. Но ты, видимо, решил проверить, что будет, если играть без мозгов.",
        "Теперь ты отправишься в промышленный пресс. Таков закон ASL.",
        "Надеюсь, хоть сейчас до тебя дойдёт, что надо блокировать ходы соперника, а не ставить крестики в угол для красоты.",
        "Ладно, хватит слов. Конвейер уже ждёт."
    ];

    let msgIndex = 0;
    function playNextMessage() {
        if (msgIndex < messages.length) {
            typeText(messages[msgIndex], () => {
                msgIndex++;
                setTimeout(() => {
                    glukTextDiv.innerHTML = '';
                    playNextMessage();
                }, 1300);
            });
        } else {
            // после всех сообщений начинаем движение
            setTimeout(() => {
                startMovingToPress();
            }, 500);
        }
    }

    // запуск после загрузки
    window.addEventListener('load', () => {
        // начальная позиция
        player.style.left = '70px';
        player.style.bottom = '85px';
        currentLeft = 70;
        // адаптация targetLeft под разные экраны (ширина платформы ~1100px)
        const platformRect = platformElem.getBoundingClientRect();
        const pressRect = press.getBoundingClientRect();
        targetLeft = pressRect.left - platformRect.left - 40;
        if (targetLeft < 300) targetLeft = 750;
        playNextMessage();
    });

    // Возврат в меню мини-игр
    returnBtn.addEventListener('click', () => {
        localStorage.removeItem('ttt_losses');
        window.location.href = 'minigames.html';
    });

    // Небольшая коррекция при изменении размеров окна (чтоб игрок не убежал)
    window.addEventListener('resize', () => {
        if (!animationActive) {
            const platformRect = platformElem.getBoundingClientRect();
            const pressRect = press.getBoundingClientRect();
            targetLeft = pressRect.left - platformRect.left - 40;
            if (targetLeft < 300) targetLeft = 750;
        }
    });
</script>
</body>
</html>
