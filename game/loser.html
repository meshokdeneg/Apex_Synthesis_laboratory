<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ASL | Пресс-наказание</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 30% 20%, #0a0f0a, #000000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            position: relative;
        }

        /* Металлическая платформа с текстурой */
        .platform {
            position: relative;
            width: 1200px;
            height: 700px;
            background: #2a2a2a;
            background-image: 
                linear-gradient(45deg, #3a3a3a 1px, transparent 1px),
                linear-gradient(-45deg, #3a3a3a 1px, transparent 1px);
            background-size: 30px 30px;
            border: 6px solid #6a6a6a;
            border-radius: 40px;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.8), 0 20px 40px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        /* Конвейерная лента (динамичная) */
        .conveyor-belt {
            position: absolute;
            bottom: 50px;
            left: 0;
            width: 100%;
            height: 90px;
            background: repeating-linear-gradient(90deg, #555, #555 40px, #777 40px, #777 80px);
            border-top: 4px solid #aaa;
            border-bottom: 4px solid #222;
            animation: beltMove 0.3s linear infinite;
            z-index: 5;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.5);
        }
        @keyframes beltMove {
            0% { background-position: 0 0; }
            100% { background-position: 80px 0; }
        }

        /* Пресс – детализированная конструкция */
        .press {
            position: absolute;
            right: 100px;
            bottom: 50px;
            width: 250px;
            height: 250px;
            background: #4a4a4a;
            border: 6px solid #8a8a8a;
            border-radius: 30px;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.6), 0 0 0 4px #222;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }
        /* Гидравлические цилиндры */
        .hydraulic-left, .hydraulic-right {
            position: absolute;
            width: 35px;
            height: 80px;
            background: #6a6a6a;
            border-radius: 20px;
            top: -60px;
            box-shadow: inset 0 0 8px black, 0 2px 5px rgba(0,0,0,0.5);
        }
        .hydraulic-left { left: 30px; }
        .hydraulic-right { right: 30px; }
        .hydraulic-left::after, .hydraulic-right::after {
            content: "⚙️";
            position: absolute;
            bottom: -25px;
            left: -8px;
            font-size: 28px;
            color: silver;
            filter: drop-shadow(0 0 2px black);
        }
        /* Верхняя плита пресса (подвижная) */
        .press-top {
            position: absolute;
            top: -15px;
            left: 15px;
            right: 15px;
            height: 45px;
            background: #888;
            border-radius: 20px;
            box-shadow: inset 0 2px 5px #ccc, 0 5px 10px black;
            z-index: 25;
            transition: all 0.15s ease-out;
        }
        /* Нижняя плита (неподвижная) */
        .press-bottom {
            width: 90%;
            height: 40px;
            background: #777;
            border-radius: 15px;
            margin-top: 30px;
            box-shadow: inset 0 2px 5px #aaa, 0 5px 10px black;
        }
        .press-text {
            color: #ff3300;
            font-weight: bold;
            font-size: 22px;
            text-shadow: 0 0 6px darkred;
            margin-top: 15px;
            letter-spacing: 2px;
        }
        /* Анимация опускания пресса */
        .press-crush .press-top {
            transform: translateY(180px);
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .press-crush {
            animation: shakePress 0.2s;
        }
        @keyframes shakePress {
            0% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
            100% { transform: translateX(0); }
        }

        /* Игрок (маленький человечек) */
        .player {
            position: absolute;
            left: 70px;
            bottom: 95px;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #f5b042, #d97a00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 0 25px rgba(255,100,0,0.8);
            z-index: 25;
            transition: left 0.04s linear;
            cursor: default;
        }
        .player::after {
            content: "😨";
            font-size: 54px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }

        /* Эффекты тряски платформы */
        .shake-platform {
            animation: platformShake 0.2s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }
        @keyframes platformShake {
            0% { transform: translate(1px, 1px); }
            10% { transform: translate(-2px, -1px); }
            20% { transform: translate(2px, 0px); }
            30% { transform: translate(-1px, 2px); }
            40% { transform: translate(1px, -1px); }
            50% { transform: translate(-2px, 1px); }
            60% { transform: translate(2px, 1px); }
            70% { transform: translate(-1px, -1px); }
            80% { transform: translate(1px, 2px); }
            90% { transform: translate(0px, -1px); }
            100% { transform: translate(0, 0); }
        }

        /* Искры, дым, кровь */
        .spark {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ffaa33;
            border-radius: 50%;
            pointer-events: none;
            z-index: 200;
            box-shadow: 0 0 4px orange;
        }
        .smoke {
            position: absolute;
            width: 25px;
            height: 25px;
            background: radial-gradient(circle, #555, #222, transparent);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: smokeFade 0.8s forwards;
            z-index: 200;
        }
        @keyframes smokeFade {
            0% { opacity: 0.8; transform: scale(0.6); }
            100% { opacity: 0; transform: scale(2.5); }
        }
        .blood {
            position: absolute;
            background: #8b0000;
            border-radius: 50%;
            pointer-events: none;
            z-index: 150;
            filter: blur(1px);
        }

        /* Диалоговое окно ГЛюКа (стильно) */
        .gluk-box {
            position: absolute;
            bottom: 20px;
            left: 20px;
            max-width: 550px;
            background: rgba(0, 0, 0, 0.9);
            border-left: 8px solid #00FF9D;
            border-radius: 24px;
            padding: 18px 22px;
            backdrop-filter: blur(12px);
            font-family: monospace;
            z-index: 100;
            box-shadow: 0 5px 25px rgba(0,255,157,0.2);
        }
        .gluk-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .gluk-avatar {
            width: 44px;
            height: 44px;
            background: #00FF9D;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: black;
            font-weight: bold;
            box-shadow: 0 0 8px #0f0;
        }
        .gluk-name {
            color: #FF8C00;
            font-weight: bold;
            font-size: 20px;
            letter-spacing: 1px;
        }
        .gluk-text {
            color: #0f0;
            font-size: 17px;
            line-height: 1.45;
            white-space: pre-wrap;
        }
        .cursor {
            display: inline-block;
            width: 8px;
            height: 17px;
            background: #0f0;
            vertical-align: middle;
            margin-left: 5px;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Кнопка возврата */
        .return-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(145deg, #4A90E2, #2c5a8c);
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            z-index: 200;
            transition: 0.2s;
            display: none;
            font-family: monospace;
            box-shadow: 0 6px 0 #1a3a5a;
        }
        .return-btn:hover {
            background: #FF8C00;
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #b85c00;
        }

        /* Аварийные огни */
        .alert-light {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 24px;
            height: 24px;
            background: red;
            border-radius: 50%;
            box-shadow: 0 0 15px red;
            animation: pulseRed 0.5s infinite;
        }
        @keyframes pulseRed {
            0% { opacity: 0.3; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1.2);}
        }
        .alert-light2 {
            top: auto;
            bottom: 20px;
            left: auto;
            right: 20px;
        }
    </style>
</head>
<body>
<div class="platform">
    <div class="conveyor-belt"></div>
    <div class="press">
        <div class="hydraulic-left"></div>
        <div class="hydraulic-right"></div>
        <div class="press-top"></div>
        <div class="press-bottom"></div>
        <div class="press-text">⚠️ ГИДРАВЛИЧЕСКИЙ ПРЕСС ⚠️</div>
    </div>
    <div class="player" id="player"></div>
    <div class="gluk-box" id="glukBox">
        <div class="gluk-header">
            <div class="gluk-avatar">🟩</div>
            <div class="gluk-name">ГЛюК (главный логический компьютер)</div>
        </div>
        <div class="gluk-text" id="glukText"></div>
    </div>
    <button id="returnBtn" class="return-btn">💀 ВЕРНУТЬСЯ В МЕНЮ 💀</button>
    <div class="alert-light"></div>
    <div class="alert-light alert-light2"></div>
</div>

<script>
    const player = document.getElementById('player');
    const pressDiv = document.querySelector('.press');
    const returnBtn = document.getElementById('returnBtn');
    const glukTextDiv = document.getElementById('glukText');
    const platform = document.querySelector('.platform');

    let currentLeft = 70;
    let targetLeft = 0; // рассчитаем после загрузки
    let moveInterval = null;
    let animationActive = false;

    // === Эффекты ===
    function createSpark(x, y) {
        const spark = document.createElement('div');
        spark.classList.add('spark');
        spark.style.left = x + 'px';
        spark.style.top = y + 'px';
        document.body.appendChild(spark);
        setTimeout(() => spark.remove(), 200);
    }
    function createSmoke(x, y) {
        const smoke = document.createElement('div');
        smoke.classList.add('smoke');
        smoke.style.left = x + 'px';
        smoke.style.top = y + 'px';
        document.body.appendChild(smoke);
        setTimeout(() => smoke.remove(), 800);
    }
    function createBloodSpray(x, y) {
        for(let i=0;i<25;i++) {
            const drop = document.createElement('div');
            drop.classList.add('blood');
            drop.style.width = Math.random()*8+3 + 'px';
            drop.style.height = drop.style.width;
            drop.style.left = x + (Math.random()-0.5)*50 + 'px';
            drop.style.top = y + (Math.random()-0.5)*60 + 'px';
            drop.style.opacity = Math.random()*0.7+0.2;
            document.body.appendChild(drop);
            setTimeout(() => drop.remove(), 2000);
        }
    }

    // === Движение игрока к прессу (рывками, с эффектами) ===
    function startMovingToPress() {
        if (moveInterval) clearInterval(moveInterval);
        animationActive = true;
        const step = 14;
        moveInterval = setInterval(() => {
            if (currentLeft < targetLeft) {
                currentLeft += step;
                player.style.left = currentLeft + 'px';
                const rect = player.getBoundingClientRect();
                const platformRect = platform.getBoundingClientRect();
                createSpark(rect.left + 20, rect.bottom - 12);
                if (Math.random() < 0.25) createSmoke(rect.left + 15, rect.bottom - 8);
            } else {
                clearInterval(moveInterval);
                // Игрок достиг пресса – начинаем анимацию прессования
                animatePressAndCrush();
            }
        }, 40);
    }

    // === Полноценная анимация пресса (опускание, эффекты, сплющивание) ===
    function animatePressAndCrush() {
        // Добавляем класс для опускания верхней плиты
        pressDiv.classList.add('press-crush');
        // Тряска платформы
        platform.classList.add('shake-platform');
        setTimeout(() => platform.classList.remove('shake-platform'), 400);
        
        // Искры и дым во время прессования
        const pressRect = pressDiv.getBoundingClientRect();
        for(let i=0;i<40;i++) {
            setTimeout(() => {
                createSpark(pressRect.left + Math.random()*pressRect.width, pressRect.top + Math.random()*pressRect.height);
            }, i*15);
        }
        for(let i=0;i<20;i++) {
            setTimeout(() => {
                createSmoke(pressRect.left + Math.random()*pressRect.width, pressRect.top + Math.random()*pressRect.height);
            }, i*25);
        }
        
        // Игрок исчезает (сплющивается) через 200 мс (после опускания плиты)
        setTimeout(() => {
            player.style.transform = 'scale(0.1)';
            player.style.opacity = '0';
            createBloodSpray(pressRect.left + pressRect.width/2, pressRect.top + pressRect.height/2);
            // Финальный текст ГЛюКа
            const finalMsg = " ... Хруст. Очередной болван спрессован в кубик. Иди тренируйся, неудачник.";
            typeText(finalMsg, () => {
                returnBtn.style.display = 'block';
            });
        }, 200);
    }

    // === Печать текста с курсором ===
    let isTyping = false;
    function typeText(text, callback) {
        if (isTyping) return;
        isTyping = true;
        glukTextDiv.innerHTML = '';
        let i = 0;
        const interval = setInterval(() => {
            if (i < text.length) {
                glukTextDiv.innerHTML += text[i];
                i++;
            } else {
                clearInterval(interval);
                isTyping = false;
                const cursorSpan = document.createElement('span');
                cursorSpan.className = 'cursor';
                glukTextDiv.appendChild(cursorSpan);
                if (callback) callback();
            }
        }, 45);
    }

    // === Фразы ГЛюКа (безжалостные) ===
    const messages = [
        "ПЯТЬ поражений в крестиках-ноликах. ПЯТЬ! Это диагноз.",
        "Даже мой старый холодильник (сервер) обыграл бы тебя с закрытыми глазами.",
        "Правила элементарны: три в ряд. Но ты, видимо, решил проверить, что будет, если играть без мозгов.",
        "Теперь ты отправишься в промышленный пресс. Таков закон ASL.",
        "Надеюсь, хоть сейчас до тебя дойдёт, что надо блокировать ходы соперника, а не ставить крестики в угол для красоты.",
        "Ладно, хватит слов. Конвейер уже ждёт."
    ];
    let msgIndex = 0;
    function playNextMessage() {
        if (msgIndex < messages.length) {
            typeText(messages[msgIndex], () => {
                msgIndex++;
                setTimeout(() => {
                    glukTextDiv.innerHTML = '';
                    playNextMessage();
                }, 1200);
            });
        } else {
            setTimeout(() => {
                startMovingToPress();
            }, 600);
        }
    }

    // === Инициализация при загрузке ===
    window.addEventListener('load', () => {
        player.style.left = '70px';
        player.style.bottom = '95px';
        currentLeft = 70;
        // Рассчитываем целевую позицию (чуть перед прессом)
        const platformRect = platform.getBoundingClientRect();
        const pressRect = pressDiv.getBoundingClientRect();
        targetLeft = pressRect.left - platformRect.left - 80;
        if (targetLeft < 200) targetLeft = 800; // запас
        playNextMessage();
    });

    // Возврат в меню мини-игр (очищаем счётчик поражений)
    returnBtn.addEventListener('click', () => {
        localStorage.removeItem('ttt_losses');
        window.location.href = 'minigames.html';
    });

    // Корректировка цели при изменении размера окна (пока игрок ещё не начал движение)
    window.addEventListener('resize', () => {
        if (!animationActive) {
            const platformRect = platform.getBoundingClientRect();
            const pressRect = pressDiv.getBoundingClientRect();
            targetLeft = pressRect.left - platformRect.left - 80;
            if (targetLeft < 200) targetLeft = 800;
        }
    });
</script>
</body>
</html>
