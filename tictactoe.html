<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL | Крестики-нолики</title>
    <style>
        body {
            background: url('photo/i.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #FF8C00;
            text-align: center;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 5px;
            background-color: #1a2a2f;
            padding: 15px;
            border-radius: 12px;
        }
        .cell {
            width: 100px;
            height: 100px;
            background-color: #2c3e2f;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: #FF8C00;
            cursor: pointer;
        }
        .status {
            margin: 20px;
            font-size: 20px;
            color: #FF8C00;
        }
        button {
            background: #4A90E2;
            border: none;
            padding: 8px 20px;
            margin: 10px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border-radius: 30px;
            cursor: pointer;
        }
        button:hover { background: #FF8C00; }
        a { color: #FF8C00; text-decoration: none; }
    </style>
</head>
<body>
<div class="game-container">
    <h2 style="color:#FF8C00;">КРЕСТИКИ-НОЛИКИ</h2>
    <div id="board" class="board"></div>
    <div id="status" class="status"></div>
    <button id="reset">🔄 Новая игра</button>
    <div><a href="minigames.html">← К списку игр</a></div>
</div>
<script>
    let board = [
        ['', '', ''],
        ['', '', ''],
        ['', '', '']
    ];
    let currentPlayer = 'X';
    let gameActive = true;

    const winPatterns = [
        [[0,0],[0,1],[0,2]],
        [[1,0],[1,1],[1,2]],
        [[2,0],[2,1],[2,2]],
        [[0,0],[1,0],[2,0]],
        [[0,1],[1,1],[2,1]],
        [[0,2],[1,2],[2,2]],
        [[0,0],[1,1],[2,2]],
        [[0,2],[1,1],[2,0]]
    ];

    function render() {
        const boardDiv = document.getElementById('board');
        boardDiv.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = board[i][j];
                cell.addEventListener('click', (function(row, col) {
                    return function() { playerMove(row, col); };
                })(i, j));
                boardDiv.appendChild(cell);
            }
        }
        const statusDiv = document.getElementById('status');
        if (!gameActive) {
            statusDiv.innerHTML = checkWinner() ? `🏆 ${currentPlayer} победил!` : 'Ничья!';
        } else {
            statusDiv.innerHTML = `Ход: ${currentPlayer}`;
        }
    }

    function checkWinner() {
        for (let pattern of winPatterns) {
            const [a,b,c] = pattern;
            if (board[a[0]][a[1]] && board[a[0]][a[1]] === board[b[0]][b[1]] && board[a[0]][a[1]] === board[c[0]][c[1]]) {
                return true;
            }
        }
        return false;
    }

    function isDraw() {
        for (let i = 0; i < 3; i++)
            for (let j = 0; j < 3; j++)
                if (board[i][j] === '') return false;
        return true;
    }

    function playerMove(row, col) {
        if (!gameActive) return;
        if (board[row][col] !== '') return;
        board[row][col] = currentPlayer;
        if (checkWinner()) {
            gameActive = false;
            render();
            return;
        }
        if (isDraw()) {
            gameActive = false;
            render();
            return;
        }
        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        render();
        if (gameActive && currentPlayer === 'O') {
            setTimeout(computerMove, 200);
        }
    }

    function computerMove() {
        if (!gameActive) return;
        // простой ИИ: выбираем случайную пустую клетку
        let empty = [];
        for (let i = 0; i < 3; i++)
            for (let j = 0; j < 3; j++)
                if (board[i][j] === '') empty.push([i, j]);
        if (empty.length === 0) return;
        let [row, col] = empty[Math.floor(Math.random() * empty.length)];
        board[row][col] = 'O';
        if (checkWinner()) {
            gameActive = false;
            render();
            return;
        }
        if (isDraw()) {
            gameActive = false;
            render();
            return;
        }
        currentPlayer = 'X';
        render();
    }

    function resetGame() {
        board = [
            ['', '', ''],
            ['', '', ''],
            ['', '', '']
        ];
        currentPlayer = 'X';
        gameActive = true;
        render();
    }

    document.getElementById('reset').addEventListener('click', resetGame);
    resetGame();
</script>
</body>
</html>
