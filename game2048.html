<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ASL | 2048</title>
    <style>
        body {
            background: url('photo/i.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #FF8C00;
            text-align: center;
        }
        .score-area {
            color: #FF8C00;
            font-size: 20px;
            margin-bottom: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            gap: 10px;
            background-color: #1a2a2f;
            padding: 15px;
            border-radius: 12px;
            justify-content: center;
        }
        .cell {
            width: 80px;
            height: 80px;
            background-color: #2c3e2f;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: #FF8C00;
            transition: all 0.1s ease;
        }
        button {
            background: #4A90E2;
            border: none;
            padding: 8px 20px;
            margin: 15px 5px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border-radius: 30px;
            cursor: pointer;
        }
        button:hover { background: #FF8C00; }
        a { color: #FF8C00; text-decoration: none; }
    </style>
</head>
<body>
<div class="game-container">
    <h2 style="color:#FF8C00;">2048</h2>
    <div class="score-area">Счёт: <span id="score">0</span></div>
    <div id="grid" class="grid"></div>
    <button id="restart">🔄 Новая игра</button>
    <div><a href="minigames.html">← К списку игр</a></div>
</div>
<script>
    const size = 4;
    let board = [];
    let score = 0;

    function initBoard() {
        board = Array(size).fill().map(() => Array(size).fill(0));
        addRandomTile();
        addRandomTile();
        render();
    }

    function addRandomTile() {
        let empty = [];
        for (let i = 0; i < size; i++) {
            for (let j = 0; j < size; j++) {
                if (board[i][j] === 0) empty.push([i, j]);
            }
        }
        if (empty.length) {
            let [x, y] = empty[Math.floor(Math.random() * empty.length)];
            board[x][y] = Math.random() < 0.9 ? 2 : 4;
        }
    }

    function render() {
        const gridDiv = document.getElementById('grid');
        gridDiv.innerHTML = '';
        for (let i = 0; i < size; i++) {
            for (let j = 0; j < size; j++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = board[i][j] === 0 ? '' : board[i][j];
                cell.style.fontSize = board[i][j] >= 1024 ? '20px' : '28px';
                gridDiv.appendChild(cell);
            }
        }
        document.getElementById('score').innerText = score;
    }

    function move(dx, dy) {
        let changed = false;
        let newBoard = JSON.parse(JSON.stringify(board));
        let newScore = score;

        // Проходим в порядке от края, к которому двигаем
        let orderX = dx === 1 ? size-1 : 0;
        let orderY = dy === 1 ? size-1 : 0;
        let stepX = dx === 0 ? 1 : -dx;
        let stepY = dy === 0 ? 1 : -dy;

        for (let i = 0; i < size; i++) {
            let row = orderX + stepX * i;
            for (let j = 0; j < size; j++) {
                let col = orderY + stepY * j;
                if (newBoard[row][col] === 0) continue;
                let nx = row, ny = col;
                // двигаем до упора
                while (true) {
                    let px = nx + dx;
                    let py = ny + dy;
                    if (px < 0 || px >= size || py < 0 || py >= size) break;
                    if (newBoard[px][py] === 0) {
                        newBoard[px][py] = newBoard[nx][ny];
                        newBoard[nx][ny] = 0;
                        nx = px; ny = py;
                        changed = true;
                    } else if (newBoard[px][py] === newBoard[nx][ny]) {
                        newBoard[px][py] *= 2;
                        newBoard[nx][ny] = 0;
                        newScore += newBoard[px][py];
                        changed = true;
                        break;
                    } else break;
                }
            }
        }

        if (changed) {
            board = newBoard;
            score = newScore;
            addRandomTile();
            render();
            if (checkWin()) setTimeout(() => alert("Победа! Вы набрали 2048!"), 50);
            if (!canMove()) alert("Игра окончена!");
        }
    }

    function checkWin() {
        for (let i = 0; i < size; i++)
            for (let j = 0; j < size; j++)
                if (board[i][j] === 2048) return true;
        return false;
    }

    function canMove() {
        for (let i = 0; i < size; i++) {
            for (let j = 0; j < size; j++) {
                if (board[i][j] === 0) return true;
                if (i+1 < size && board[i][j] === board[i+1][j]) return true;
                if (j+1 < size && board[i][j] === board[i][j+1]) return true;
            }
        }
        return false;
    }

    function restartGame() {
        score = 0;
        initBoard();
    }

    document.addEventListener('keydown', (e) => {
        switch(e.key) {
            case 'ArrowLeft': move(0, -1); break;
            case 'ArrowRight': move(0, 1); break;
            case 'ArrowUp': move(-1, 0); break;
            case 'ArrowDown': move(1, 0); break;
        }
    });
    document.getElementById('restart').addEventListener('click', restartGame);

    initBoard();
</script>
</body>
</html>
