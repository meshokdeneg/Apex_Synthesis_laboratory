<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, touch-action: manipulation">
    <title>ASL | Тетрис</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background: linear-gradient(145deg, #0a0f1a 0%, #0c111c 100%);
            font-family: 'Segoe UI', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
        }

        .game-container {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 3px #FF8C00, 0 0 0 6px #1a2a2f;
            padding: 20px;
            text-align: center;
            transition: 0.05s;
            position: relative;
            max-width: 100%;
        }

        .game-container.red-flash {
            background: #ffcccc;
        }

        /* ПОЛНОЕ ЗАТЕМНЕНИЕ ПОЛЯ — ТОЛЬКО ИНФОПАНЕЛЬ ВИДНА */
        .game-container.dark-overlay .canvas-wrapper canvas {
            filter: brightness(0);
            transition: filter 0.2s;
        }

        /* Инфо-панель светится */
        .game-container.dark-overlay .info-panel {
            position: relative;
            z-index: 25;
            box-shadow: 0 0 30px rgba(255,140,0,0.6), inset 0 0 10px rgba(255,140,0,0.3);
            background: rgba(30,30,30,0.95);
            border: 1px solid #FF8C00;
        }

        .game-container.dark-overlay .info-panel .info-value,
        .game-container.dark-overlay .info-panel .info-label {
            color: #FF8C00;
            text-shadow: 0 0 5px rgba(255,140,0,0.5);
        }

        h1 {
            font-size: 28px;
            color: #FF8C00;
            margin-bottom: 4px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 16px;
            font-size: 12px;
        }

        .game-layout {
            display: flex;
            gap: 16px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .canvas-wrapper {
            position: relative;
        }

        canvas {
            border: 3px solid #1a2a2f;
            border-radius: 8px;
            background: #0a0f1a;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: block;
            max-width: 100%;
            height: auto;
        }

        .danger-line {
            position: absolute;
            top: 90px;
            left: 3px;
            width: calc(100% - 6px);
            height: 3px;
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
            pointer-events: none;
            z-index: 10;
            border-radius: 2px;
        }

        .info-panel {
            background: #f5f5f5;
            border-radius: 20px;
            padding: 16px;
            min-width: 130px;
            transition: all 0.3s ease;
        }

        .info-item {
            margin: 12px 0;
            text-align: center;
        }

        .info-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }

        .info-value {
            font-size: 28px;
            font-weight: bold;
            color: #FF8C00;
        }

        .level-badge {
            background: #1a2a2f;
            color: #FF8C00;
            padding: 8px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 16px;
            font-size: 14px;
        }

        .reset-btn, .start-btn {
            background: linear-gradient(135deg, #4A90E2, #357abd);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
            width: 100%;
            box-shadow: 0 3px 0 #1a3a5a;
            touch-action: manipulation;
        }

        .start-btn {
            background: linear-gradient(135deg, #27ae60, #219a52);
            box-shadow: 0 3px 0 #1a5a3a;
        }

        .reset-btn:active, .start-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1a3a5a;
        }

        .home-btn {
            display: inline-block;
            margin-top: 12px;
            padding: 6px 20px;
            background: #ccc;
            color: #333;
            text-decoration: none;
            border-radius: 40px;
            font-size: 12px;
            transition: 0.2s;
        }

        .home-btn:hover {
            background: #bbb;
        }

        /* Сообщение Глюка */
        #glukFloatMessage {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-left: 4px solid #FF8C00;
            border-radius: 12px;
            padding: 10px 16px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #FF8C00;
            max-width: 240px;
            z-index: 10000;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.3s ease;
            pointer-events: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        @media (max-width: 650px) {
            .game-container { padding: 12px; }
            h1 { font-size: 20px; }
            .info-value { font-size: 22px; }
            .info-panel { padding: 10px; min-width: 110px; }
            .reset-btn, .start-btn { padding: 8px 12px; font-size: 12px; }
            canvas { width: 100%; height: auto; }
            .danger-line { top: 15%; }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <h1>🧩 ТЕТРИС — ASL EDITION</h1>
    <div class="subtitle">← → двигать | ↑ вращать | ↓ ускорить | ␣ сброс</div>

    <div class="game-layout">
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="420" height="660"></canvas>
            <div class="danger-line" id="dangerLine"></div>
        </div>
        
        <div class="info-panel">
            <div class="info-item">
                <div class="info-label">🎯 СЧЁТ</div>
                <div class="info-value" id="scoreValue">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">🔰 УРОВЕНЬ</div>
                <div class="info-value" id="levelValue">1</div>
            </div>
            <div class="info-item">
                <div class="info-label">📊 ЛИНИИ</div>
                <div class="info-value" id="linesValue">0</div>
            </div>
            <div class="level-badge" id="nextPieceLabel">СЛЕДУЮЩАЯ</div>
            <canvas id="nextCanvas" width="120" height="120" style="margin: 8px auto; display: block; background: #0a0f1a; border-radius: 12px;"></canvas>
            <button class="start-btn" id="startBtn">🚀 НАЧАТЬ ИГРУ</button>
            <button class="reset-btn" id="resetBtn">🔄 НОВАЯ ИГРА</button>
        </div>
    </div>
    <a href="index.html" class="home-btn">🏠 НА ГЛАВНУЮ</a>
</div>

<div id="glukFloatMessage"></div>

<script>
    (function(){
        // ---------- НАСТРОЙКИ ----------
        const COLS = 14;
        const ROWS = 22;
        const CELL_SIZE = 30;
        const DANGER_ZONE_ROW = 3;
        
        let currentLevel = 1;
        let totalLines = 0;
        let score = 0;
        let gameActive = false;
        let gameStarted = false;
        let darkenInterval = null;
        let isDarkened = false;
        let lastThousandTrigger = 0;
        
        function getFallDelay() {
            return Math.max(80, 500 - (currentLevel - 1) * 30);
        }
        
        let fallDelay = getFallDelay();
        let fallInterval = null;
        
        const gameContainer = document.getElementById('gameContainer');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const levelSpan = document.getElementById('levelValue');
        const linesSpan = document.getElementById('linesValue');
        
        // Тетромино
        const TETROMINOS = {
            'I': { shape: [[1,1,1,1]], color: '#00FFFF', isBomb: false },
            'O': { shape: [[1,1],[1,1]], color: '#FFFF00', isBomb: false },
            'T': { shape: [[0,1,0],[1,1,1]], color: '#AA00FF', isBomb: false },
            'S': { shape: [[0,1,1],[1,1,0]], color: '#00FF00', isBomb: false },
            'Z': { shape: [[1,1,0],[0,1,1]], color: '#FF0000', isBomb: false },
            'J': { shape: [[1,0,0],[1,1,1]], color: '#0000FF', isBomb: false },
            'L': { shape: [[0,0,1],[1,1,1]], color: '#FFA500', isBomb: false },
            'BOMB': { shape: [[1]], color: '#FFFFFF', isBomb: true, borderColor: '#888', centerColor: '#FF0000' }
        };
        const TETRO_NAMES = ['I', 'O', 'T', 'S', 'Z', 'J', 'L', 'BOMB'];
        
        let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        let currentPiece = null;
        let nextPiece = null;
        
        // Фразы Глюка
        const glukMessages = [
            "Ну вот, даже падающие блоки умнее тебя, а у них вообще нет мозгов, только гравитация…",
            "Ты проиграл игре, где главный враг — геометрия, и она тебя победила, поздравляю, это редкость…",
            "Стоило ли так долго смотреть на экран, если линия всё равно не сложилась? Нет. Но ты смотрел…",
            "В ASL тебя ждут бездна, прессы и мои комментарии, а ты застрял на падающих квадратах, смешно, правда?",
            "Скорость падения была выше твоей скорости мысли, это диагноз, но не смертельный, перезапускай…",
            "Ты мог построить идеальный ряд, но выбрал хаос, я это запомню, у меня память долгая…",
            "Даже мусорщики в старых цехах собирают детали быстрее, чем ты собираешь линии, а они ржавые и без глаз…",
            "Очередная попытка, и очередной провал, я сбился со счёта, но это неважно, главное — ты сбился с ритма…",
            "Тетрис — это тест на скорость и терпение, ты не прошёл ни то, ни другое, но у меня есть тесты и сложнее, готов?",
            "Блоки падают, ты проигрываешь, я говорю, всё идёт по плану, перезапускай, пока я не начал скучать, а я скучаю быстро…"
        ];
        
        // Система сообщений
        let glukMessageElement = document.getElementById('glukFloatMessage');
        let glukMessageTimeout = null;
        
        function showGlukMessage(text, duration = 4000) {
            if (!glukMessageElement) return;
            if (glukMessageTimeout) clearTimeout(glukMessageTimeout);
            glukMessageElement.textContent = text;
            glukMessageElement.style.opacity = '1';
            glukMessageElement.style.transform = 'translateX(0)';
            glukMessageTimeout = setTimeout(() => {
                glukMessageElement.style.opacity = '0';
                glukMessageElement.style.transform = 'translateX(50px)';
            }, duration);
        }
        
        function randomGlukMessage() {
            return glukMessages[Math.floor(Math.random() * glukMessages.length)];
        }
        
        function getRandomTetro() {
            const isBomb = Math.random() < 0.12;
            if (isBomb && score > 500) {
                return {
                    name: 'BOMB',
                    shape: [[1]],
                    color: '#FFFFFF',
                    isBomb: true,
                    borderColor: '#888',
                    centerColor: '#FF0000',
                    row: 0,
                    col: Math.floor((COLS - 1) / 2)
                };
            }
            const name = TETRO_NAMES[Math.floor(Math.random() * (TETRO_NAMES.length - 1))];
            const data = TETROMINOS[name];
            return {
                name: name,
                shape: data.shape.map(row => [...row]),
                color: data.color,
                isBomb: false,
                row: 0,
                col: Math.floor((COLS - data.shape[0].length) / 2)
            };
        }
        
        function rotateShape(shape) {
            const rows = shape.length, cols = shape[0].length;
            const rotated = Array(cols).fill().map(() => Array(rows).fill(0));
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    rotated[j][rows - 1 - i] = shape[i][j];
                }
            }
            return rotated;
        }
        
        function isValidMove(piece, newRow, newCol, newShape = null) {
            const shape = newShape || piece.shape;
            for (let i = 0; i < shape.length; i++) {
                for (let j = 0; j < shape[0].length; j++) {
                    if (shape[i][j]) {
                        const boardRow = newRow + i;
                        const boardCol = newCol + j;
                        if (boardRow >= ROWS || boardCol < 0 || boardCol >= COLS) return false;
                        if (boardRow >= 0 && board[boardRow][boardCol] !== 0) return false;
                    }
                }
            }
            return true;
        }
        
        function explodeBomb(row, col) {
            for (let dr = -2; dr <= 2; dr++) {
                for (let dc = -2; dc <= 2; dc++) {
                    const nr = row + dr, nc = col + dc;
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                        if (Math.abs(dr) + Math.abs(dc) <= 2) {
                            board[nr][nc] = 0;
                        }
                    }
                }
            }
            showGlukMessage("💥 БАХ! Бомба взорвалась! 4 блока уничтожено.", 2000);
        }
        
        function mergePiece() {
            if (!currentPiece) return;
            
            if (currentPiece.isBomb) {
                for (let i = 0; i < currentPiece.shape.length; i++) {
                    for (let j = 0; j < currentPiece.shape[0].length; j++) {
                        if (currentPiece.shape[i][j]) {
                            const row = currentPiece.row + i;
                            const col = currentPiece.col + j;
                            if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
                                explodeBomb(row, col);
                            }
                        }
                    }
                }
            } else {
                for (let i = 0; i < currentPiece.shape.length; i++) {
                    for (let j = 0; j < currentPiece.shape[0].length; j++) {
                        if (currentPiece.shape[i][j]) {
                            const row = currentPiece.row + i;
                            const col = currentPiece.col + j;
                            if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
                                board[row][col] = currentPiece.color;
                            }
                        }
                    }
                }
            }
            
            let linesCleared = 0;
            for (let row = ROWS - 1; row >= 0; ) {
                let full = true;
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col] === 0) {
                        full = false;
                        break;
                    }
                }
                if (full) {
                    for (let r = row; r > 0; r--) {
                        board[r] = [...board[r-1]];
                    }
                    board[0] = Array(COLS).fill(0);
                    linesCleared++;
                } else {
                    row--;
                }
            }
            
            if (linesCleared > 0) {
                totalLines += linesCleared;
                score += linesCleared * 100 * currentLevel;
                const newLevel = Math.floor(totalLines / 5) + 1;
                if (newLevel > currentLevel) {
                    currentLevel = newLevel;
                    fallDelay = getFallDelay();
                    if (fallInterval) {
                        clearInterval(fallInterval);
                        startFallInterval();
                    }
                }
                updateUI();
            }
            
            spawnNewPiece();
            draw();
            
            if (checkDangerZone()) {
                gameOver();
            }
        }
        
        function spawnNewPiece() {
            currentPiece = nextPiece;
            nextPiece = getRandomTetro();
            if (currentPiece) {
                currentPiece.row = 0;
                currentPiece.col = Math.floor((COLS - currentPiece.shape[0].length) / 2);
                if (!isValidMove(currentPiece, currentPiece.row, currentPiece.col)) {
                    gameOver();
                }
            }
        }
        
        function checkDangerZone() {
            for (let row = 0; row < DANGER_ZONE_ROW; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col] !== 0) return true;
                }
            }
            return false;
        }
        
        function redFlash() {
            gameContainer.classList.add('red-flash');
            setTimeout(() => {
                gameContainer.classList.remove('red-flash');
            }, 200);
        }
        
        // ОТРИСОВКА С НЕЙТРАЛЬНЫМ СВЕЧЕНИЕМ (как факел в Minecraft)
        function draw() {
            // Очистка канваса
            ctx.fillStyle = '#0a0f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Рисуем опасную зону
            for (let row = 0; row < DANGER_ZONE_ROW; row++) {
                for (let col = 0; col < COLS; col++) {
                    ctx.fillStyle = 'rgba(255,0,0,0.1)';
                    ctx.fillRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                }
            }
            
            // Рисуем все блоки на поле
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col] !== 0) {
                        ctx.fillStyle = board[row][col];
                        ctx.fillRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                        ctx.strokeStyle = '#333';
                        ctx.strokeRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                    } else {
                        ctx.strokeStyle = '#1a2a2f';
                        ctx.strokeRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                    }
                }
            }
            
            // Рисуем текущую фигуру с нейтральным свечением (только при затемнении)
            if (currentPiece && gameActive) {
                if (currentPiece.isBomb) {
                    const x = currentPiece.col * CELL_SIZE;
                    const y = currentPiece.row * CELL_SIZE;
                    
                    // Основной блок
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(x, y, CELL_SIZE - 1, CELL_SIZE - 1);
                    ctx.strokeStyle = '#888';
                    ctx.strokeRect(x, y, CELL_SIZE - 1, CELL_SIZE - 1);
                    ctx.fillStyle = '#FF0000';
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE/2, y + CELL_SIZE/2, CELL_SIZE/4, 0, 2 * Math.PI);
                    ctx.fill();
                    
                    // Нейтральное свечение (только в темноте)
                    if (isDarkened) {
                        ctx.shadowBlur = 12;
                        ctx.shadowColor = '#ffaa44';
                        ctx.fillStyle = '#FFFFFF';
                        ctx.fillRect(x, y, CELL_SIZE - 1, CELL_SIZE - 1);
                        ctx.shadowBlur = 0;
                    }
                } else {
                    for (let i = 0; i < currentPiece.shape.length; i++) {
                        for (let j = 0; j < currentPiece.shape[0].length; j++) {
                            if (currentPiece.shape[i][j]) {
                                const x = (currentPiece.col + j) * CELL_SIZE;
                                const y = (currentPiece.row + i) * CELL_SIZE;
                                
                                // Основной блок
                                ctx.fillStyle = currentPiece.color;
                                ctx.fillRect(x, y, CELL_SIZE - 1, CELL_SIZE - 1);
                                ctx.strokeStyle = '#fff';
                                ctx.strokeRect(x, y, CELL_SIZE - 1, CELL_SIZE - 1);
                                
                                // Нейтральное свечение (только в темноте)
                                if (isDarkened) {
                                    ctx.shadowBlur = 10;
                                    ctx.shadowColor = '#ffaa66';
                                    ctx.fillStyle = currentPiece.color;
                                    ctx.fillRect(x, y, CELL_SIZE - 1, CELL_SIZE - 1);
                                    ctx.shadowBlur = 0;
                                }
                            }
                        }
                    }
                }
            }
            
            // Рисуем следующую фигуру
            nextCtx.fillStyle = '#0a0f1a';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (nextPiece && !nextPiece.isBomb) {
                const shape = nextPiece.shape;
                const color = nextPiece.color;
                const blockW = nextCanvas.width / 4;
                const offsetX = (nextCanvas.width - (shape[0].length * blockW)) / 2;
                const offsetY = (nextCanvas.height - (shape.length * blockW)) / 2;
                for (let i = 0; i < shape.length; i++) {
                    for (let j = 0; j < shape[0].length; j++) {
                        if (shape[i][j]) {
                            nextCtx.fillStyle = color;
                            nextCtx.fillRect(offsetX + j * blockW, offsetY + i * blockW, blockW - 2, blockW - 2);
                        }
                    }
                }
            } else if (nextPiece && nextPiece.isBomb) {
                const blockW = nextCanvas.width / 4;
                const offsetX = (nextCanvas.width - blockW) / 2;
                const offsetY = (nextCanvas.height - blockW) / 2;
                nextCtx.fillStyle = '#FFFFFF';
                nextCtx.fillRect(offsetX, offsetY, blockW - 2, blockW - 2);
                nextCtx.fillStyle = '#FF0000';
                nextCtx.beginPath();
                nextCtx.arc(offsetX + blockW/2, offsetY + blockW/2, blockW/4, 0, 2 * Math.PI);
                nextCtx.fill();
            }
        }
        
        function startDarkenEffect() {
            if (darkenInterval) clearInterval(darkenInterval);
            let opacity = 0;
            showGlukMessage("Щас свет починю, погоди...", 2500);
            darkenInterval = setInterval(() => {
                if (!gameActive || score < 1000) {
                    clearInterval(darkenInterval);
                    gameContainer.classList.remove('dark-overlay');
                    isDarkened = false;
                    return;
                }
                opacity += 0.03;
                if (opacity >= 0.92) {
                    clearInterval(darkenInterval);
                    gameContainer.classList.add('dark-overlay');
                    isDarkened = true;
                    setTimeout(() => {
                        if (gameActive && isDarkened) {
                            gameContainer.classList.remove('dark-overlay');
                            isDarkened = false;
                            showGlukMessage("Всё починил! Свет вернулся. Развлекайся дальше)", 4000);
                            lastThousandTrigger = Math.floor(score / 1000);
                        }
                    }, 60000);
                }
            }, 80);
        }
        
        function moveDown() {
            if (!gameActive || !currentPiece) return;
            if (isValidMove(currentPiece, currentPiece.row + 1, currentPiece.col)) {
                currentPiece.row++;
                draw();
            } else {
                mergePiece();
                draw();
            }
        }
        
        function instantDrop() {
            if (!gameActive || !currentPiece) return;
            while (isValidMove(currentPiece, currentPiece.row + 1, currentPiece.col)) {
                currentPiece.row++;
            }
            mergePiece();
            draw();
        }
        
        function moveHorizontal(dx) {
            if (!gameActive || !currentPiece) return;
            if (isValidMove(currentPiece, currentPiece.row, currentPiece.col + dx)) {
                currentPiece.col += dx;
                draw();
            }
        }
        
        function rotatePiece() {
            if (!gameActive || !currentPiece) return;
            const rotated = rotateShape(currentPiece.shape);
            if (isValidMove(currentPiece, currentPiece.row, currentPiece.col, rotated)) {
                currentPiece.shape = rotated;
                draw();
            }
        }
        
        function updateUI() {
            scoreSpan.innerText = score;
            levelSpan.innerText = currentLevel;
            linesSpan.innerText = totalLines;
            
            const currentThousand = Math.floor(score / 1000);
            if (score >= 1000 && gameActive && !isDarkened && currentThousand > lastThousandTrigger && !gameContainer.classList.contains('dark-overlay')) {
                startDarkenEffect();
            }
        }
        
        function startFallInterval() {
            if (fallInterval) clearInterval(fallInterval);
            fallInterval = setInterval(() => {
                if (gameActive) moveDown();
            }, fallDelay);
        }
        
        function gameOver() {
            if (!gameActive) return;
            gameActive = false;
            if (fallInterval) clearInterval(fallInterval);
            if (darkenInterval) clearInterval(darkenInterval);
            redFlash();
            showGlukMessage(randomGlukMessage(), 5000);
            draw();
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fillRect(0, canvas.height/2 - 40, canvas.width, 80);
            ctx.fillStyle = '#FF8C00';
            ctx.font = 'bold 28px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
        }
        
        function startGame() {
            if (fallInterval) clearInterval(fallInterval);
            if (darkenInterval) clearInterval(darkenInterval);
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            currentLevel = 1;
            totalLines = 0;
            score = 0;
            fallDelay = getFallDelay();
            gameActive = true;
            gameStarted = true;
            isDarkened = false;
            lastThousandTrigger = 0;
            gameContainer.classList.remove('dark-overlay', 'red-flash');
            nextPiece = getRandomTetro();
            spawnNewPiece();
            updateUI();
            startFallInterval();
            draw();
            showGlukMessage("Игра началась! Удачи, тебе она понадобится...", 3000);
        }
        
        function resetGame() {
            if (fallInterval) clearInterval(fallInterval);
            if (darkenInterval) clearInterval(darkenInterval);
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            currentLevel = 1;
            totalLines = 0;
            score = 0;
            fallDelay = getFallDelay();
            gameActive = false;
            gameStarted = false;
            isDarkened = false;
            lastThousandTrigger = 0;
            gameContainer.classList.remove('dark-overlay', 'red-flash');
            currentPiece = null;
            nextPiece = null;
            updateUI();
            draw();
        }
        
        // Управление с клавиатуры и для телефона (кнопки на экране)
        document.addEventListener('keydown', (e) => {
            if (!gameActive || !gameStarted) return;
            switch(e.key) {
                case 'ArrowLeft': moveHorizontal(-1); break;
                case 'ArrowRight': moveHorizontal(1); break;
                case 'ArrowDown': moveDown(); break;
                case 'ArrowUp': rotatePiece(); break;
                case ' ': case 'Space': instantDrop(); e.preventDefault(); break;
                default: return;
            }
            e.preventDefault();
        });
        
        // Добавляем кнопки для телефона
        function addTouchButtons() {
            const container = document.querySelector('.game-layout');
            if (!container) return;
            
            const btnPanel = document.createElement('div');
            btnPanel.style.cssText = 'display: flex; gap: 12px; justify-content: center; margin-top: 16px; flex-wrap: wrap;';
            btnPanel.innerHTML = `
                <button class="reset-btn" id="touchLeft" style="width: auto; padding: 10px 18px;">←</button>
                <button class="reset-btn" id="touchRight" style="width: auto; padding: 10px 18px;">→</button>
                <button class="reset-btn" id="touchRotate" style="width: auto; padding: 10px 18px;">↻</button>
                <button class="reset-btn" id="touchDown" style="width: auto; padding: 10px 18px;">↓</button>
                <button class="reset-btn" id="touchDrop" style="width: auto; padding: 10px 18px;">␣</button>
            `;
            container.parentNode.insertBefore(btnPanel, container.nextSibling);
            
            document.getElementById('touchLeft').addEventListener('click', () => { if(gameActive && gameStarted) moveHorizontal(-1); });
            document.getElementById('touchRight').addEventListener('click', () => { if(gameActive && gameStarted) moveHorizontal(1); });
            document.getElementById('touchRotate').addEventListener('click', () => { if(gameActive && gameStarted) rotatePiece(); });
            document.getElementById('touchDown').addEventListener('click', () => { if(gameActive && gameStarted) moveDown(); });
            document.getElementById('touchDrop').addEventListener('click', () => { if(gameActive && gameStarted) instantDrop(); });
        }
        
        document.getElementById('startBtn').addEventListener('click', () => startGame());
        document.getElementById('resetBtn').addEventListener('click', () => resetGame());
        
        resetGame();
        addTouchButtons();
    })();
</script>
</body>
</html>
