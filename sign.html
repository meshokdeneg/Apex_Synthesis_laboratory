<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ASL | Бейдж ASL</title>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        // TODO: Замените на свои данные из Firebase Console
        const firebaseConfig = {
            apiKey: "ВАШ_API_KEY",
            authDomain: "ВАШ_AUTH_DOMAIN",
            projectId: "ВАШ_PROJECT_ID",
            storageBucket: "ВАШ_STORAGE_BUCKET",
            messagingSenderId: "ВАШ_SENDER_ID",
            appId: "ВАШ_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('errorMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Заполните оба поля');
                return;
            }

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                alert('✅ Добро пожаловать, ' + userCredential.user.email);
                // window.location.href = 'index.html';
            } catch (error) {
                let message = 'Ошибка входа. Проверьте ник (email) и пароль.';
                if (error.code === 'auth/user-not-found') message = 'Пользователь не найден';
                if (error.code === 'auth/wrong-password') message = 'Неверный пароль';
                if (error.code === 'auth/invalid-email') message = 'Неверный формат email';
                showError(message);
            }
        });

        function showError(text) {
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = `⚠️ ${text}`;
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 4000);
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url('https://static.planetminecraft.com/files/image/minecraft/texture-pack/2021/362/14416263-quartzpack_l.jpg') repeat;
            background-size: 64px 64px;
            font-family: 'Segoe UI', 'Courier New', monospace;
            color: #1a1a1a;
            line-height: 1.5;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Контейнер — усиленный контур, чтобы не сливался с фоном */
        .badge-container {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(1px);
            border: 3px solid #2c3e2f;  /* чёткий тёмный контур */
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255,255,255,0.3); /* внешняя тень + светлая кайма */
            border-radius: 12px;
            overflow: hidden;
        }

        /* Шапка — как на странице "О ASL" */
        .badge-header {
            background: #1a2a2f;
            padding: 22px 30px;
            border-bottom: 4px solid #FF8C00;
            text-align: center;
        }

        .badge-header h1 {
            font-size: 32px;
            color: #FF8C00;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .badge-header p {
            font-size: 14px;
            color: #ccc;
            margin-top: 8px;
        }

        /* Основное тело */
        .badge-body {
            padding: 32px 30px 35px;
        }

        .badge-sub {
            font-size: 14px;
            color: #555;
            margin-bottom: 25px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 12px;
            text-align: center;
        }

        /* Поля ввода */
        .input-group {
            text-align: left;
            margin-bottom: 22px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1a2a2f;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            font-size: 15px;
            font-family: 'Segoe UI', monospace;
            background: #fff;
            border: 1.5px solid #b0b0b0;
            border-radius: 8px;
            transition: 0.2s;
            color: #1a1a1a;
        }

        .input-group input:focus {
            outline: none;
            border-color: #FF8C00;
            box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.2);
        }

        /* Кнопка — как в футере страницы "О ASL" */
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #2c3e2f;
            border: 2px solid #FF8C00;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            color: #FF8C00;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            font-family: inherit;
        }

        .login-btn:hover {
            background: #FF8C00;
            color: #1a2a2f;
            border-color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 140, 0, 0.3);
        }

        /* Ссылка назад */
        .back-link {
            display: inline-block;
            margin-top: 25px;
            font-size: 14px;
            color: #4A90E2;
            text-decoration: none;
            border-bottom: 1px dashed #4A90E2;
        }

        .back-link:hover {
            color: #FF8C00;
            border-bottom-color: #FF8C00;
        }

        /* Футер */
        .asl-footer {
            margin-top: 30px;
            padding-top: 18px;
            border-top: 1px solid #e0e0e0;
            text-align: center;
            font-size: 11px;
            color: #888;
            font-family: monospace;
        }

        /* Ошибка */
        .error-message {
            background: #fff2f0;
            border-left: 3px solid #d32f2f;
            padding: 10px 12px;
            font-size: 13px;
            color: #b33;
            margin-bottom: 20px;
            text-align: left;
            font-family: monospace;
            display: none;
            border-radius: 6px;
        }

        /* Адаптация под телефон */
        @media (max-width: 600px) {
            .badge-header h1 {
                font-size: 26px;
            }
            .badge-header {
                padding: 16px 20px;
            }
            .badge-body {
                padding: 24px 20px 28px;
            }
            .input-group input {
                padding: 10px 12px;
                font-size: 14px;
            }
            .login-btn {
                padding: 10px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="badge-container">
        <!-- Шапка -->
        <div class="badge-header">
            <h1>🏷️ БЕЙДЖ ASL</h1>
            <p>Авторизация в системе</p>
        </div>

        <!-- Тело -->
        <div class="badge-body">
            <div class="badge-sub">Доступ к защищённым протоколам</div>

            <div class="error-message" id="errorMsg"></div>

            <form id="loginForm">
                <div class="input-group">
                    <label>Идентификатор сотрудника</label>
                    <input type="text" id="username" placeholder="ник" autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Код доступа</label>
                    <input type="password" id="password" placeholder="пароль">
                </div>
                <button type="submit" class="login-btn">ВОЙТИ →</button>
            </form>

            <div style="text-align: center;">
                <a href="index.html" class="back-link">← вернуться на главную страницу</a>
            </div>

            <div class="asl-footer">
                ASL • отдел TToS • версия протокола 2.3
            </div>
        </div>
    </div>
</body>
</html>
