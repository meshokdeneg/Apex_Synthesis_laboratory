<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ASL | Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: url('https://static.planetminecraft.com/files/image/minecraft/texture-pack/2021/362/14416263-quartzpack_l.jpg') repeat;
            background-size: 64px 64px;
            font-family: 'Segoe UI', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(1px);
            border: 2px solid #b0b0b0;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
        }

        .login-container h2 {
            color: #FF8C00;
            margin-bottom: 25px;
        }

        .login-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .login-container button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #2c3e2f;
            border: none;
            border-radius: 30px;
            color: #FF8C00;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        .login-container button:hover {
            background: #FF8C00;
            color: #1a2a2f;
        }

        .error-msg {
            color: #c0392b;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #FF8C00;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h2>🔐 ВХОД ASL</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Пароль">
    <button id="loginBtn">ВОЙТИ</button>
    <div class="error-msg" id="errorMsg"></div>
    <a href="index.html" class="back-link">← На главную</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAuCRlflkjJQeKd4EyBGQIa6wUNWLNKo3c",
        authDomain: "apex-8f11e.firebaseapp.com",
        databaseURL: "https://apex-8f11e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "apex-8f11e",
        storageBucket: "apex-8f11e.firebasestorage.app",
        messagingSenderId: "923734077108",
        appId: "1:923734077108:web:f6d2d4059972c215c371e1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginBtn = document.getElementById('loginBtn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const errorMsg = document.getElementById('errorMsg');

    loginBtn.addEventListener('click', async () => {
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
            errorMsg.textContent = 'Заполните email и пароль';
            errorMsg.style.display = 'block';
            return;
        }

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            console.log('Успешный вход:', userCredential.user.email);
            errorMsg.style.display = 'none';
            alert('Вход выполнен! Перенаправление...');
            window.location.href = 'profile.html';
        } catch (error) {
            console.error('Ошибка входа:', error.code, error.message);
            let message = '';
            switch (error.code) {
                case 'auth/invalid-credential':
                case 'auth/user-not-found':
                case 'auth/wrong-password':
                    message = 'Неверный email или пароль';
                    break;
                case 'auth/invalid-email':
                    message = 'Неверный формат email';
                    break;
                default:
                    message = error.message;
            }
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
        }
    });
</script>
</body>
</html>
