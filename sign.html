<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL | Вход</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0a0f1a 0%, #0c111c 100%);
            font-family: 'Segoe UI', system-ui;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .login-container {
            background: rgba(30,35,45,0.95);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid #FF8C00;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        h2 {
            color: #FF8C00;
            text-align: center;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(0,0,0,0.5);
            border: 1px solid #4A90E2;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #FF8C00;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #4A90E2;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }
        button:hover {
            background: #FF8C00;
        }
        .error {
            color: #e74c3c;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }
        .link {
            text-align: center;
            margin-top: 15px;
            color: #aaa;
        }
        .link a {
            color: #FF8C00;
            text-decoration: none;
        }
        .link a:hover {
            text-decoration: underline;
        }
        .loading {
            text-align: center;
            margin-top: 10px;
            color: #FF8C00;
            display: none;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h2>🔐 ВХОД В ASL</h2>
    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required autocomplete="email">
        <input type="password" id="password" placeholder="Пароль" required autocomplete="current-password">
        <button type="submit">ВОЙТИ</button>
        <div class="error" id="errorMsg"></div>
        <div class="loading" id="loadingMsg">⏳ Загрузка профиля...</div>
        <div class="link">Нет аккаунта? <a href="reg.html">Зарегистрироваться</a></div>
        <div class="link"><a href="index.html">← На главную</a></div>
    </form>
</div>

<script>
    // ========== FIREBASE КОНФИГ ==========
    const firebaseConfig = {
        apiKey: "AIzaSyAuCRlflkjJQeKd4EyBGQIa6wUNWLNKo3c",
        authDomain: "apex-8f11e.firebaseapp.com",
        projectId: "apex-8f11e",
        storageBucket: "apex-8f11e.firebasestorage.app",
        messagingSenderId: "923734077108",
        appId: "1:923734077108:web:f6d2d4059972c215c371e1",
        measurementId: "G-WTKS5JQ7Z5"
    };

    // Инициализация Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();

    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const errorMsg = document.getElementById('errorMsg');
    const loadingMsg = document.getElementById('loadingMsg');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        
        if (!email || !password) {
            errorMsg.textContent = 'Заполните все поля!';
            return;
        }
        
        errorMsg.textContent = '';
        loadingMsg.style.display = 'block';
        
        try {
            // 1. Вход в Firebase Auth
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const user = userCredential.user;
            
            // 2. Загружаем профиль из Firestore
            const docRef = db.collection('users').doc(user.uid);
            const docSnap = await docRef.get();
            
            let userData = {};
            
            if (docSnap.exists) {
                userData = docSnap.data();
            } else {
                // Если профиля нет — создаём минимальный
                userData = {
                    username: email.split('@')[0],
                    bio: 'Новый сотрудник ASL',
                    avatar: '🧊',
                    level: 1,
                    cubes: 100,
                    email: email
                };
                await docRef.set(userData);
            }
            
            // 3. Сохраняем в localStorage
            localStorage.setItem('asl_user', JSON.stringify({
                uid: user.uid,
                username: userData.username || email.split('@')[0],
                email: email,
                bio: userData.bio || 'Новый сотрудник ASL',
                avatar: userData.avatar || '🧊',
                level: userData.level || 1,
                cubes: userData.cubes || 100
            }));
            
            // 4. Перенаправляем на главную
            window.location.href = 'index.html';
            
        } catch (error) {
            console.error('Ошибка входа:', error);
            loadingMsg.style.display = 'none';
            
            switch (error.code) {
                case 'auth/invalid-email':
                    errorMsg.textContent = 'Неверный формат email';
                    break;
                case 'auth/user-disabled':
                    errorMsg.textContent = 'Аккаунт отключён';
                    break;
                case 'auth/user-not-found':
                    errorMsg.textContent = 'Пользователь не найден';
                    break;
                case 'auth/wrong-password':
                    errorMsg.textContent = 'Неверный пароль';
                    break;
                default:
                    errorMsg.textContent = 'Ошибка входа: ' + error.message;
            }
        }
    });
</script>
</body>
</html>
