<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ASL | 404</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0f1a 0%, #0c111c 100%);
            font-family: 'Segoe UI', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        /* БЕЛЫЙ КОНТЕЙНЕР */
        .error-container {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4), 0 0 0 3px #FF8C00, 0 0 0 8px #1a2a2f;
            padding: 60px 40px;
            text-align: center;
        }

        /* ЦИФРА 404 */
        .error-number {
            font-size: 180px;
            font-weight: 800;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 40px;
            letter-spacing: 20px;
        }

        /* АНИМАЦИОННАЯ ЗОНА */
        .animation-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        /* СЕРВЕРНЫЙ БЛОК (огромный компьютер, внутри блоки) */
        .server-rack {
            position: relative;
            width: 320px;
            background: #2c3e50;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .rack-case {
            background: #1a2a2f;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #4a6a7a;
        }

        /* ВНУТРЕННИЕ БЛОКИ (модули) */
        .server-modules {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .module {
            background: #0f1a1f;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 4px solid #FF8C00;
        }

        .module-led {
            width: 12px;
            height: 12px;
            background: #e74c3c;
            border-radius: 50%;
            box-shadow: 0 0 5px #e74c3c;
            animation: blink 0.8s infinite;
        }

        .module:nth-child(2) .module-led { background: #FF8C00; animation-delay: 0.3s; }
        .module:nth-child(3) .module-led { background: #4A90E2; animation-delay: 0.6s; }

        .module-label {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #8aaabb;
            letter-spacing: 1px;
        }

        .module-status {
            margin-left: auto;
            font-size: 10px;
            color: #e74c3c;
            font-family: monospace;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* МАНИПУЛЯТОР (2D рука) */
        .manipulator {
            position: relative;
            width: 200px;
            height: 240px;
        }

        .arm-base {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 35px;
            background: #7f8c8d;
            border-radius: 8px;
            box-shadow: 0 5px 0 #5a6268;
        }

        .arm-upper {
            position: absolute;
            bottom: 55px;
            left: 50%;
            transform: translateX(-50%);
            width: 45px;
            height: 90px;
            background: #bdc3c7;
            border-radius: 25px;
            transform-origin: center top;
            animation: hit 0.9s infinite ease-in-out;
            box-shadow: 0 5px 0 #95a5a6;
        }

        .arm-lower {
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 55px;
            height: 35px;
            background: #e67e22;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
            padding-top: 6px;
        }

        .claw {
            width: 10px;
            height: 22px;
            background: #d35400;
            border-radius: 4px;
        }

        @keyframes hit {
            0% { transform: translateX(-50%) rotate(0deg); }
            35% { transform: translateX(-50%) rotate(30deg); }
            55% { transform: translateX(-50%) rotate(-5deg); }
            75% { transform: translateX(-50%) rotate(3deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }

        /* УДАР (искры) */
        .sparks {
            position: absolute;
            top: 40%;
            left: 60%;
            width: 50px;
            height: 50px;
            pointer-events: none;
            opacity: 0;
            animation: sparkFlash 0.9s infinite;
        }

        .sparks::before,
        .sparks::after {
            content: '';
            position: absolute;
            background: #FF8C00;
            border-radius: 50%;
        }

        .sparks::before {
            width: 15px;
            height: 15px;
            top: 15px;
            left: 15px;
            box-shadow: 0 0 8px #FF8C00;
        }

        .sparks::after {
            width: 8px;
            height: 8px;
            top: 28px;
            left: 28px;
            background: #e74c3c;
        }

        @keyframes sparkFlash {
            0% { opacity: 0; transform: scale(0); }
            40% { opacity: 0; }
            50% { opacity: 1; transform: scale(1); }
            65% { opacity: 0.8; transform: scale(1.1); }
            100% { opacity: 0; transform: scale(0); }
        }

        /* КНОПКА НА ГЛАВНУЮ */
        .home-btn {
            margin-top: 50px;
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, #4A90E2, #357abd);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(74,144,226,0.3);
        }

        .home-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(74,144,226,0.4);
        }

        @media (max-width: 700px) {
            .error-container { padding: 30px 20px; }
            .error-number { font-size: 100px; letter-spacing: 10px; }
            .server-rack { width: 260px; }
            .manipulator { width: 160px; height: 200px; }
            .animation-area { gap: 30px; }
        }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-number">404</div>

    <div class="animation-area">
        <!-- СЕРВЕРНЫЙ БЛОК (огромный компьютер, внутри модули) -->
        <div class="server-rack">
            <div class="rack-case">
                <div class="server-modules">
                    <div class="module">
                        <div class="module-led"></div>
                        <div class="module-label">ASL CORE v2.3</div>
                        <div class="module-status">ERROR</div>
                    </div>
                    <div class="module">
                        <div class="module-led"></div>
                        <div class="module-label">NODE: 404</div>
                        <div class="module-status">FAIL</div>
                    </div>
                    <div class="module">
                        <div class="module-led"></div>
                        <div class="module-label">SYNTHESIS</div>
                        <div class="module-status">OFF</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- МАНИПУЛЯТОР (рука) -->
        <div class="manipulator">
            <div class="arm-base"></div>
            <div class="arm-upper">
                <div class="arm-lower">
                    <div class="claw"></div>
                    <div class="claw"></div>
                </div>
            </div>
            <div class="sparks"></div>
        </div>
    </div>

    <a href="index.html" class="home-btn">🏠 НА ГЛАВНУЮ</a>
</div>
</body>
</html>
