<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ASL | 404</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0f1a 0%, #0c111c 100%);
            font-family: 'Segoe UI', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .error-container {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4), 0 0 0 3px #FF8C00, 0 0 0 8px #1a2a2f;
            padding: 60px 40px;
            text-align: center;
        }

        .error-number {
            font-size: 180px;
            font-weight: 800;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 40px;
            letter-spacing: 20px;
        }

        .animation-area {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 60px;
            flex-wrap: wrap;
            margin: 20px 0;
            min-height: 380px;
            position: relative;
        }

        /* СЕРВЕР */
        .server-rack {
            position: relative;
            width: 320px;
            background: #2c3e50;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            margin-bottom: 20px;
            z-index: 5;
        }

        .rack-case {
            background: #1a2a2f;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #4a6a7a;
        }

        .server-modules {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .module {
            background: #0f1a1f;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 4px solid #FF8C00;
        }

        .module-led {
            width: 12px;
            height: 12px;
            background: #e74c3c;
            border-radius: 50%;
            box-shadow: 0 0 5px #e74c3c;
            animation: blink 0.8s infinite;
        }

        .module:nth-child(2) .module-led { background: #FF8C00; animation-delay: 0.3s; }
        .module:nth-child(3) .module-led { background: #4A90E2; animation-delay: 0.6s; }

        .module-label {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #8aaabb;
            letter-spacing: 1px;
        }

        .module-status {
            margin-left: auto;
            font-size: 10px;
            color: #e74c3c;
            font-family: monospace;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ========= МАНИПУЛЯТОР ========= */
        .manipulator {
            position: relative;
            width: 200px;
            height: 360px;
            margin-bottom: 20px;
            transform: translateX(-45px);
        }

        .base {
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 39px;
            background: #7f8c8d;
            border-radius: 12px;
            box-shadow: 0 5px 0 #5a6268;
            z-index: 5;
        }

        .joint-base {
            position: absolute;
            bottom: 38px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 24px;
            background: #111;
            border-radius: 50%;
            border: 3px solid #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .arm-container {
            position: absolute;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            transform-origin: center bottom;
            animation: armSwing 1.2s infinite ease-in-out;
        }

        .segment-1 {
            position: relative;
            width: 28px;
            height: 70px;
            background: linear-gradient(90deg, #bdc3c7, #95a5a6);
            border-radius: 14px;
            border: 1px solid #7f8c8d;
        }
        .segment-1::before, .segment-1::after {
            content: "";
            position: absolute;
            left: 4px;
            right: 4px;
            height: 3px;
            background: #5a6268;
            border-radius: 2px;
        }
        .segment-1::before { top: 12px; }
        .segment-1::after { top: 28px; }

        .joint-1 {
            position: absolute;
            top: -11px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 24px;
            background: #111;
            border-radius: 50%;
            border: 3px solid #333;
            z-index: 10;
        }

        .seg2-container {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            transform-origin: center bottom;
            margin-bottom: -11px;
            animation: seg2Swing 1.2s infinite ease-in-out;
        }

        .segment-2 {
            position: relative;
            width: 26px;
            height: 75px;
            background: linear-gradient(90deg, #cbd2d6, #a0aeb5);
            border-radius: 13px;
            border: 1px solid #7f8c8d;
        }
        .segment-2::before, .segment-2::after {
            content: "";
            position: absolute;
            left: 4px;
            right: 4px;
            height: 3px;
            background: #5a6268;
            border-radius: 2px;
        }
        .segment-2::before { top: 15px; }
        .segment-2::after { top: 32px; }

        /* САМЫЙ ВЕРХНИЙ ЧЁРНЫЙ КРУГ - смещается при сгибании */
        .joint-2 {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 22px;
            background: #111;
            border-radius: 50%;
            border: 3px solid #333;
            z-index: 10;
            animation: joint2Swing 1.2s infinite ease-in-out;
        }

        .seg3-container {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            transform-origin: center bottom;
            margin-bottom: -10px;
            animation: seg3Swing 1.2s infinite ease-in-out;
        }

        .segment-3 {
            position: relative;
            width: 24px;
            height: 65px;
            background: linear-gradient(90deg, #d5dee2, #b0bcc3);
            border-radius: 12px;
            border: 1px solid #8a9aa5;
        }

        .gripper {
            position: absolute;
            top: -42px;
            left: 50%;
            transform: translateX(-50%);
            width: 52px;
            height: 62px;
        }

        .palm {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 36px;
            height: 24px;
            background: #7f8c8d;
            border-radius: 8px;
            border: 2px solid #5a6268;
            z-index: 2;
        }

        .finger-l {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-100%) translateX(-4px);
            width: 15px;
            height: 38px;
            background: linear-gradient(90deg, #5a6a72, #3a4a52);
            border: 1px solid #2a3a42;
            border-radius: 7px 7px 4px 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 1;
        }

        .finger-r {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(0%) translateX(4px);
            width: 15px;
            height: 38px;
            background: linear-gradient(90deg, #5a6a72, #3a4a52);
            border: 1px solid #2a3a42;
            border-radius: 7px 7px 4px 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 1;
        }

        .finger-l::after, .finger-r::after {
            content: "";
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #8a9aaa, #4a5a6a);
            border-radius: 50%;
        }

        @keyframes armSwing {
            0% { transform: translateX(-50%) rotate(0deg); }
            30% { transform: translateX(-50%) rotate(-6deg); }
            50% { transform: translateX(-50%) rotate(-8deg); }
            70% { transform: translateX(-50%) rotate(-3deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }

        @keyframes seg2Swing {
            0% { transform: translateX(-50%) rotate(0deg); }
            30% { transform: translateX(-50%) rotate(-12deg); }
            50% { transform: translateX(-50%) rotate(-16deg); }
            70% { transform: translateX(-50%) rotate(-5deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }

        @keyframes seg3Swing {
            0% { transform: translateX(-50%) rotate(0deg); }
            30% { transform: translateX(-50%) rotate(-24deg); }
            50% { transform: translateX(-50%) rotate(-32deg); }
            70% { transform: translateX(-50%) rotate(-10deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }

        /* АНИМАЦИЯ ДЛЯ ВЕРХНЕГО ЧЁРНОГО КРУГА - смещение 6px влево и 1px вниз */
        @keyframes joint2Swing {
            0% { transform: translateX(-50%) translateY(0); }
            30% { transform: translateX(-50%) translateX(-6px) translateY(1px); }
            50% { transform: translateX(-50%) translateX(-6px) translateY(1px); }
            70% { transform: translateX(-50%) translateX(-3px) translateY(0); }
            100% { transform: translateX(-50%) translateY(0); }
        }

        /* ИСКРЫ - центральный огонь */
        .sparks {
            position: absolute;
            top: calc(12% + 60px);
            left: 30%;
            width: 110px;
            height: 110px;
            pointer-events: none;
            opacity: 0;
            animation: sparkFlash 1.2s infinite;
            z-index: 30;
            transform: translateX(158px);
        }

        .sparks::before {
            content: '';
            position: absolute;
            width: 35px;
            height: 35px;
            background: radial-gradient(circle, #ffaa44, #ff6600);
            border-radius: 50%;
            top: 35px;
            left: 35px;
            box-shadow: 0 0 40px #ff8800;
        }

        .sparks::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #ff6600, #cc3300);
            border-radius: 50%;
            top: 52px;
            left: 52px;
        }

        /* МАЛЕНЬКИЕ ИСКРЫ - вылетают из центра */
        .sparks .extra-spark {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ffaa44;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff8800;
            opacity: 0;
            top: 45px;
            left: 45px;
            animation: sparkFly 1.2s infinite;
        }

        @keyframes sparkFlash {
            0% { opacity: 0; transform: translateX(158px) scale(0); }
            25% { opacity: 0; }
            32% { opacity: 1; transform: translateX(158px) scale(1.5); }
            45% { opacity: 0.8; transform: translateX(158px) scale(1); }
            60% { opacity: 0; transform: translateX(158px) scale(0.4); }
            100% { opacity: 0; transform: translateX(158px) scale(0); }
        }

        /* Искры разлетаются из центра (0,0) во все стороны */
        @keyframes sparkFly {
            0% { opacity: 0; transform: translate(0, 0) scale(0); }
            30% { opacity: 0; }
            38% { opacity: 1; transform: translate(var(--dx), var(--dy)) scale(1); }
            60% { opacity: 0.6; transform: translate(var(--dx2), var(--dy2)) scale(0.6); }
            100% { opacity: 0; transform: translate(var(--dx3), var(--dy3)) scale(0); }
        }

        .home-btn {
            margin-top: 50px;
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, #4A90E2, #357abd);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }

        .home-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(74,144,226,0.4);
        }

        @media (max-width: 700px) {
            .error-container { padding: 30px 20px; }
            .error-number { font-size: 100px; letter-spacing: 10px; }
            .server-rack { width: 260px; }
            .manipulator { transform: translateX(-25px) scale(0.85); transform-origin: bottom center; }
            .sparks { transform: translateX(100px) scale(0.7); }
        }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-number">404</div>

    <div class="animation-area">
        <div class="server-rack">
            <div class="rack-case">
                <div class="server-modules">
                    <div class="module">
                        <div class="module-led"></div>
                        <div class="module-label">ASL CORE v2.3</div>
                        <div class="module-status">ERROR</div>
                    </div>
                    <div class="module">
                        <div class="module-led"></div>
                        <div class="module-label">NODE: 404</div>
                        <div class="module-status">FAIL</div>
                    </div>
                    <div class="module">
                        <div class="module-led"></div>
                        <div class="module-label">SYNTHESIS</div>
                        <div class="module-status">OFF</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="manipulator">
            <div class="base"></div>
            <div class="joint-base"></div>
            <div class="arm-container">
                <div class="segment-1">
                    <div class="joint-1"></div>
                    <div class="seg2-container">
                        <div class="segment-2">
                            <div class="joint-2"></div>
                            <div class="seg3-container">
                                <div class="segment-3">
                                    <div class="gripper">
                                        <div class="palm"></div>
                                        <div class="finger-l"></div>
                                        <div class="finger-r"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- ИСКРЫ, ВЫЛЕТАЮЩИЕ ИЗ ЦЕНТРА КРУГЛОГО ОГНЯ -->
        <div class="sparks">
            <div class="extra-spark" style="--dx: -35px; --dy: -25px; --dx2: -60px; --dy2: -45px; --dx3: -80px; --dy3: -65px;"></div>
            <div class="extra-spark" style="--dx: 35px; --dy: -25px; --dx2: 60px; --dy2: -45px; --dx3: 80px; --dy3: -65px;"></div>
            <div class="extra-spark" style="--dx: -25px; --dy: 35px; --dx2: -45px; --dy2: 60px; --dx3: -65px; --dy3: 80px;"></div>
            <div class="extra-spark" style="--dx: 25px; --dy: 35px; --dx2: 45px; --dy2: 60px; --dx3: 65px; --dy3: 80px;"></div>
            <div class="extra-spark" style="--dx: -15px; --dy: -40px; --dx2: -30px; --dy2: -70px; --dx3: -45px; --dy3: -100px;"></div>
            <div class="extra-spark" style="--dx: 15px; --dy: -40px; --dx2: 30px; --dy2: -70px; --dx3: 45px; --dy3: -100px;"></div>
            <div class="extra-spark" style="--dx: -40px; --dy: 15px; --dx2: -70px; --dy2: 30px; --dx3: -100px; --dy3: 45px;"></div>
            <div class="extra-spark" style="--dx: 40px; --dy: 15px; --dx2: 70px; --dy2: 30px; --dx3: 100px; --dy3: 45px;"></div>
            <div class="extra-spark" style="--dx: 0px; --dy: -45px; --dx2: 0px; --dy2: -80px; --dx3: 0px; --dy3: -110px;"></div>
            <div class="extra-spark" style="--dx: -45px; --dy: 0px; --dx2: -80px; --dy2: 0px; --dx3: -110px; --dy3: 0px;"></div>
            <div class="extra-spark" style="--dx: 45px; --dy: 0px; --dx2: 80px; --dy2: 0px; --dx3: 110px; --dy3: 0px;"></div>
        </div>
    </div>

    <a href="index.html" class="home-btn">🏠 НА ГЛАВНУЮ</a>
</div>
</body>
</html>
